<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SheetEye | SOLID</title>
  <link rel="stylesheet" href="../assets/css/sheeteye.css?v=1">
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
    #sheetEyeContainer { display: flex; width: 100%; height: 100%; flex-direction: column; overflow: hidden; }
    #settingsPanel { position: absolute; top: 0; right: 0; z-index: 100; }
    #main { flex: 1; overflow: hidden; position: relative; min-height: 0; }
    #canvasWrap { width: 100%; height: 100%; position: relative; overflow: hidden; }
  </style>
</head>
<body>
<div id="sheetEyeContainer">
  <div id="toolbar">
    <span class="brand">SheetEye</span>
    <label for="seFileInput" title="DXFファイルを開く">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>開く
    </label>
    <input type="file" id="seFileInput" accept=".dxf">
    <button id="btnExportDxf" title="DXFエクスポート">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>保存
    </button>
    <button id="btnPrint" title="印刷 (範囲指定)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>印刷
    </button>
    <div class="sep"></div>
    <div class="group">
      <button id="btnUndo" class="icon-btn" title="元に戻す (Ctrl+Z)" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
      </button>
      <button id="btnRedo" class="icon-btn" title="やり直し (Ctrl+Y)" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.13-9.36L23 10"/></svg>
      </button>
    </div>
    <div class="sep"></div>
    <div class="group">
      <button id="btnFitAll" class="icon-btn" title="全体表示 (F)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9V5a2 2 0 0 1 2-2h4M21 9V5a2 2 0 0 0-2-2h-4M3 15v4a2 2 0 0 0 2 2h4M21 15v4a2 2 0 0 1-2 2h-4"/></svg>
      </button>
      <button id="btnZoomIn" class="icon-btn" title="拡大">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
      </button>
      <button id="btnZoomOut" class="icon-btn" title="縮小">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
      </button>
    </div>
    <div class="sep"></div>
    <div class="group" title="図面縮尺を実寸(1:1)に変換">
      <input type="text" id="scaleInput" placeholder="縮尺 例:1:4">
      <button id="btnScaleConvert" title="入力した縮尺の図面を実寸(1:1)に変換">→1:1変換</button>
    </div>
    <div class="sep"></div>
    <div class="group">
      <button id="btnSmartDim" title="スマート寸法 (D)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="18" x2="20" y2="18"/><line x1="4" y1="15" x2="4" y2="21"/><line x1="20" y1="15" x2="20" y2="21"/></svg>スマート寸法
      </button>
      <button id="btnMeasure" title="直線距離 (M)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="20" x2="20" y2="4"/><circle cx="4" cy="20" r="1.5"/><circle cx="20" cy="4" r="1.5"/></svg>直線距離
      </button>
    </div>
    <div class="sep"></div>
    <div class="group">
      <button id="btnDrawLine" title="直線 (L)">直線</button>
      <button id="btnDrawRect" title="矩形 (R)">矩形</button>
      <button id="btnDrawCircle" title="円 (C)">円</button>
      <button id="btnConstruction" title="作図線 (X)">作図線</button>
      <button id="btnText" title="文字 (T)">文字</button>
      <button id="btnBoxDelete" title="範囲削除: 矩形内のエンティティを削除">範囲削除</button>
      <button id="btnZoomBox" title="範囲拡大: 矩形で囲んだ範囲に拡大 (Z)">範囲拡大</button>
    </div>
    <div class="sep"></div>
    <div class="group">
      <button id="btnToggleDim" title="DXF寸法 表示/非表示" class="active">DXF寸法</button>
      <button id="btnToggleAnn" title="計測寸法 表示/非表示" class="active">計測寸法</button>
    </div>
    <div class="spacer"></div>
    <button id="btnSettings" class="icon-btn" title="表示・寸法スタイル設定">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h0a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h0a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v0a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>
  <div id="settingsPanel">
    <h4>表示</h4>
    <div class="row"><label for="btnGrid">グリッド</label><button id="btnGrid" title="グリッド切替 (G)" class="active">Grid</button></div>
    <div class="row"><label for="btnSnap">スナップ</label><button id="btnSnap" title="スナップ切替 (S)" class="active">Snap</button></div>
    <div class="row"><label for="unitSelect">単位</label><select id="unitSelect"><option value="mm">mm</option><option value="cm">cm</option><option value="m">m</option><option value="inch">inch</option></select></div>
    <h4 style="margin-top:10px;">寸法スタイル</h4>
    <div class="row"><label for="setSizeMultiplier">寸法の大きさ</label><input type="range" id="setSizeMultiplier" min="0.2" max="3.0" step="0.1"><span class="val" id="setSizeMultiplierVal"></span></div>
    <div class="row"><label for="setShowUnit">単位を表示</label><input type="checkbox" id="setShowUnit" style="width:auto;cursor:pointer;"></div>
    <div class="row"><label for="setFontSize">文字サイズ(基準)</label><input type="range" id="setFontSize" min="5" max="32" step="1"><span class="val" id="setFontSizeVal"></span></div>
    <div class="row"><label for="setArrowSize">矢印サイズ(基準)</label><input type="range" id="setArrowSize" min="2" max="20" step="1"><span class="val" id="setArrowSizeVal"></span></div>
    <div class="row"><label for="setLineWidth">線の太さ</label><input type="range" id="setLineWidth" min="0.5" max="5" step="0.5"><span class="val" id="setLineWidthVal"></span></div>
    <div class="row"><label for="setDecimals">小数桁数</label><input type="number" id="setDecimals" min="0" max="5" step="1"></div>
    <div class="row"><label for="setTextColor">文字色</label><input type="color" id="setTextColor"></div>
    <div class="row"><label for="setLineColor">線・矢印色</label><input type="color" id="setLineColor"></div>
    <div class="row"><label for="setBgAlpha">文字背景の不透明度</label><input type="range" id="setBgAlpha" min="0" max="1" step="0.05"><span class="val" id="setBgAlphaVal"></span></div>
    <button class="resetBtn" id="setReset">デフォルトに戻す</button>
  </div>
  <div id="main">
    <div id="canvasWrap">
      <canvas id="cadCanvas"></canvas>
      <div id="coords">X: 0.00 Y: 0.00</div>
      <div id="infoPanel" style="display:none;">
        <h3 id="infoPanelTitle">Entity Info</h3>
        <div id="infoPanelContent"></div>
      </div>
      <div id="drawMode"></div>
      <div id="dropOverlay">DXFファイルをドロップしてください</div>
    </div>
  </div>
</div>

<script src="../assets/js/auth.js?v=1"></script>
<script src="../assets/js/api.js?v=1"></script>
<script src="../assets/js/sheeteye.js?v=1"></script>
<script>
/* URLパラメータ（file_id / name）からSOLID APIのDXFを自動ロード */
(function () {
  var params   = new URLSearchParams(window.location.search);
  var fileId   = params.get('file_id') || params.get('id');
  var fileName = params.get('name') || params.get('file_name') || 'file.dxf';
  document.title = fileName + ' — SheetEye | SOLID';
  sheetEyeInit();
  if (!fileId) return;

  /* UTF-8で試してShift-JIS文字化け（0x80以上で日本語なし）なら再デコード */
  function decodeDxfBuffer(buffer) {
    var text = new TextDecoder('utf-8').decode(buffer);
    if (/�/.test(text) || (/[\x80-\xFF]/.test(text) && !/[　-鿿]/.test(text))) {
      try { text = new TextDecoder('shift-jis').decode(buffer); } catch (e) {}
    }
    return text;
  }

  var token = sessionStorage.getItem('space_token');
  fetch(API_BASE + '/files/' + fileId + '/view', {
    headers: token ? { 'Authorization': 'Bearer ' + token } : {},
  }).then(function (res) {
    if (!res.ok) throw new Error('HTTP ' + res.status);
    var ct = res.headers.get('Content-Type') || '';
    if (ct.indexOf('application/json') !== -1) {
      /* 本番: R2署名付きURLが返る */
      return res.json().then(function (data) {
        return fetch(data.url).then(function (r) {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.arrayBuffer();
        });
      });
    }
    /* ローカル: APIがファイル本体をストリーム中継 */
    return res.arrayBuffer();
  }).then(function (buffer) {
    sheetEyeLoadText(decodeDxfBuffer(buffer), fileName);
  }).catch(function (e) {
    console.error('DXF load error:', e);
    alert('DXFの読み込みに失敗しました: ' + e.message);
  });
})();
</script>
</body>
</html>
