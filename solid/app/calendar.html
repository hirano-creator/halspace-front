<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>受注カレンダー | SOLID</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Poppins:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/app.css">
  <style>
    .cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
    .cal-nav{display:flex;align-items:center;gap:8px;}
    .cal-month-title{font-family:'Poppins',sans-serif;font-size:22px;font-weight:700;min-width:180px;text-align:center;}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
    .cal-dow{text-align:center;font-size:12px;font-weight:700;color:var(--muted);padding:6px 0;background:var(--bg);}
    .cal-dow:first-child{color:var(--danger);}
    .cal-dow:last-child{color:#0984E3;}
    .cal-cell{min-height:110px;background:var(--white);border:1px solid var(--border);padding:6px;position:relative;transition:background var(--trans);}
    .cal-cell:hover{background:#f8fbff;}
    .cal-cell.other-month{background:#fafafa;}
    .cal-cell.other-month .cal-date{color:#ccc;}
    .cal-cell.today{border-color:var(--primary);border-width:2px;}
    .cal-cell.today .cal-date{background:var(--primary);color:var(--white);border-radius:50%;}
    .cal-date{width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;margin-bottom:4px;}
    .cal-bar{font-size:11px;font-weight:600;padding:2px 6px;border-radius:4px;margin-bottom:2px;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:opacity var(--trans);}
    .cal-bar:hover{opacity:.8;}
    .cal-bar-submitted  {background:rgba(116,185,255,.25);color:#0984E3;}
    .cal-bar-in_progress{background:rgba(9,132,227,.2);color:#0984E3;}
    .cal-bar-review_pending{background:rgba(255,107,53,.2);color:#E55A2B;}
    .cal-bar-revision_requested{background:rgba(253,203,110,.35);color:#b8690f;}
    .cal-bar-approved   {background:rgba(0,184,148,.2);color:#00B894;}
    .cal-bar-delivered  {background:rgba(0,184,148,.15);color:#00B894;}
    .cal-marker{font-size:11px;padding:2px 6px;border-radius:4px;margin-bottom:2px;display:flex;align-items:center;gap:4px;}
    .cal-marker-deadline{background:rgba(225,112,85,.15);color:var(--danger);}
    .cal-marker-delivered{background:rgba(0,184,148,.15);color:var(--accent);}
    /* ポップアップ */
    .cal-popup{position:fixed;z-index:500;background:var(--white);border-radius:12px;padding:16px;box-shadow:0 8px 40px rgba(0,0,0,.2);width:280px;pointer-events:auto;}
    .cal-popup.hidden{display:none;}
    /* 凡例 */
    .legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px;}
    .legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);}
    .legend-dot{width:12px;height:12px;border-radius:3px;}

    @media (max-width: 768px) {
      .cal-header { margin-bottom: 12px; gap: 8px; }
      .cal-nav { gap: 6px; }
      .cal-cell { min-height: 86px; padding: 4px 3px; }
      .cal-bar  { font-size: 10px; padding: 1px 4px; }
      .cal-date { width: 22px; height: 22px; font-size: 11px; }
      .cal-month-title { font-size: 17px; min-width: 130px; }
      #dayPopup { width: min(300px, 92vw); }
      .legend { gap: 6px; margin-bottom: 10px; }
      .legend-item { font-size: 11px; gap: 4px; }
      .legend-dot { width: 10px; height: 10px; }
      .cal-dow { font-size: 11px; padding: 4px 0; }
    }
    @media (max-width: 540px) {
      .cal-cell { min-height: 96px; padding: 4px 2px; }
      .cal-bar  { font-size: 9px; padding: 2px 3px; line-height: 1.3; white-space: nowrap; }
      .cal-bar i { font-size: 8px !important; }
      .cal-date { width: 20px; height: 20px; font-size: 10px; margin-bottom: 3px; }
      .cal-month-title { font-size: 15px; min-width: 110px; }
      .cal-dow { font-size: 10px; padding: 3px 0; }
      .legend { display: none; }
    }
    @media (max-width: 374px) {
      .cal-cell { min-height: 80px; padding: 3px 1px; }
      .cal-date { width: 18px; height: 18px; font-size: 9px; }
      .cal-bar  { font-size: 8px; padding: 1px 2px; }
    }
  </style>
</head>
<body>
<div class="app-layout">

  <aside class="sidebar">
    <div class="sidebar-logo">
      <span class="sidebar-logo-title">SOLID</span>
      <span class="sidebar-logo-sub">by HaLSpace</span>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-nav-label">メニュー</div>
      <a href="dashboard.html"><i class="fa-solid fa-gauge"></i> ダッシュボード</a>
      <a href="calendar.html" class="active"><i class="fa-solid fa-calendar-days"></i> 受注カレンダー</a>
      <a href="project-new.html"><i class="fa-solid fa-plus-circle"></i> 新規発注</a>
      <a href="admin.html" id="adminLink" style="display:none"><i class="fa-solid fa-gear"></i> 管理者画面</a>
    </nav>
    <div class="sidebar-bottom">
      <div id="sidebarUser"></div>
      <button class="btn-sidebar-copylink" type="button" onclick="copyStandaloneUrl()" title="Space.appを経由せず直接ログインできるURLをコピー">
        <i class="fa-solid fa-link"></i> 独立URLをコピー
      </button>
      <button class="btn-sidebar-logout" onclick="solidLogout()">
        <i class="fa-solid fa-arrow-left"></i> アプリ選択に戻る
      </button>
    </div>
  </aside>

  <div class="main-content">
    <div class="top-bar">
      <div style="display:flex;align-items:center;gap:10px;">
        <button class="menu-toggle" id="menuToggle"><i class="fa-solid fa-bars"></i></button>
        <span class="top-bar-title">受注カレンダー</span>
      </div>
      <div class="top-bar-right">
        <select class="form-select" id="companyFilter" style="display:none;max-width:200px;">
          <option value="">全会社</option>
        </select>
      </div>
    </div>

    <div class="page-body">
      <!-- ナビゲーション -->
      <div class="cal-header">
        <div class="cal-nav">
          <button class="btn btn-outline btn-sm" id="prevMonth"><i class="fa-solid fa-chevron-left"></i></button>
          <span class="cal-month-title" id="monthTitle"></span>
          <button class="btn btn-outline btn-sm" id="nextMonth"><i class="fa-solid fa-chevron-right"></i></button>
          <button class="btn btn-ghost btn-sm" id="todayBtn">今日</button>
        </div>
        <!-- 凡例 -->
        <div class="legend">
          <div class="legend-item"><div class="legend-dot" style="background:rgba(116,185,255,.4)"></div>提出済み（納期）</div>
          <div class="legend-item"><div class="legend-dot" style="background:rgba(9,132,227,.3)"></div>モデリング中（納期）</div>
          <div class="legend-item"><div class="legend-dot" style="background:rgba(255,107,53,.3)"></div>検査待ち（納期）</div>
          <div class="legend-item"><div class="legend-dot" style="background:rgba(253,203,110,.5)"></div>修正依頼中（納期）</div>
          <div class="legend-item"><div class="legend-dot" style="background:rgba(0,184,148,.3)"></div>承認済み/納品日</div>
        </div>
      </div>

      <div class="card" style="padding:0;overflow:hidden;">
        <div class="cal-grid" id="calGrid"></div>
      </div>
    </div>
  </div>
</div>


<!-- 日別ポップアップ -->
<div id="dayPopup" style="
  display:none;position:fixed;z-index:600;
  background:var(--white);border-radius:14px;
  box-shadow:0 8px 40px rgba(0,0,0,.22);
  width:300px;flex-direction:column;">
  <div style="display:flex;align-items:center;justify-content:space-between;
    padding:14px 16px 10px;border-bottom:1px solid var(--border);flex-shrink:0;">
    <span id="dayPopupTitle" style="font-weight:700;font-size:15px;"></span>
    <button id="dayPopupClose" style="background:none;border:none;cursor:pointer;
      font-size:18px;color:var(--muted);line-height:1;">×</button>
  </div>
  <div id="dayPopupList" style="overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:6px;"></div>
</div>

<div class="sidebar-overlay" id="sidebarOverlay"></div>
<div class="toast-container" id="toastContainer"></div>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/calendar.js"></script>
</body>
</html>
