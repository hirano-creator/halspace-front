<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#FF6B35">
  <title>ログイン | SOLID</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Poppins:wght@700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="assets/css/app.css">
  <style>
    /* ── 2カラムログインレイアウト（space/login.htmlを踏襲、SOLIDブランドに変更） ── */
    .login-page {
      min-height: 100vh;
      display: flex;
      background: #fff;
      padding: 0;
      align-items: stretch;
      opacity: 0;
      animation: pageIn .6s ease forwards;
    }
    @keyframes pageIn { to { opacity: 1; } }

    /* ── 左パネル ── */
    .login-brand {
      flex: 0 0 40%;
      background: linear-gradient(160deg, #FF6B35, #e8451a, #FF6B35, #ff8a5c);
      background-size: 400% 400%;
      animation: gradShift 8s ease infinite;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 44px;
      position: relative;
      overflow: hidden;
      text-align: center;
    }
    @keyframes gradShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    #brandCanvas {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .login-brand-name {
      font-family: 'Poppins', sans-serif;
      font-size: 40px;
      font-weight: 900;
      color: #fff;
      letter-spacing: -1px;
      line-height: 1;
      position: relative;
      z-index: 1;
      opacity: 0;
      transform: translateY(20px);
      animation: slideUp .7s .3s ease forwards;
    }
    .login-brand-sub {
      font-size: 13px;
      font-weight: 700;
      color: rgba(255,255,255,.75);
      letter-spacing: .1em;
      margin-top: 4px;
      position: relative;
      z-index: 1;
    }
    .login-brand-tagline {
      font-size: 14px;
      color: rgba(255,255,255,.8);
      margin-top: 16px;
      font-weight: 400;
      line-height: 1.6;
      position: relative;
      z-index: 1;
      opacity: 0;
      transform: translateY(16px);
      animation: slideUp .7s .5s ease forwards;
    }
    .login-brand-footer {
      font-size: 12px;
      color: rgba(255,255,255,.5);
      position: absolute;
      bottom: 28px;
      left: 0; right: 0;
      text-align: center;
      z-index: 1;
    }

    /* ── 右パネル ── */
    .login-form-panel {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 32px;
    }
    .login-form-inner {
      width: 100%;
      max-width: 400px;
      opacity: 0;
      transform: translateX(24px);
      animation: slideLeft .65s .2s ease forwards;
    }
    @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }
    @keyframes slideLeft { to { opacity: 1; transform: translateX(0); } }

    .login-form-title {
      font-size: 15px;
      color: #444;
      margin-bottom: 28px;
      line-height: 1.7;
    }
    .login-form-inner .form-group { margin-bottom: 18px; }
    .login-form-inner .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: #333;
      margin-bottom: 6px;
    }
    .login-form-inner .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      font-size: 15px;
      color: #333;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      font-family: inherit;
    }
    .login-form-inner .form-group input:focus {
      border-color: #FF6B35;
      box-shadow: 0 0 0 3px rgba(255,107,53,.1);
    }
    .login-form-inner .form-group input::placeholder { color: #bbb; }

    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 46px; }
    .pw-eye {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #bbb;
      cursor: pointer;
      font-size: 15px;
      padding: 4px;
      transition: color .15s;
      background: none;
      border: none;
      line-height: 1;
    }
    .pw-eye:hover { color: #555; }

    .btn-login {
      width: 100%;
      padding: 15px;
      background: #FF6B35;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      border-radius: 50px;
      margin-top: 8px;
      transition: background .2s, transform .15s, box-shadow .2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: none;
      cursor: pointer;
      font-family: inherit;
      position: relative;
      overflow: hidden;
    }
    .btn-login:hover {
      background: #e8451a;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(255,107,53,.35);
    }
    .btn-login:active { transform: scale(.97); box-shadow: none; }
    .btn-login.loading { pointer-events: none; background: #374151; }
    .btn-login .btn-spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    .btn-login.loading .btn-text { display: none; }
    .btn-login.loading .btn-spinner { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .btn-ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,.25);
      transform: scale(0);
      animation: ripple .5s linear;
      pointer-events: none;
    }
    @keyframes ripple { to { transform: scale(4); opacity: 0; } }

    .login-error {
      display: none;
      background: #fff5f5;
      border: 1px solid #fed7d7;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #e53e3e;
      margin-bottom: 16px;
      align-items: center;
      gap: 8px;
    }
    .login-error.show { display: flex; }

    @media (max-width: 700px) {
      html { background: #FF6B35; min-height: 100%; }
      body { background: transparent; }
      .login-page {
        flex-direction: column;
        background: linear-gradient(160deg, #FF6B35, #e8451a, #FF6B35, #ff8a5c);
        background-size: 400% 400%;
        animation: gradShift 8s ease infinite, pageIn .6s ease forwards;
        min-height: 100svh;
      }
      #brandCanvas { position: fixed; width: 100vw; height: 100vh; z-index: 0; }
      .login-brand { flex: 0 0 auto; background: none; padding: 60px 24px 16px; animation: none; z-index: 1; }
      .login-brand-name { font-size: 38px; }
      .login-brand-tagline { font-size: 12px; margin-top: 10px; opacity: .9; }
      .login-brand-footer { display: none; }
      .login-form-panel { background: transparent; padding: 24px 28px 52px; z-index: 1; position: relative; }
      .login-form-inner { max-width: 100%; }
      .login-form-title { font-size: 13px; color: rgba(255,255,255,.65); margin-bottom: 24px; }
      .login-form-inner .form-group { margin-bottom: 16px; }
      .login-form-inner .form-group label {
        font-size: 11px; letter-spacing: .06em; color: rgba(255,255,255,.65); text-transform: uppercase;
      }
      .login-form-inner .form-group input {
        background: rgba(255,255,255,.12);
        border: 1px solid rgba(255,255,255,.25);
        color: #fff;
        padding: 14px 16px;
        border-radius: 12px;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
      }
      .login-form-inner .form-group input::placeholder { color: rgba(255,255,255,.4); }
      .login-form-inner .form-group input:focus {
        border-color: rgba(255,255,255,.6);
        box-shadow: 0 0 0 3px rgba(255,255,255,.15);
        background: rgba(255,255,255,.16);
      }
      .login-form-inner .form-group input:-webkit-autofill,
      .login-form-inner .form-group input:-webkit-autofill:focus {
        -webkit-box-shadow: 0 0 0 1000px #c9481f inset !important;
        -webkit-text-fill-color: #fff !important;
        caret-color: #fff;
        border-color: rgba(255,255,255,.25) !important;
      }
      .pw-eye { color: rgba(255,255,255,.5); }
      .pw-eye:hover { color: rgba(255,255,255,.9); }
      .btn-login {
        background: #1a1a2e;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0,0,0,.25);
        margin-top: 20px;
        letter-spacing: .04em;
      }
      .btn-login:hover { background: #0f3460; transform: translateY(-1px); box-shadow: 0 8px 28px rgba(0,0,0,.35); }
      .login-error { background: rgba(229,62,62,.2); border-color: rgba(229,62,62,.5); color: #fff0f0; }
    }
  </style>
</head>
<body class="login-page">

  <!-- 左：ブランドパネル -->
  <div class="login-brand">
    <canvas id="brandCanvas"></canvas>
    <div>
      <div class="login-brand-name">SOLID</div>
      <div class="login-brand-sub">by HaLSpace</div>
      <p class="login-brand-tagline">
        DXF・PDF図面をアップロードするだけで<br>3Dモデルを受発注
      </p>
    </div>
    <div class="login-brand-footer">&copy; 2025 HaLSpace Inc.</div>
  </div>

  <!-- 右：フォームパネル -->
  <div class="login-form-panel">
    <div class="login-form-inner">

      <p class="login-form-title">
        ログインするには、メールアドレスと<br>パスワードを入力してください。
      </p>

      <div class="login-error" id="loginError">
        <i class="fa-solid fa-circle-exclamation"></i>
        <span id="loginErrorMsg">メールアドレスまたはパスワードが正しくありません。</span>
      </div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">メールアドレス</label>
          <input type="email" id="email" name="email"
                 placeholder="example@company.co.jp" autocomplete="email" required>
        </div>
        <div class="form-group">
          <label for="password">パスワード</label>
          <div class="pw-wrap">
            <input type="password" id="password" name="password"
                   placeholder="パスワードを入力" autocomplete="current-password" required>
            <button type="button" class="pw-eye" id="pwToggle" tabindex="-1" aria-label="パスワードを表示">
              <i class="fa-regular fa-eye"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="btn-login" id="loginBtn">
          <span class="btn-text">ログイン</span>
          <span class="btn-spinner"></span>
        </button>
      </form>

    </div>
  </div>

  <script src="assets/js/api.js"></script>
  <script>
  /* 既にこのタブでログイン済みなら、フォームを出さずダッシュボードへ */
  if (sessionStorage.getItem('space_user')) {
    location.href = 'app/dashboard.html';
  }

  /* ── パーティクル ── */
  (function () {
    const canvas = document.getElementById('brandCanvas');
    const ctx = canvas.getContext('2d');
    let W, H, particles;

    function resize() {
      W = canvas.width  = canvas.offsetWidth;
      H = canvas.height = canvas.offsetHeight;
    }
    function mkParticle() {
      return {
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.8 + 0.4,
        vx: (Math.random() - 0.5) * 0.35,
        vy: (Math.random() - 0.5) * 0.35,
        alpha: Math.random() * 0.5 + 0.15,
      };
    }
    function init() { resize(); particles = Array.from({ length: 90 }, mkParticle); }
    function draw() {
      ctx.clearRect(0, 0, W, H);
      particles.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
        if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${p.alpha})`;
        ctx.fill();
      });
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 80) {
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = `rgba(255,255,255,${0.08 * (1 - dist / 80)})`;
            ctx.lineWidth = 0.6;
            ctx.stroke();
          }
        }
      }
      requestAnimationFrame(draw);
    }
    window.addEventListener('resize', () => { resize(); });
    init();
    draw();
  })();

  /* ── パスワード表示トグル ── */
  document.getElementById('pwToggle').addEventListener('click', function () {
    const input = document.getElementById('password');
    const icon  = this.querySelector('i');
    const show  = input.type === 'password';
    input.type  = show ? 'text' : 'password';
    icon.className = show ? 'fa-regular fa-eye-slash' : 'fa-regular fa-eye';
  });

  /* ── ボタンリップル ── */
  document.getElementById('loginBtn').addEventListener('mousedown', function (e) {
    const btn = this;
    const rect = btn.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height) * 2;
    const x = e.clientX - rect.left - size / 2;
    const y = e.clientY - rect.top  - size / 2;
    const ripple = document.createElement('span');
    ripple.className = 'btn-ripple';
    ripple.style.cssText = `width:${size}px;height:${size}px;left:${x}px;top:${y}px`;
    btn.appendChild(ripple);
    ripple.addEventListener('animationend', () => ripple.remove());
  });

  /* ── ログイン送信 ── */
  document.getElementById('loginForm').addEventListener('submit', async e => {
    e.preventDefault();
    const btn    = document.getElementById('loginBtn');
    const err    = document.getElementById('loginError');
    const errMsg = document.getElementById('loginErrorMsg');
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    btn.classList.add('loading');
    err.classList.remove('show');
    const resetBtn = () => btn.classList.remove('loading');

    try {
      const res = await fetch(`${API_BASE}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();

      if (!res.ok) {
        errMsg.textContent = data.message || 'ログインに失敗しました。';
        err.classList.add('show');
        resetBtn();
        return;
      }

      const u = data.user;
      if (!(u.apps_enabled || []).includes('solid')) {
        errMsg.textContent = 'このアカウントはSOLIDをご利用いただけません。管理者にお問い合わせください。';
        err.classList.add('show');
        resetBtn();
        return;
      }

      sessionStorage.setItem('space_token', data.token);
      sessionStorage.setItem('space_user', JSON.stringify({
        id: u.id, name: u.name, email: u.email,
        role: u.role, solid_type: u.solid_type,
        company: u.company_name, company_id: u.company_id,
        apps: u.apps_enabled,
        token: data.token,
      }));
      location.href = 'app/dashboard.html';

    } catch (ex) {
      errMsg.textContent = 'サーバーに接続できません。しばらく経ってから再度お試しください。';
      err.classList.add('show');
      resetBtn();
    }
  });
  </script>
</body>
</html>
