<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>アプリ選択 | Space by HaLSpace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Poppins:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="assets/css/space.css">
</head>
<body class="apps-page">

  <!-- ヘッダー -->
  <header class="apps-header">
    <span class="apps-header-logo">Space.app</span>
    <div class="apps-header-user">
      <div class="user-info">
        <span class="user-name" id="headerUserName">読み込み中...</span>
        <span class="user-company" id="headerCompany"></span>
      </div>
      <a class="btn-admin" id="adminLink" href="admin.html" style="display:none;">
        <i class="fa-solid fa-shield-halved"></i>
        管理者設定
      </a>
      <button class="btn-logout" id="logoutBtn">
        <i class="fa-solid fa-right-from-bracket"></i>
        ログアウト
      </button>
    </div>
  </header>

  <!-- メイン -->
  <main class="apps-body">
    <div class="apps-welcome">
      <h1 id="welcomeMsg">おかえりなさい</h1>
      <p>ご利用になるサービスを選択してください。</p>
    </div>

    <div class="apps-section-header">
      <div class="apps-section-label">サービス一覧</div>
      <a class="apps-all-link" href="all-apps.html">ALL APPS <i class="fa-solid fa-arrow-right"></i></a>
    </div>
    <div class="apps-scroll-wrap">
      <button class="apps-arrow apps-arrow-left" id="arrowLeft" aria-label="前へ">
        <i class="fa-solid fa-chevron-left"></i>
      </button>
      <div class="apps-grid" id="appsGrid">
        <!-- JSで描画 -->
      </div>
      <button class="apps-arrow apps-arrow-right" id="arrowRight" aria-label="次へ">
        <i class="fa-solid fa-chevron-right"></i>
      </button>
    </div>
  </main>

  <script src="assets/js/space.js"></script>
</body>
</html>
