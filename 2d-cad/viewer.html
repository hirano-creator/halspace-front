    return computePointToPointDim(p1.x, p1.y, p2.x, p2.y, mouseW);
  }

  // Point + Circle → distance from point to center
  if (sel1.kind === 'point' && sel2.kind === 'circle') {
    return computePointToPointDim(sel1.x, sel1.y, sel2.cx, sel2.cy, mouseW);
  }
  if (sel1.kind === 'circle' && sel2.kind === 'point') {
    return computePointToPointDim(sel1.cx, sel1.cy, sel2.x, sel2.y, mouseW);
  }

  // Two lines → angle if non-parallel, perpendicular distance if parallel
  if (sel1.kind === 'line' && sel2.kind === 'line') {
    const a1 = Math.atan2(sel1.y2 - sel1.y1, sel1.x2 - sel1.x1);
    const a2 = Math.atan2(sel2.y2 - sel2.y1, sel2.x2 - sel2.x1);
    let diff = Math.abs(a1 - a2);
    while (diff > Math.PI) diff -= Math.PI;
    const parallelTol = 0.0175; // ~1 degree
    const isParallel = diff < parallelTol || Math.PI - diff < parallelTol;

    if (!isParallel) {
      const ip = lineLineIntersection(sel1, sel2);
      if (ip) {
        // Determine which sector the mouse is in
        const rays = [a1, a1 + Math.PI, a2, a2 + Math.PI].map(norm2PI);
        rays.sort((a, b) => a - b);
        const mAng = norm2PI(Math.atan2(mouseW.y - ip.y, mouseW.x - ip.x));
        let startAngle = rays[rays.length - 1] - 2 * Math.PI, endAngle = rays[0];
        for (let i = 0; i < rays.length; i++) {
          const s = rays[i], e = rays[(i + 1) % rays.length];
          const eAdj = e < s ? e + 2 * Math.PI : e;
          const mAdj = mAng < s ? mAng + 2 * Math.PI : mAng;
          if (mAdj >= s && mAdj <= eAdj) { startAngle = s; endAngle = eAdj; break; }
        }
        const radius = Math.sqrt((mouseW.x - ip.x) ** 2 + (mouseW.y - ip.y) ** 2);
        const value = (endAngle - startAngle) * 180 / Math.PI;
        return { type: 'angle', cx: ip.x, cy: ip.y, r: radius,
                 startAngle, endAngle, value,
                 line1: { x1: sel1.x1, y1: sel1.y1, x2: sel1.x2, y2: sel1.y2 },
                 line2: { x1: sel2.x1, y1: sel2.y1, x2: sel2.x2, y2: sel2.y2 } };
      }
    }

    // Parallel: perpendicular distance
    const mid1x = (sel1.x1 + sel1.x2) / 2, mid1y = (sel1.y1 + sel1.y2) / 2;
    const foot = nearestPointOnInfiniteLine(mid1x, mid1y, sel2.x1, sel2.y1, sel2.x2, sel2.y2);
    if (!foot) return null;
    return computePointToPointDim(mid1x, mid1y, foot.x, foot.y, mouseW);
  }

  // Line + Circle or Circle + Line → perpendicular distance from circle center to line
  if ((sel1.kind === 'line' && sel2.kind === 'circle') || (sel1.kind === 'circle' && sel2.kind === 'line')) {
    const line = sel1.kind === 'line' ? sel1 : sel2;
    const circ = sel1.kind === 'circle' ? sel1 : sel2;
    const foot = nearestPointOnInfiniteLine(circ.cx, circ.cy, line.x1, line.y1, line.x2, line.y2);
    if (!foot) return null;
    return computePointToPointDim(foot.x, foot.y, circ.cx, circ.cy, mouseW);
  }

  // Two circles → distance between centers
  if (sel1.kind === 'circle' && sel2.kind === 'circle') {
    return computePointToPointDim(sel1.cx, sel1.cy, sel2.cx, sel2.cy, mouseW);
  }

  return null;
}

// ============================================================
//  Drawing Preview
// ============================================================
function drawPreview() {
  // Zoom box overlay (drawn regardless of drawState)
  if (zoomBoxState.active) {
    const x = Math.min(zoomBoxState.sx, zoomBoxState.ex);
    const y = Math.min(zoomBoxState.sy, zoomBoxState.ey);
    const w = Math.abs(zoomBoxState.ex - zoomBoxState.sx);
    const h = Math.abs(zoomBoxState.ey - zoomBoxState.sy);
    ctx.save();
    ctx.setLineDash([5, 3]);
    ctx.strokeStyle = '#89b4fa';
    ctx.fillStyle = 'rgba(137,180,250,0.08)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.rect(x, y, w, h);
    ctx.fill();
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }

  if (!drawState.mode || !drawState.preview) return;
  ctx.save();

  // Smart dimension preview
  if (drawState.mode === 'smartDim') {
    // Highlight hovered entity
    if (smartDimState.phase === 'pick1' && smartDimState.hoverEntity) {
      drawEntityHighlight(smartDimState.hoverEntity);
    }
    // Highlight first selection
    if (smartDimState.sel1) {
      drawEntityHighlight(smartDimState.sel1);
    }
    // Highlight second selection or hovered entity in pick2
    if (smartDimState.phase === 'pick2' && smartDimState.hoverEntity) {
      drawEntityHighlight(smartDimState.hoverEntity);
    }
    if (smartDimState.sel2) {
      drawEntityHighlight(smartDimState.sel2);
    }
    // Preview dimension in place phase
    if (smartDimState.phase === 'place' && smartDimState.sel1) {
      const dim = computeSmartDim(smartDimState.sel1, smartDimState.sel2, drawState.preview);
      if (dim) {
        ctx.strokeStyle = dimStyle.lineColor; ctx.fillStyle = dimStyle.lineColor; ctx.lineWidth = dimStyle.lineWidth; ctx.setLineDash([]);
        drawDimResult(dim);
      }
    }
    ctx.restore();
    return;
  }

  // Other draw modes
  if (drawState.points.length === 0) { ctx.restore(); return; }
  ctx.strokeStyle = '#89b4fa';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([6, 4]);

  const last = drawState.points[drawState.points.length - 1];
  const ls = worldToScreen(last.x, last.y);
  const ps = worldToScreen(drawState.preview.x, drawState.preview.y);

  if (drawState.mode === 'line' || drawState.mode === 'measure' || drawState.mode === 'construction') {
    if (drawState.mode === 'construction') ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.moveTo(ls.x, ls.y); ctx.lineTo(ps.x, ps.y); ctx.stroke();
    const d = Math.sqrt((drawState.preview.x - last.x) ** 2 + (drawState.preview.y - last.y) ** 2);
    ctx.setLineDash([]);
    ctx.font = '12px Consolas, monospace';
    ctx.fillStyle = '#89b4fa';
    ctx.fillText(formatDist(d), (ls.x + ps.x) / 2 + 10, (ls.y + ps.y) / 2 - 10);
  } else if (drawState.mode === 'rect' || drawState.mode === 'printRange' || drawState.mode === 'boxDelete') {
    const p0 = drawState.points[0];
    const s0 = worldToScreen(p0.x, p0.y);
    ctx.setLineDash([6, 4]);
    if (drawState.mode === 'printRange') {
      ctx.strokeStyle = '#f38ba8';
      ctx.lineWidth = 2;
    } else if (drawState.mode === 'boxDelete') {
      ctx.strokeStyle = '#f38ba8';
      ctx.fillStyle = 'rgba(243,139,168,0.08)';
      ctx.lineWidth = 1.5;
    }
    ctx.beginPath();
    ctx.rect(s0.x, s0.y, ps.x - s0.x, ps.y - s0.y);
    if (drawState.mode === 'boxDelete') ctx.fill();
    ctx.stroke();
    const w = Math.abs(drawState.preview.x - p0.x);
    const h = Math.abs(drawState.preview.y - p0.y);
    ctx.setLineDash([]);
    ctx.font = '11px Consolas, monospace';
    ctx.fillStyle = '#89b4fa';
    ctx.fillText(`${formatDist(w)} x ${formatDist(h)}`, ps.x + 10, ps.y - 10);
  } else if (drawState.mode === 'circle') {
    const c = drawState.points[0];
    const cs = worldToScreen(c.x, c.y);
    const r = Math.sqrt((drawState.preview.x - c.x) ** 2 + (drawState.preview.y - c.y) ** 2);
    ctx.beginPath();
    ctx.arc(cs.x, cs.y, r * cam.zoom, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.font = '11px Consolas, monospace';
    ctx.fillStyle = '#89b4fa';
    ctx.fillText(`R=${formatDist(r)}`, ps.x + 10, ps.y - 10);
  }

  ctx.restore();
}

// ============================================================
//  Bounding Box / Fit
// ============================================================
function getBoundingBox() {
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  let found = false;

  function ext(x, y) { minX = Math.min(minX, x); maxX = Math.max(maxX, x); minY = Math.min(minY, y); maxY = Math.max(maxY, y); found = true; }

  for (const e of entities) {
    switch (e.type) {
      case 'LINE': ext(e.x1, e.y1); ext(e.x2, e.y2); break;
      case 'CIRCLE': ext(e.cx - e.r, e.cy - e.r); ext(e.cx + e.r, e.cy + e.r); break;
      case 'ARC': ext(e.cx - e.r, e.cy - e.r); ext(e.cx + e.r, e.cy + e.r); break;
      case 'POINT': ext(e.x, e.y); break;
      case 'LWPOLYLINE': e.vertices.forEach(v => ext(v.x, v.y)); break;
      case 'TEXT': ext(e.x, e.y); break;
      case 'DIMENSION': ext(e.defX1, e.defY1); ext(e.defX2, e.defY2); ext(e.textX, e.textY); break;
      case 'ELLIPSE': {
        const a = Math.sqrt(e.ex ** 2 + e.ey ** 2);
        ext(e.cx - a, e.cy - a); ext(e.cx + a, e.cy + a); break;
      }
      case 'SPLINE': e.controlPoints.forEach(p => ext(p.x, p.y)); break;
      case 'SOLID': ext(e.x1, e.y1); ext(e.x2, e.y2); ext(e.x3, e.y3); ext(e.x4, e.y4); break;
    }
  }
  return found ? { minX, maxX, minY, maxY } : null;
}

function fitAll() {
  const bb = getBoundingBox();
  if (!bb) { cam = { x: 0, y: 0, zoom: 1 }; render(); return; }
  const w = bb.maxX - bb.minX || 1;
  const h = bb.maxY - bb.minY || 1;
  const margin = 0.1;
  cam.x = (bb.minX + bb.maxX) / 2;
  cam.y = (bb.minY + bb.maxY) / 2;
  cam.zoom = Math.min(canvas.width * (1 - margin) / w, canvas.height * (1 - margin) / h);
  render();
}

// ============================================================
//  Scale Conversion (図面縮尺 → 実寸 1:1)
// ============================================================
// Parse scale string: "1:4", "1/4", "4", "0.25" → returns multiplier (e.g. 4)
function parseScaleInput(str) {
  str = (str || '').trim();
  // "1:4" or "1/4" → a/b → factor = b/a
  const m = str.match(/^(\d+(?:\.\d+)?)\s*[:\/]\s*(\d+(?:\.\d+)?)$/);
  if (m) {
    const a = parseFloat(m[1]), b = parseFloat(m[2]);
    if (a > 0 && b > 0) return b / a;
  }
  // plain number "4" → factor = 4, "0.25" → factor = 4 (inverse)
  const n = parseFloat(str);
  if (!isNaN(n) && n > 0) return n < 1 ? 1 / n : n;
  return null;
}

function applyScaleConversion() {
  const factor = parseScaleInput(document.getElementById('scaleInput').value);
  if (!factor) { alert('縮尺の形式が正しくありません。\n例: 1:4  /  1/4  /  4'); return; }
  if (Math.abs(factor - 1) < 1e-9) return; // already 1:1

  saveUndoState();

  const s = factor;
  entities = entities.map(e => {
    switch (e.type) {
      case 'LINE':
        return { ...e, x1: e.x1*s, y1: e.y1*s, x2: e.x2*s, y2: e.y2*s };
      case 'CIRCLE': case 'ARC':
        return { ...e, cx: e.cx*s, cy: e.cy*s, r: e.r*s };
      case 'LWPOLYLINE':
        return { ...e, vertices: e.vertices.map(v => ({ ...v, x: v.x*s, y: v.y*s })) };
      case 'TEXT':
        return { ...e, x: e.x*s, y: e.y*s, height: e.height*s,
                 _refWidth: (e._refWidth||0)*s };
      case 'ELLIPSE':
        return { ...e, cx: e.cx*s, cy: e.cy*s, ex: e.ex*s, ey: e.ey*s };
      case 'SPLINE':
        return { ...e, controlPoints: e.controlPoints.map(p => ({ x: p.x*s, y: p.y*s })) };
      case 'SOLID':
        return { ...e, x1: e.x1*s, y1: e.y1*s, x2: e.x2*s, y2: e.y2*s,
                 x3: e.x3*s, y3: e.y3*s, x4: e.x4*s, y4: e.y4*s };
      case 'POINT':
        return { ...e, x: e.x*s, y: e.y*s };
      default: return e;
    }
  });

  // Scale annotations (smart dimensions / measurements)
  annotations = annotations.map(a => {
    if (a.type === 'linear') {
      return { ...a,
        x1: a.x1*s, y1: a.y1*s, x2: a.x2*s, y2: a.y2*s,
        offset: a.offset*s,
        _origP1: a._origP1 ? { x: a._origP1.x*s, y: a._origP1.y*s } : a._origP1,
        _origP2: a._origP2 ? { x: a._origP2.x*s, y: a._origP2.y*s } : a._origP2,
      };
    }
    if (a.type === 'diameter' || a.type === 'radius') {
      return { ...a, cx: a.cx*s, cy: a.cy*s, r: a.r*s,
               leaderDist: (a.leaderDist||0)*s };
    }
    return a;
  });

  saveAnnotations();
  fitAll();
}

// ============================================================
//  Box Delete
// ============================================================
function deleteInBox(minX, minY, maxX, maxY) {
  function inBox(x, y) { return x >= minX && x <= maxX && y >= minY && y <= maxY; }
  // Entity is included if its representative center is inside the box
  function entityInBox(e) {
    const c = getEntityCenter(e);
    return inBox(c.x, c.y);
  }
  // Annotation is included if its main reference point(s) are inside the box
  function annInBox(a) {
    if (a.type === 'linear') return inBox(a.x1, a.y1) && inBox(a.x2, a.y2);
    if (a.type === 'diameter' || a.type === 'radius') return inBox(a.cx, a.cy);
    return false;
  }
  const toRemoveE = entities.filter(entityInBox).length;
  const toRemoveA = annotations.filter(annInBox).length;
  if (toRemoveE + toRemoveA === 0) return;
  saveUndoState();
  entities = entities.filter(e => !entityInBox(e));
  annotations = annotations.filter(a => !annInBox(a));
  selectedEntity = -1;
  document.getElementById('infoPanel').style.display = 'none';
  saveAnnotations();
  updateEntityList();
  render();
}

// ============================================================
//  Entity Selection / Hit Test
// ============================================================
function hitTest(wx, wy, tolerance) {
  const t = tolerance || 5 / cam.zoom;
  for (let i = entities.length - 1; i >= 0; i--) {
    if (hitTestEntity(entities[i], wx, wy, t)) return i;
  }
  return -1;
}

function hitTestEntity(e, wx, wy, t) {
  switch (e.type) {
    case 'LINE': return distToSegment(wx, wy, e.x1, e.y1, e.x2, e.y2) < t;
    case 'CIRCLE': return Math.abs(Math.sqrt((wx - e.cx) ** 2 + (wy - e.cy) ** 2) - e.r) < t;
    case 'ARC': {
      const d = Math.sqrt((wx - e.cx) ** 2 + (wy - e.cy) ** 2);
      if (Math.abs(d - e.r) > t) return false;
      let a = Math.atan2(wy - e.cy, wx - e.cx) * 180 / Math.PI;
      if (a < 0) a += 360;
      let sa = e.startAngle, ea = e.endAngle;
      if (sa < 0) sa += 360; if (ea < 0) ea += 360;
      if (sa <= ea) return a >= sa && a <= ea;
      return a >= sa || a <= ea;
    }
    case 'POINT': return Math.sqrt((wx - e.x) ** 2 + (wy - e.y) ** 2) < t * 2;
    case 'LWPOLYLINE':
      for (let j = 0; j < e.vertices.length - 1; j++) {
        if (distToSegment(wx, wy, e.vertices[j].x, e.vertices[j].y, e.vertices[j + 1].x, e.vertices[j + 1].y) < t) return true;
      }
      if (e.closed && e.vertices.length > 2) {
        const v1 = e.vertices[e.vertices.length - 1], v2 = e.vertices[0];
        if (distToSegment(wx, wy, v1.x, v1.y, v2.x, v2.y) < t) return true;
      }
      return false;
    case 'TEXT': {
      const fs = e.height;
      return wx >= e.x - fs && wx <= e.x + fs * e.text.length * 0.6 + fs && wy >= e.y - fs * 2 && wy <= e.y + fs;
    }
    case 'DIMENSION': {
      if (distToSegment(wx, wy, e.defX1, e.defY1, e.defX2, e.defY2) < t * 3) return true;
      const tdist = Math.sqrt((wx - e.textX) ** 2 + (wy - e.textY) ** 2);
      return tdist < t * 5;
    }
    default: return false;
  }
}

function distToSegment(px, py, x1, y1, x2, y2) {
  const dx = x2 - x1, dy = y2 - y1;
  const lenSq = dx * dx + dy * dy;
  if (lenSq === 0) return Math.sqrt((px - x1) ** 2 + (py - y1) ** 2);
  let t = ((px - x1) * dx + (py - y1) * dy) / lenSq;
  t = Math.max(0, Math.min(1, t));
  return Math.sqrt((px - x1 - t * dx) ** 2 + (py - y1 - t * dy) ** 2);
}

// ============================================================
//  Side Panel
// ============================================================
function updateEntityList() {}

function showEntityInfo(e) {
  const panel = document.getElementById('infoPanel');
  const title = document.getElementById('infoPanelTitle');
  const content = document.getElementById('infoPanelContent');
  panel.style.display = 'block';
  title.textContent = e.type;

  let html = `<div class="row"><span class="label">Layer:</span><span class="val">${e.layer}</span></div>`;
  switch (e.type) {
    case 'LINE': {
      const len = Math.sqrt((e.x2 - e.x1) ** 2 + (e.y2 - e.y1) ** 2);
      html += `<div class="row"><span class="label">始点:</span><span class="val">(${e.x1.toFixed(2)}, ${e.y1.toFixed(2)})</span></div>`;
      html += `<div class="row"><span class="label">終点:</span><span class="val">(${e.x2.toFixed(2)}, ${e.y2.toFixed(2)})</span></div>`;
      html += `<div class="row"><span class="label">長さ:</span><span class="val">${formatDist(len)}</span></div>`;
      const ang = Math.atan2(e.y2 - e.y1, e.x2 - e.x1) * 180 / Math.PI;
      html += `<div class="row"><span class="label">角度:</span><span class="val">${ang.toFixed(2)}\u00B0</span></div>`;
      break;
    }
    case 'CIRCLE':
      html += `<div class="row"><span class="label">中心:</span><span class="val">(${e.cx.toFixed(2)}, ${e.cy.toFixed(2)})</span></div>`;
      html += `<div class="row"><span class="label">半径:</span><span class="val">${formatDist(e.r)}</span></div>`;
      html += `<div class="row"><span class="label">直径:</span><span class="val">${formatDist(e.r * 2)}</span></div>`;
      break;
    case 'ARC':
      html += `<div class="row"><span class="label">中心:</span><span class="val">(${e.cx.toFixed(2)}, ${e.cy.toFixed(2)})</span></div>`;
      html += `<div class="row"><span class="label">半径:</span><span class="val">${formatDist(e.r)}</span></div>`;
      html += `<div class="row"><span class="label">開始角:</span><span class="val">${e.startAngle.toFixed(2)}\u00B0</span></div>`;
      html += `<div class="row"><span class="label">終了角:</span><span class="val">${e.endAngle.toFixed(2)}\u00B0</span></div>`;
      break;
    case 'LWPOLYLINE':
      html += `<div class="row"><span class="label">頂点数:</span><span class="val">${e.vertices.length}</span></div>`;
      html += `<div class="row"><span class="label">閉合:</span><span class="val">${e.closed ? 'はい' : 'いいえ'}</span></div>`;
      let perimeter = 0;
      for (let j = 0; j < e.vertices.length - 1; j++) {
        perimeter += Math.sqrt((e.vertices[j + 1].x - e.vertices[j].x) ** 2 + (e.vertices[j + 1].y - e.vertices[j].y) ** 2);
      }
      if (e.closed && e.vertices.length > 2) {
        const v1 = e.vertices[e.vertices.length - 1], v2 = e.vertices[0];
        perimeter += Math.sqrt((v2.x - v1.x) ** 2 + (v2.y - v1.y) ** 2);
      }
      html += `<div class="row"><span class="label">周長:</span><span class="val">${formatDist(perimeter)}</span></div>`;
      break;
    case 'TEXT':
      html += `<div class="row"><span class="label">位置:</span><span class="val">(${e.x.toFixed(2)}, ${e.y.toFixed(2)})</span></div>`;
      html += `<div class="row"><span class="label">テキスト:</span><span class="val">${e.text}</span></div>`;
      html += `<div class="row"><span class="label">サイズ:</span><input type="number" id="textHeightNum" min="0.1" step="0.1" value="${e.height.toFixed(2)}"></div>`;
      html += `<div class="row"><input type="range" id="textHeightRange" min="0.5" max="100" step="0.5" value="${Math.min(100, Math.max(0.5, e.height))}" style="width:100%"></div>`;
      break;
    case 'DIMENSION': {
      const dist = Math.sqrt((e.defX2 - e.defX1) ** 2 + (e.defY2 - e.defY1) ** 2);
      html += `<div class="row"><span class="label">寸法値:</span><span class="val">${e.text || dist.toFixed(2)}</span></div>`;
      html += `<div class="row"><span class="label">距離:</span><span class="val">${formatDist(dist)}</span></div>`;
      html += `<div class="row"><span class="label">P1:</span><span class="val">(${e.defX1.toFixed(2)}, ${e.defY1.toFixed(2)})</span></div>`;
      html += `<div class="row"><span class="label">P2:</span><span class="val">(${e.defX2.toFixed(2)}, ${e.defY2.toFixed(2)})</span></div>`;
      break;
    }
  }
  content.innerHTML = html;

  // Wire up TEXT size controls
  if (e.type === 'TEXT') {
    const num = document.getElementById('textHeightNum');
    const range = document.getElementById('textHeightRange');
    let resizing = false;
    const applySize = (v) => {
      const nv = parseFloat(v);
      if (!isFinite(nv) || nv <= 0) return;
      if (!resizing) { saveUndoState(); resizing = true; }
      e.height = nv;
      if (num) num.value = nv.toFixed(2);
      if (range) range.value = Math.min(100, Math.max(0.5, nv));
      render();
    };
    const commit = () => { resizing = false; };
    if (num) {
      num.oninput = () => applySize(num.value);
      num.onchange = commit;
    }
    if (range) {
      range.oninput = () => applySize(range.value);
      range.onchange = commit;
    }
  }
}

// ============================================================
//  Mouse / Touch Events
// ============================================================
canvas.addEventListener('mousedown', e => {
  if (e.button === 1 || (e.button === 0 && e.ctrlKey)) {
    drag = { active: true, sx: e.clientX, sy: e.clientY, cx: cam.x, cy: cam.y };
    canvas.style.cursor = 'grabbing';
    return;
  }
  if (e.button === 0 && zoomBoxMode) {
    zoomBoxState = { active: true, sx: e.offsetX, sy: e.offsetY, ex: e.offsetX, ey: e.offsetY };
    return;
  }
  if (e.button === 0 && drawState.mode) {
    const w = screenToWorld(e.offsetX, e.offsetY);
    const snapped = snapToNearest(w.x, w.y);
    if (drawState.mode === 'smartDim') {
      handleSmartDimClick(w, e.shiftKey);
    } else {
      handleDrawClick(snapped);
    }
    return;
  }
  if (e.button === 0) {
    const w = screenToWorld(e.offsetX, e.offsetY);
    // Check annotation text drag first (highest priority)
    const annHit = hitTestAnnotation(w.x, w.y);
    if (annHit >= 0) {
      annDrag = { active: true, index: annHit, moved: false };
      selectedAnnotation = annHit;
      selectedEntity = -1;
      document.getElementById('infoPanel').style.display = 'none';
      canvas.style.cursor = 'move';
      render();
      return;
    }
    // Clicked elsewhere - clear annotation selection
    if (selectedAnnotation >= 0) {
      selectedAnnotation = -1;
      render();
    }
    const hit = hitTest(w.x, w.y);
    if (hit >= 0) {
      selectedEntity = hit;
      // Start drag if this is a TEXT entity
      if (entities[hit].type === 'TEXT') {
        textDrag = {
          active: true, index: hit, moved: false,
          offsetX: w.x - entities[hit].x,
          offsetY: w.y - entities[hit].y,
        };
        canvas.style.cursor = 'move';
      }
      showEntityInfo(entities[hit]);
      updateEntityList();
      render();
    } else {
      selectedEntity = -1;
      document.getElementById('infoPanel').style.display = 'none';
      updateEntityList();
      render();
      drag = { active: true, sx: e.clientX, sy: e.clientY, cx: cam.x, cy: cam.y };
      canvas.style.cursor = 'grabbing';
    }
  }
});

canvas.addEventListener('mousemove', e => {
  const w = screenToWorld(e.offsetX, e.offsetY);
  document.getElementById('coords').textContent = `X: ${w.x.toFixed(2)}  Y: ${w.y.toFixed(2)}  Zoom: ${cam.zoom.toFixed(1)}x`;

  if (zoomBoxState.active) {
    zoomBoxState.ex = e.offsetX;
    zoomBoxState.ey = e.offsetY;
    render();
    return;
  }

  if (annDrag.active) {
    if (!annDrag.moved) {
      saveUndoState();
      annDrag.moved = true;
    }
    updateAnnotationForDrag(annotations[annDrag.index], w);
    render();
    return;
  }

  if (textDrag.active) {
    if (!textDrag.moved) {
      saveUndoState();
      textDrag.moved = true;
    }
    const t = entities[textDrag.index];
    t.x = w.x - textDrag.offsetX;
    t.y = w.y - textDrag.offsetY;
    render();
    return;
  }

  if (!drawState.mode && !drag.active) {
    // Hover cursor hint when over a dimension text or text entity
    if (hitTestAnnotation(w.x, w.y) >= 0) canvas.style.cursor = 'move';
    else {
      const h = hitTest(w.x, w.y);
      if (h >= 0 && entities[h].type === 'TEXT') canvas.style.cursor = 'move';
      else canvas.style.cursor = 'default';
    }
  }

  if (drag.active) {
    const dx = (e.clientX - drag.sx) / cam.zoom;
    const dy = (e.clientY - drag.sy) / cam.zoom;
    cam.x = drag.cx - dx;
    cam.y = drag.cy + dy;
    render();
    return;
  }

  if (drawState.mode) {
    drawState.preview = snapToNearest(w.x, w.y);
    // Smart dim: detect entity under mouse for hover highlight
    if (drawState.mode === 'smartDim' && (smartDimState.phase === 'pick1' || smartDimState.phase === 'pick2')) {
      smartDimState.hoverEntity = detectEntityAtPoint(w.x, w.y);
    }
    render();
  }
});

canvas.addEventListener('mouseup', e => {
  if (zoomBoxState.active) {
    zoomBoxState.active = false;
    const x0 = Math.min(zoomBoxState.sx, e.offsetX);
    const y0 = Math.min(zoomBoxState.sy, e.offsetY);
    const x1 = Math.max(zoomBoxState.sx, e.offsetX);
    const y1 = Math.max(zoomBoxState.sy, e.offsetY);
    const pw = x1 - x0, ph = y1 - y0;
    if (pw > 5 && ph > 5) {
      const w0 = screenToWorld(x0, y0), w1 = screenToWorld(x1, y1);
      const ww = Math.abs(w1.x - w0.x), wh = Math.abs(w1.y - w0.y);
      if (ww > 0 && wh > 0) {
        cam.zoom = Math.min(canvas.width / ww, canvas.height / wh) * 0.9;
        cam.x = (w0.x + w1.x) / 2;
        cam.y = (w0.y + w1.y) / 2;
      }
    }
    zoomBoxMode = false;
    document.getElementById('btnZoomBox').classList.remove('active');
    canvas.style.cursor = 'default';
    render();
    return;
  }
  drag.active = false;
  if (annDrag.active) {
    if (annDrag.moved) saveAnnotations();
    annDrag = { active: false, index: -1, moved: false };
  }
  if (textDrag.active) {
    textDrag = { active: false, index: -1, moved: false, offsetX: 0, offsetY: 0 };
  }
  canvas.style.cursor = drawState.mode ? 'crosshair' : 'default';
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const w = screenToWorld(e.offsetX, e.offsetY);
  const factor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
  cam.zoom *= factor;
  cam.zoom = Math.max(0.001, Math.min(100000, cam.zoom));
  const newW = screenToWorld(e.offsetX, e.offsetY);
  cam.x -= newW.x - w.x;
  cam.y -= newW.y - w.y;
  render();
}, { passive: false });

canvas.addEventListener('contextmenu', e => {
  e.preventDefault();
  if (drawState.mode) cancelDraw();
});

// ============================================================
//  Drawing Logic
// ============================================================
function setDrawMode(mode) {
  drawState = { mode, points: [], preview: null };
  smartDimState = { phase: 'pick1', sel1: null, sel2: null, hoverEntity: null };
  canvas.style.cursor = mode ? 'crosshair' : 'default';
  const indicator = document.getElementById('drawMode');
  if (mode) {
    const labels = {
      line: '直線描画', rect: '矩形描画', circle: '円描画',
      construction: '作図線 (点線)', measure: '距離計測',
      text: '文字入力: 配置する位置をクリック',
      printRange: '印刷範囲: 対角2点をクリックで指定',
      boxDelete: '範囲削除: 対角2点をクリックして範囲を指定 — 範囲内のエンティティを削除',
      smartDim: 'スマート寸法: 点/エッジ/円をクリック (Shift=半径)'
    };
    indicator.textContent = (labels[mode] || mode) + '  (右クリックでキャンセル)';
    indicator.style.display = 'block';
  } else {
    indicator.style.display = 'none';
  }
  updateToolbarButtons();
}

function cancelDraw() {
  setDrawMode(null);
  render();
}

// Render the given world bounds to an off-screen canvas and open a print window
function printRange(minX, minY, maxX, maxY) {
  const w = maxX - minX, h = maxY - minY;
  if (w < 0.001 || h < 0.001) return;

  // Target canvas ~2000px on long side for crisp print
  const longPx = 2000;
  const pxPerUnit = longPx / Math.max(w, h);
  const cw = Math.round(w * pxPerUnit);
  const ch = Math.round(h * pxPerUnit);

  const off = document.createElement('canvas');
  off.width = cw; off.height = ch;
  const octx = off.getContext('2d');
  octx.fillStyle = '#ffffff';
  octx.fillRect(0, 0, cw, ch);

  // Map world (wx, wy) → off-canvas (ox, oy). Y flipped.
  function w2o(wx, wy) {
    return { x: (wx - minX) * pxPerUnit, y: (maxY - wy) * pxPerUnit };
  }

  octx.strokeStyle = '#000';
  octx.fillStyle = '#000';
  octx.lineWidth = 1.2;

  // Draw entities
  for (const e of entities) {
    if (!showDxfDimensions && e._isDimension) continue;
    octx.setLineDash(e._isConstruction ? [6, 6] : []);
    drawEntityPrint(octx, e, w2o, pxPerUnit);
  }
  octx.setLineDash([]);

  // Draw annotations
  if (showAnnotations) {
    for (const ann of annotations) drawAnnotationPrint(octx, ann, w2o, pxPerUnit);
  }

  const dataUrl = off.toDataURL('image/png');
  const win = window.open('', '_blank');
  if (!win) { alert('ポップアップがブロックされました。許可してください。'); return; }
  win.document.write(`<!doctype html><html><head><meta charset="utf-8"><title>印刷</title>
<style>
  @page { margin: 10mm; }
  body { margin: 0; padding: 0; background: #fff; }
  img { display: block; width: 100%; height: auto; max-height: 100vh; object-fit: contain; }
  @media print { img { max-height: none; width: 100%; } }
</style></head><body>
<img src="${dataUrl}" onload="window.focus();window.print();">
</body></html>`);
  win.document.close();
}

function drawEntityPrint(octx, e, w2o, pxPerUnit) {
  octx.beginPath();
  switch (e.type) {
    case 'LINE': {
      const a = w2o(e.x1, e.y1), b = w2o(e.x2, e.y2);
      octx.moveTo(a.x, a.y); octx.lineTo(b.x, b.y); octx.stroke();
      break;
    }
    case 'CIRCLE': {
      const c = w2o(e.cx, e.cy);
      octx.arc(c.x, c.y, e.r * pxPerUnit, 0, Math.PI * 2);
      octx.stroke();
      break;
    }
    case 'ARC': {
      const c = w2o(e.cx, e.cy);
      // Y flipped: angles negate
      const sa = -e.endAngle * Math.PI / 180;
      const ea = -e.startAngle * Math.PI / 180;
      octx.arc(c.x, c.y, e.r * pxPerUnit, sa, ea);
      octx.stroke();
      break;
    }
    case 'LWPOLYLINE': {
      const verts = e.vertices;
      if (verts.length < 2) break;
      const a = w2o(verts[0].x, verts[0].y);
      octx.moveTo(a.x, a.y);
      for (let i = 1; i < verts.length; i++) {
        const p = w2o(verts[i].x, verts[i].y);
        octx.lineTo(p.x, p.y);
      }
      if (e.closed) octx.closePath();
      octx.stroke();
      break;
    }
    case 'TEXT': {
      const p = w2o(e.x, e.y);
      const fs = e.height * pxPerUnit;
      if (fs < 1) break;
      octx.save();
      octx.font = `${fs}px 'Meiryo', 'Yu Gothic', 'MS Gothic', sans-serif`;
      octx.textAlign = (e.halign === 1 || e.halign === 4) ? 'center'
                     : (e.halign === 2) ? 'right' : 'left';
      octx.textBaseline = (e.halign === 4) ? 'middle'
                        : (e.valign === 3) ? 'top'
                        : (e.valign === 2) ? 'middle'
                        : (e.valign === 1) ? 'bottom' : 'alphabetic';
      octx.fillStyle = '#000';
      const isMTextP = e._isMText;
      const lh = fs * 1.2 * (e._lineSpacing || 1.0);
      let lines;
      if (isMTextP && e._refWidth > 0) {
        const maxPx = e._refWidth * pxPerUnit;
        lines = [];
        for (const para of (e.text || '').split('\n')) {
          if (octx.measureText(para).width <= maxPx) { lines.push(para); continue; }
          let cur = '';
          for (let ci = 0; ci < para.length; ci++) {
            const test = cur + para[ci];
            if (octx.measureText(test).width > maxPx && cur) {
              const lastSp = cur.lastIndexOf(' ');
              if (lastSp > 0 && para[ci] !== ' ') {
                lines.push(cur.slice(0, lastSp));
                cur = cur.slice(lastSp + 1) + para[ci];
              } else { lines.push(cur); cur = para[ci]; }
            } else { cur = test; }
          }
          if (cur) lines.push(cur);
        }
      } else {
        lines = (e.text || '').split('\n');
      }
      const styleP = textStyles[e._style];
      const styleWfP = styleP ? styleP.widthFactor : 1.0;
      const shxCompP = (styleP && styleP.isShx) ? 0.72 : 1.0;
      const wfP = (e._widthFactor || 1.0) * styleWfP * shxCompP;
      octx.translate(p.x, p.y);
      if (e.rotation) octx.rotate(-(e.rotation || 0) * Math.PI / 180);
      if (wfP !== 1.0) octx.scale(wfP, 1);
      for (let li = 0; li < lines.length; li++) octx.fillText(lines[li], 0, li * lh);
      octx.restore();
      break;
    }
    case 'SOLID': {
      const sp1 = w2o(e.x1, e.y1), sp2 = w2o(e.x2, e.y2);
      const sp3 = w2o(e.x3, e.y3), sp4 = w2o(e.x4, e.y4);
      octx.beginPath();
      octx.moveTo(sp1.x, sp1.y); octx.lineTo(sp2.x, sp2.y);
      octx.lineTo(sp4.x, sp4.y); octx.lineTo(sp3.x, sp3.y);
      octx.closePath(); octx.fill();
      break;
    }
    case 'ELLIPSE': {
      const c = w2o(e.cx, e.cy);
      const a = Math.sqrt(e.ex ** 2 + e.ey ** 2) * pxPerUnit;
      const b = a * e.ratio;
      const rot = -Math.atan2(e.ey, e.ex);
      octx.ellipse(c.x, c.y, a, b, rot, 0, Math.PI * 2);
      octx.stroke();
      break;
    }
  }
}

function drawAnnotationPrint(octx, ann, w2o, pxPerUnit) {
  octx.save();
  octx.strokeStyle = '#000';
  octx.fillStyle = '#000';
  octx.lineWidth = 1;
  octx.setLineDash([]);
  drawAnnotationPrintImpl(octx, ann, w2o, pxPerUnit);
  octx.restore();
}

function drawAnnotationPrintImpl(octx, ann, w2o, pxPerUnit) {
  const arrowSz = dimStyle.arrowSize;
  const fs = dimStyle.fontSize;
  octx.font = `bold ${fs}px Consolas, monospace`;
  octx.textAlign = 'center';
  octx.textBaseline = 'middle';

  function arrow(x, y, angle) {
    const ha = Math.PI * 0.92;
    octx.beginPath();
    octx.moveTo(x + arrowSz * Math.cos(angle + ha), y + arrowSz * Math.sin(angle + ha));
    octx.lineTo(x, y);
    octx.lineTo(x + arrowSz * Math.cos(angle - ha), y + arrowSz * Math.sin(angle - ha));
    octx.closePath();
    octx.fill();
  }
  function text(sx, sy, label, rot) {
    octx.save();
    octx.translate(sx, sy);
    if (rot) octx.rotate(rot);
    const tw = octx.measureText(label).width + 8;
    const th = fs + 4;
    octx.fillStyle = '#fff';
    octx.fillRect(-tw / 2, -th / 2, tw, th);
    octx.fillStyle = '#000';
    octx.fillText(label, 0, 0);
    octx.restore();
  }

  if (ann.type === 'linear') {
    let p1, p2, dimP1, dimP2, value;
    if (ann._dir === 'horizontal') {
      p1 = ann._origP1; p2 = ann._origP2;
      dimP1 = { x: p1.x, y: p1.y + ann.offset };
      dimP2 = { x: p2.x, y: p1.y + ann.offset };
      value = Math.abs(p2.x - p1.x);
    } else if (ann._dir === 'vertical') {
      p1 = ann._origP1; p2 = ann._origP2;
      dimP1 = { x: p1.x + ann.offset, y: p1.y };
      dimP2 = { x: p1.x + ann.offset, y: p2.y };
      value = Math.abs(p2.y - p1.y);
    } else {
      p1 = { x: ann.x1, y: ann.y1 }; p2 = { x: ann.x2, y: ann.y2 };
      const dx = p2.x - p1.x, dy = p2.y - p1.y;
      const len = Math.sqrt(dx * dx + dy * dy);
      if (len < 0.001) return;
      const nx = -dy / len, ny = dx / len;
      dimP1 = { x: p1.x + nx * ann.offset, y: p1.y + ny * ann.offset };
      dimP2 = { x: p2.x + nx * ann.offset, y: p2.y + ny * ann.offset };
      value = len;
    }
    const sa = w2o(p1.x, p1.y), sb = w2o(p2.x, p2.y);
    const so1 = w2o(dimP1.x, dimP1.y), so2 = w2o(dimP2.x, dimP2.y);
    octx.setLineDash([3, 3]);
    octx.beginPath();
    octx.moveTo(sa.x, sa.y); octx.lineTo(so1.x, so1.y);
    octx.moveTo(sb.x, sb.y); octx.lineTo(so2.x, so2.y);
    octx.stroke();
    octx.setLineDash([]);
    octx.beginPath();
    octx.moveTo(so1.x, so1.y); octx.lineTo(so2.x, so2.y);
    octx.stroke();
    const ang = Math.atan2(so2.y - so1.y, so2.x - so1.x);
    arrow(so1.x, so1.y, ang);
    arrow(so2.x, so2.y, ang + Math.PI);
    const isV = Math.abs(Math.sin(ang)) > Math.abs(Math.cos(ang));
    text((so1.x + so2.x) / 2, (so1.y + so2.y) / 2, formatDist(value), isV ? -Math.PI / 2 : 0);
    return;
  }

  if (ann.type === 'diameter' || ann.type === 'radius') {
    const cosA = Math.cos(ann.angle), sinA = Math.sin(ann.angle);
    const useLeader = typeof ann.leaderDist === 'number' && ann.leaderDist > ann.r * 1.05;
    const sc = w2o(ann.cx, ann.cy);
    const near = w2o(ann.cx + ann.r * cosA, ann.cy + ann.r * sinA);
    if (ann.type === 'diameter') {
      const far = w2o(ann.cx - ann.r * cosA, ann.cy - ann.r * sinA);
      if (useLeader) {
        const lead = w2o(ann.cx + ann.leaderDist * cosA, ann.cy + ann.leaderDist * sinA);
        octx.beginPath(); octx.moveTo(far.x, far.y); octx.lineTo(lead.x, lead.y); octx.stroke();
        const ang = Math.atan2(lead.y - far.y, lead.x - far.x);
        arrow(near.x, near.y, ang);
        arrow(far.x, far.y, ang + Math.PI);
        text((near.x + lead.x) / 2, (near.y + lead.y) / 2, '\u2300' + formatDist(ann.r * 2), 0);
      } else {
        octx.beginPath(); octx.moveTo(far.x, far.y); octx.lineTo(near.x, near.y); octx.stroke();
        const ang = Math.atan2(near.y - far.y, near.x - far.x);
        arrow(near.x, near.y, ang);
        arrow(far.x, far.y, ang + Math.PI);
        text((far.x + near.x) / 2, (far.y + near.y) / 2, '\u2300' + formatDist(ann.r * 2), 0);
      }
    } else {
      if (useLeader) {
        const lead = w2o(ann.cx + ann.leaderDist * cosA, ann.cy + ann.leaderDist * sinA);
        octx.beginPath(); octx.moveTo(sc.x, sc.y); octx.lineTo(lead.x, lead.y); octx.stroke();
        const ang = Math.atan2(lead.y - sc.y, lead.x - sc.x);
        arrow(near.x, near.y, ang);
        text((near.x + lead.x) / 2, (near.y + lead.y) / 2, 'R' + formatDist(ann.r), 0);
      } else {
        octx.beginPath(); octx.moveTo(sc.x, sc.y); octx.lineTo(near.x, near.y); octx.stroke();
        const ang = Math.atan2(near.y - sc.y, near.x - sc.x);
        arrow(near.x, near.y, ang);
        text((sc.x + near.x) / 2, (sc.y + near.y) / 2, 'R' + formatDist(ann.r), 0);
      }
    }
    return;
  }

  if (ann.type === 'angle') {
    const sc = w2o(ann.cx, ann.cy);
    const rPix = ann.r * pxPerUnit;
    const startPt = w2o(ann.cx + ann.r * Math.cos(ann.startAngle), ann.cy + ann.r * Math.sin(ann.startAngle));
    const endPt = w2o(ann.cx + ann.r * Math.cos(ann.endAngle), ann.cy + ann.r * Math.sin(ann.endAngle));
    octx.setLineDash([3, 3]);
    octx.beginPath();
    octx.moveTo(sc.x, sc.y); octx.lineTo(startPt.x, startPt.y);
    octx.moveTo(sc.x, sc.y); octx.lineTo(endPt.x, endPt.y);
    octx.stroke();
    octx.setLineDash([]);
    octx.beginPath();
    // Y inverted
    octx.arc(sc.x, sc.y, rPix, -ann.endAngle, -ann.startAngle);
    octx.stroke();
    const mid = (ann.startAngle + ann.endAngle) / 2;
    const midPt = w2o(ann.cx + ann.r * Math.cos(mid), ann.cy + ann.r * Math.sin(mid));
    text(midPt.x, midPt.y, ann.value.toFixed(dimStyle.decimals) + '\u00B0', 0);
    return;
  }
}

function handleDrawClick(pt) {
  drawState.points.push(pt);

  switch (drawState.mode) {
    case 'line':
      if (drawState.points.length === 2) {
        const [p1, p2] = drawState.points;
        saveUndoState();
        entities.push({ type: 'LINE', layer: '0', color: 7, x1: p1.x, y1: p1.y, x2: p2.x, y2: p2.y });
        drawState.points = [p2];
        updateEntityList(); render();
      }
      break;
    case 'construction':
      if (drawState.points.length === 2) {
        const [p1, p2] = drawState.points;
        saveUndoState();
        entities.push({ type: 'LINE', layer: '0', color: 7, x1: p1.x, y1: p1.y, x2: p2.x, y2: p2.y, _isConstruction: true });
        drawState.points = [p2];
        updateEntityList(); render();
      }
      break;
    case 'rect':
      if (drawState.points.length === 2) {
        const [p1, p2] = drawState.points;
        saveUndoState();
        const verts = [
          { x: p1.x, y: p1.y, bulge: 0 }, { x: p2.x, y: p1.y, bulge: 0 },
          { x: p2.x, y: p2.y, bulge: 0 }, { x: p1.x, y: p2.y, bulge: 0 }
        ];
        entities.push({ type: 'LWPOLYLINE', layer: '0', color: 7, vertices: verts, closed: true });
        cancelDraw(); updateEntityList(); render();
      }
      break;
    case 'circle':
      if (drawState.points.length === 2) {
        const [c, p] = drawState.points;
        saveUndoState();
        const r = Math.sqrt((p.x - c.x) ** 2 + (p.y - c.y) ** 2);
        entities.push({ type: 'CIRCLE', layer: '0', color: 7, cx: c.x, cy: c.y, r });
        cancelDraw(); updateEntityList(); render();
      }
      break;
    case 'measure':
      if (drawState.points.length === 2) {
        const [p1, p2] = drawState.points;
        const d = Math.sqrt((p2.x - p1.x) ** 2 + (p2.y - p1.y) ** 2);
        alert(`距離: ${formatDist(d)}\ndX: ${formatDist(Math.abs(p2.x - p1.x))}\ndY: ${formatDist(Math.abs(p2.y - p1.y))}`);
        cancelDraw(); render();
      }
      break;
    case 'text': {
      const p = drawState.points[drawState.points.length - 1];
      const text = prompt('文字を入力してください:');
      drawState.points = [];
      if (text && text.trim()) {
        const heightPx = 14;
        const heightWorld = heightPx / cam.zoom;
        saveUndoState();
        entities.push({
          type: 'TEXT', layer: '0', color: 7,
          x: p.x, y: p.y,
          height: heightWorld,
          text: text,
          rotation: 0, halign: 0, valign: 0,
        });
        updateEntityList(); render();
      }
      break;
    }
    case 'printRange':
      if (drawState.points.length === 2) {
        const [p1, p2] = drawState.points;
        const minX = Math.min(p1.x, p2.x), maxX = Math.max(p1.x, p2.x);
        const minY = Math.min(p1.y, p2.y), maxY = Math.max(p1.y, p2.y);
        cancelDraw();
        printRange(minX, minY, maxX, maxY);
      }
      break;
    case 'boxDelete':
      if (drawState.points.length === 2) {
        const [p1, p2] = drawState.points;
        const minX = Math.min(p1.x, p2.x), maxX = Math.max(p1.x, p2.x);
        const minY = Math.min(p1.y, p2.y), maxY = Math.max(p1.y, p2.y);
        cancelDraw();
        deleteInBox(minX, minY, maxX, maxY);
      }
      break;
  }
}

// ============================================================
//  Smart Dimension Click Handler
// ============================================================
function handleSmartDimClick(w, shiftKey) {
  const indicator = document.getElementById('drawMode');

  if (smartDimState.phase === 'pick1') {
    const det = detectEntityAtPoint(w.x, w.y);
    if (!det) return;
    smartDimState.sel1 = det;
    smartDimState.shiftKey = shiftKey;
    smartDimState.hoverEntity = null;

    if (det.kind === 'point') {
      // Point selected - must pick a second point/entity
      smartDimState.phase = 'pick2';
      indicator.textContent = 'スマート寸法: 2つ目の点/エッジ/円をクリック  (右クリックでキャンセル)';
    } else {
      // Line or circle - can go to pick2 for a second entity, or place directly
      smartDimState.phase = 'pick2';
      indicator.textContent = 'スマート寸法: 2つ目をクリック or 空白クリックで配置へ (Shift=半径)  (右クリックでキャンセル)';
    }
    render();
    return;
  }

  if (smartDimState.phase === 'pick2') {
    const det = detectEntityAtPoint(w.x, w.y);

    if (det) {
      // Check it's not the exact same entity
      const s1 = smartDimState.sel1;
      const isSame =
        (s1.kind === 'point' && det.kind === 'point' && s1.x === det.x && s1.y === det.y) ||
        (s1.kind === 'line' && det.kind === 'line' && s1.x1 === det.x1 && s1.y1 === det.y1 && s1.x2 === det.x2 && s1.y2 === det.y2) ||
        (s1.kind === 'circle' && det.kind === 'circle' && s1.cx === det.cx && s1.cy === det.cy && s1.r === det.r);

      if (!isSame) {
        smartDimState.sel2 = det;
      }
    }

    // If first selection is a point and no second entity detected, ignore click (need a target)
    if (smartDimState.sel1.kind === 'point' && !smartDimState.sel2) return;

    if (shiftKey) smartDimState.shiftKey = true;

    // Move to placement phase
    smartDimState.phase = 'place';
    smartDimState.hoverEntity = null;
    indicator.textContent = 'スマート寸法: マウスで配置位置を決めてクリック  (右クリックでキャンセル)';
    render();
    return;
  }

  if (smartDimState.phase === 'place') {
    const dim = computeSmartDim(smartDimState.sel1, smartDimState.sel2, w);
    if (dim) {
      if (dim.type === 'diameter' && (shiftKey || smartDimState.shiftKey)) {
        dim.type = 'radius';
      }
      saveUndoState();
      annotations.push(dim);
      saveAnnotations();
    }
    // Reset for next dimension (stay in smartDim mode)
    smartDimState = { phase: 'pick1', sel1: null, sel2: null, hoverEntity: null };
    indicator.textContent = 'スマート寸法: 点/エッジ/円をクリック (Shift=半径)  (右クリックでキャンセル)';
    render();
  }
}

// ============================================================
//  DXF Export
// ============================================================
function exportDXF() {
  let dxf = '0\nSECTION\n2\nENTITIES\n';

  for (const e of entities) {
    switch (e.type) {
      case 'LINE':
        dxf += `0\nLINE\n8\n${e.layer}\n62\n${e.color}\n10\n${e.x1}\n20\n${e.y1}\n30\n0\n11\n${e.x2}\n21\n${e.y2}\n31\n0\n`;
        break;
      case 'CIRCLE':
        dxf += `0\nCIRCLE\n8\n${e.layer}\n62\n${e.color}\n10\n${e.cx}\n20\n${e.cy}\n30\n0\n40\n${e.r}\n`;
        break;
      case 'ARC':
        dxf += `0\nARC\n8\n${e.layer}\n62\n${e.color}\n10\n${e.cx}\n20\n${e.cy}\n30\n0\n40\n${e.r}\n50\n${e.startAngle}\n51\n${e.endAngle}\n`;
        break;
      case 'LWPOLYLINE': {
        const flag = e.closed ? 1 : 0;
        dxf += `0\nLWPOLYLINE\n8\n${e.layer}\n62\n${e.color}\n90\n${e.vertices.length}\n70\n${flag}\n`;
        for (const v of e.vertices) dxf += `10\n${v.x}\n20\n${v.y}\n`;
        break;
      }
      case 'TEXT':
        dxf += `0\nTEXT\n8\n${e.layer}\n62\n${e.color}\n10\n${e.x}\n20\n${e.y}\n30\n0\n40\n${e.height}\n1\n${e.text}\n`;
        break;
    }
  }

  dxf += '0\nENDSEC\n0\nEOF\n';
  const blob = new Blob([dxf], { type: 'application/dxf' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'drawing.dxf';
  a.click();
}

// ============================================================
//  File Loading (with Shift-JIS support)
// ============================================================
async function loadDXFFile(file) {
  let text;

  // Try UTF-8 first
  text = await file.text();

  // Check for garbled characters (common indicator: replacement character or suspicious patterns)
  const hasGarbled = /[\uFFFD]/.test(text) || (/[\x80-\xFF]/.test(text) && !/[\u3000-\u9FFF\uF900-\uFAFF]/.test(text));

  if (hasGarbled) {
    // Try Shift-JIS (common for Japanese CAD software)
    try {
      const buffer = await file.arrayBuffer();
      const decoder = new TextDecoder('shift-jis');
      text = decoder.decode(buffer);
    } catch (e) {
      // Try EUC-JP
      try {
        const buffer = await file.arrayBuffer();
        const decoder = new TextDecoder('euc-jp');
        text = decoder.decode(buffer);
      } catch (e2) {
        // Fallback to original
      }
    }
  }

  // Also try Shift-JIS proactively if no Japanese chars detected but file may be Japanese
  if (!/[\u3000-\u9FFF]/.test(text) && /[\x80-\xFF]/.test(text)) {
    try {
      const buffer = await file.arrayBuffer();
      const sjisText = new TextDecoder('shift-jis').decode(buffer);
      if (/[\u3000-\u9FFF]/.test(sjisText)) {
        text = sjisText;
      }
    } catch (e) {}
  }

  entities = parseDXF(text);
  // Switch annotation scope to this file (annotations are stored per filename)
  currentFileKey = file.name || '__default__';
  loadAnnotationsForCurrentFile();
  undoStack = [];
  redoStack = [];
  updateUndoButtons();
  selectedEntity = -1;
  selectedAnnotation = -1;
  document.getElementById('infoPanel').style.display = 'none';
  updateEntityList();
  fitAll();
}

document.getElementById('fileInput').addEventListener('change', e => {

});

//  Toolbar Button Handlers
// ============================================================
function updateToolbarButtons() {
  document.querySelectorAll('#toolbar button').forEach(btn => {
    if (['btnGrid', 'btnSnap', 'btnUndo', 'btnRedo'].includes(btn.id)) return;
    if (btn.id === 'btnDrawLine') btn.classList.toggle('active', drawState.mode === 'line');
    else if (btn.id === 'btnConstruction') btn.classList.toggle('active', drawState.mode === 'construction');
    else if (btn.id === 'btnText') btn.classList.toggle('active', drawState.mode === 'text');
    else if (btn.id === 'btnBoxDelete') btn.classList.toggle('active', drawState.mode === 'boxDelete');
    else if (btn.id === 'btnPrint') btn.classList.toggle('active', drawState.mode === 'printRange');
    else if (btn.id === 'btnDrawRect') btn.classList.toggle('active', drawState.mode === 'rect');
    else if (btn.id === 'btnDrawCircle') btn.classList.toggle('active', drawState.mode === 'circle');
    else if (btn.id === 'btnSmartDim') btn.classList.toggle('active', drawState.mode === 'smartDim');
    else if (btn.id === 'btnMeasure') btn.classList.toggle('active', drawState.mode === 'measure');
  });
}

// ===== Settings panel =====
(function initSettingsPanel() {
  const panel = document.getElementById('settingsPanel');
  const btn = document.getElementById('btnSettings');
  btn.onclick = (e) => { e.stopPropagation(); panel.classList.toggle('open'); };
  document.addEventListener('click', (e) => {
    if (!panel.contains(e.target) && e.target !== btn) panel.classList.remove('open');
  });

  const bindings = [
    ['setSizeMultiplier', 'sizeMultiplier', 'setSizeMultiplierVal', v => '×' + v.toFixed(1), parseFloat],
    ['setFontSize', 'fontSize', 'setFontSizeVal', v => v + 'px', parseInt],
    ['setArrowSize', 'arrowSize', 'setArrowSizeVal', v => v + 'px', parseInt],
    ['setLineWidth', 'lineWidth', 'setLineWidthVal', v => v.toFixed(1), parseFloat],
    ['setBgAlpha', 'bgAlpha', 'setBgAlphaVal', v => v.toFixed(2), parseFloat],
  ];
  const sync = () => {
    bindings.forEach(([id, key, valId, fmt]) => {
      document.getElementById(id).value = dimStyle[key];
      document.getElementById(valId).textContent = fmt(dimStyle[key]);
    });
    document.getElementById('setDecimals').value = dimStyle.decimals;
    document.getElementById('setTextColor').value = dimStyle.textColor;
    document.getElementById('setLineColor').value = dimStyle.lineColor;
    document.getElementById('setShowUnit').checked = !!dimStyle.showUnit;
  };
  bindings.forEach(([id, key, valId, fmt, parse]) => {
    document.getElementById(id).oninput = function() {
      dimStyle[key] = parse(this.value);
      document.getElementById(valId).textContent = fmt(dimStyle[key]);
      saveDimStyle(); render();
    };
  });
  document.getElementById('setDecimals').oninput = function() {
    dimStyle.decimals = Math.max(0, Math.min(5, parseInt(this.value) || 0));
    saveDimStyle(); render();
  };
  document.getElementById('setTextColor').oninput = function() {
    dimStyle.textColor = this.value; saveDimStyle(); render();
  };
  document.getElementById('setLineColor').oninput = function() {
    dimStyle.lineColor = this.value; saveDimStyle(); render();
  };
  document.getElementById('setShowUnit').onchange = function() {
    dimStyle.showUnit = this.checked; saveDimStyle(); render();
  };
  document.getElementById('setReset').onclick = function() {
    dimStyle = { ...DIM_STYLE_DEFAULTS };
    saveDimStyle(); sync(); render();
  };
  sync();
})();

// ============================================================
//  Keyboard Shortcuts
// ============================================================
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;

  // Ctrl+Z undo, Ctrl+Y redo
  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z') { e.preventDefault(); undo(); return; }
  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'y') { e.preventDefault(); redo(); return; }

  switch (e.key.toLowerCase()) {
    case 'f': fitAll(); break;
    case 'z': document.getElementById('btnZoomBox').click(); break;
    case 'l': setDrawMode(drawState.mode === 'line' ? null : 'line'); break;
    case 'r': setDrawMode(drawState.mode === 'rect' ? null : 'rect'); break;
    case 'c': setDrawMode(drawState.mode === 'circle' ? null : 'circle'); break;
    case 'm': setDrawMode(drawState.mode === 'measure' ? null : 'measure'); break;
    case 'd': setDrawMode(drawState.mode === 'smartDim' ? null : 'smartDim'); break;
    case 'x': setDrawMode(drawState.mode === 'construction' ? null : 'construction'); break;
    case 't': setDrawMode(drawState.mode === 'text' ? null : 'text'); break;
    case 'g': document.getElementById('btnGrid').click(); break;
    case 's': document.getElementById('btnSnap').click(); break;
    case 'escape':
      if (zoomBoxMode) {
        zoomBoxMode = false;
        zoomBoxState.active = false;
        document.getElementById('btnZoomBox').classList.remove('active');
        canvas.style.cursor = 'default';
        render();
      }
      cancelDraw();
      break;
    case 'delete': case 'backspace':
      if (selectedAnnotation >= 0) {
        saveUndoState();
        annotations.splice(selectedAnnotation, 1);
        saveAnnotations();
        selectedAnnotation = -1;
        render();
      } else if (selectedEntity >= 0) {
        saveUndoState();
        entities.splice(selectedEntity, 1);
        selectedEntity = -1;
        document.getElementById('infoPanel').style.display = 'none';
        updateEntityList(); render();
      }
      break;
  }
});

// URLパラメータからDXFファイルを自動ロード（What'sNo連携）
(function () {
  const params = new URLSearchParams(window.location.search);
  const fileUrl = params.get('url');
  const fileName = params.get('name') || 'file.dxf';
  if (!fileUrl) { loadSample(); return; }
  document.title = fileName + ' — SheetEye';
  const titleEl = document.querySelector('.app-title');
  if (titleEl) titleEl.textContent = fileName;
  fetch(fileUrl)
    .then(function (r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.arrayBuffer();
    })
    .then(function (buffer) {
      var text = new TextDecoder('utf-8').decode(buffer);
      if (/[�]/.test(text) || (/[\x80-\xFF]/.test(text) && !/[　-鿿]/.test(text))) {
        try { text = new TextDecoder('shift-jis').decode(buffer); } catch (e) {}
      }
      entities = parseDXF(text);
      currentFileKey = fileName;
      loadAnnotationsForCurrentFile();
      undoStack = []; redoStack = [];
      updateUndoButtons();
      selectedEntity = -1; selectedAnnotation = -1;
      document.getElementById('infoPanel').style.display = 'none';
      updateEntityList();
      fitAll();
    })
    .catch(function (err) {
      console.error('SheetEye auto-load error:', err);
      loadSample();
    });
})();
