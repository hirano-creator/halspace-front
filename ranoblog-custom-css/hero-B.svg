<?xml version="1.0" encoding="UTF-8"?>
<!-- 案B: Manifesto Strip — 3列横並び、太い罫線で挟む -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 680" width="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&amp;family=JetBrains+Mono:wght@400&amp;display=swap');
    </style>
  </defs>
  <rect width="1920" height="680" fill="#fff"/>

  <!-- 上部太線 -->
  <line x1="0" y1="160" x2="1920" y2="160" stroke="#0a0a0a" stroke-width="3"/>

  <!-- 3列 -->
  <text x="320" y="390" font-family="'Space Grotesk',sans-serif" font-size="130" font-weight="700" fill="#0a0a0a" text-anchor="middle">OBSERVE</text>
  <text x="960" y="390" font-family="'Space Grotesk',sans-serif" font-size="130" font-weight="700" fill="#0a0a0a" text-anchor="middle">BUILD</text>
  <text x="1600" y="390" font-family="'Space Grotesk',sans-serif" font-size="130" font-weight="700" fill="#0a0a0a" text-anchor="middle">SHARE</text>

  <!-- 縦区切り -->
  <line x1="640" y1="175" x2="640" y2="510" stroke="#e0e0e0" stroke-width="1"/>
  <line x1="1280" y1="175" x2="1280" y2="510" stroke="#e0e0e0" stroke-width="1"/>

  <!-- 下部太線 -->
  <line x1="0" y1="510" x2="1920" y2="510" stroke="#0a0a0a" stroke-width="3"/>

  <!-- フッター -->
  <text x="960" y="590" font-family="'JetBrains Mono',monospace" font-size="14" fill="#aaa" text-anchor="middle" letter-spacing="6">ranoBlog — INVEST / AI / WEB / STEEL / CLAUDE</text>
  <text x="960" y="650" font-family="'JetBrains Mono',monospace" font-size="12" fill="#ccc" text-anchor="middle" letter-spacing="4">A QUIET MAKER'S JOURNAL</text>
</svg>
