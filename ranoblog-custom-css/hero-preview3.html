<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hero Image センター5案</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #e8e8e8; font-family: -apple-system, "Noto Sans JP", sans-serif; padding: 30px 16px; }
  .section { margin-bottom: 40px; }
  .label {
    font-family: monospace;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 8px;
    padding-left: 2px;
  }
  .frame {
    width: 100%;
    background: #fff;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  }
  .frame img { width: 100%; height: auto; display: block; }
  h1 {
    font-family: monospace;
    font-size: 11px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: #999;
    text-align: center;
    margin-bottom: 36px;
  }
  /* スマホ確認用インジケーター */
  .mobile-bar {
    width: 390px;
    max-width: 100%;
    margin: 0 auto 40px;
    padding: 8px 12px;
    background: #0a0a0a;
    color: #888;
    font-family: monospace;
    font-size: 10px;
    letter-spacing: 3px;
    text-align: center;
  }
</style>
</head>
<body>
  <h1>Center Hero — 5案</h1>
  <div class="mobile-bar">← 390px スマホ幅プレビュー →</div>

  <div class="section">
    <div class="label">案K — Center Lines（上下太線フレーム）</div>
    <div class="frame"><img src="hero-K.svg" alt="案K"></div>
  </div>

  <div class="section">
    <div class="label">案L — Center Circle（円形フレーム）</div>
    <div class="frame"><img src="hero-L.svg" alt="案L"></div>
  </div>

  <div class="section">
    <div class="label">案M — Center Cross（十字線 + 細ボックス）</div>
    <div class="frame"><img src="hero-M.svg" alt="案M"></div>
  </div>

  <div class="section">
    <div class="label">案N — Center Contrast（太/細 交互コントラスト）</div>
    <div class="frame"><img src="hero-N.svg" alt="案N"></div>
  </div>

  <div class="section">
    <div class="label">案O — Center Badge（黒バッジ中央配置）</div>
    <div class="frame"><img src="hero-O.svg" alt="案O"></div>
  </div>
</body>
</html>
