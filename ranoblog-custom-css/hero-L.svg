<?xml version="1.0" encoding="UTF-8"?>
<!-- 案L: Center Circle — 円形フレームの中央にテキスト -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;600&amp;family=JetBrains+Mono:wght@400&amp;display=swap');
    </style>
  </defs>
  <rect width="1200" height="700" fill="#fff"/>

  <!-- 大きな円フレーム -->
  <circle cx="600" cy="350" r="300" fill="none" stroke="#0a0a0a" stroke-width="1.5"/>
  <!-- 内側の薄い円 -->
  <circle cx="600" cy="350" r="290" fill="none" stroke="#e8e8e8" stroke-width="1"/>

  <!-- 中央テキスト -->
  <text x="600" y="290" font-family="'Space Grotesk',sans-serif" font-size="86" font-weight="600" fill="#0a0a0a" text-anchor="middle" letter-spacing="-2">Observe.</text>
  <text x="600" y="375" font-family="'Space Grotesk',sans-serif" font-size="86" font-weight="600" fill="#0a0a0a" text-anchor="middle" letter-spacing="-2">Build.</text>
  <text x="600" y="460" font-family="'Space Grotesk',sans-serif" font-size="86" font-weight="600" fill="#0a0a0a" text-anchor="middle" letter-spacing="-2">Share.</text>

  <!-- 円に沿ったブランドテキスト（上部） -->
  <text x="600" y="95" font-family="'JetBrains Mono',monospace" font-size="12" fill="#bbb" text-anchor="middle" letter-spacing="6">ranoBlog</text>

  <!-- 円の左右の水平線 -->
  <line x1="0" y1="350" x2="290" y2="350" stroke="#ebebeb" stroke-width="1"/>
  <line x1="910" y1="350" x2="1200" y2="350" stroke="#ebebeb" stroke-width="1"/>

  <!-- 下部カテゴリ -->
  <text x="600" y="620" font-family="'JetBrains Mono',monospace" font-size="11" fill="#ccc" text-anchor="middle" letter-spacing="5">INVEST · AI · WEB · STEEL · CLAUDE</text>
</svg>
