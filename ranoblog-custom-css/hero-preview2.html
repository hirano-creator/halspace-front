<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hero Image 5案（新）プレビュー</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #ebebeb; font-family: -apple-system, "Noto Sans JP", sans-serif; padding: 40px 20px; }
  .section { margin-bottom: 50px; }
  .label {
    font-family: monospace;
    font-size: 11px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 10px;
    padding-left: 4px;
  }
  .frame {
    width: 100%;
    background: #fff;
    box-shadow: 0 4px 24px rgba(0,0,0,0.12);
    overflow: hidden;
  }
  .frame img { width: 100%; height: auto; display: block; }
  h1 {
    font-family: monospace;
    font-size: 12px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: #999;
    text-align: center;
    margin-bottom: 40px;
  }
</style>
</head>
<body>
  <h1>ranoBlog — New Hero 5案</h1>

  <div class="section">
    <div class="label">案F — Dark Mode（黒背景・グリッドライン）</div>
    <div class="frame"><img src="hero-F.svg" alt="案F"></div>
  </div>

  <div class="section">
    <div class="label">案G — Dictionary Style（辞書定義風・左右2段）</div>
    <div class="frame"><img src="hero-G.svg" alt="案G"></div>
  </div>

  <div class="section">
    <div class="label">案H — Notebook Lines（ノート罫線風）</div>
    <div class="frame"><img src="hero-H.svg" alt="案H"></div>
  </div>

  <div class="section">
    <div class="label">案I — Ticker Strip（上下テロップ帯・中央大文字）</div>
    <div class="frame"><img src="hero-I.svg" alt="案I"></div>
  </div>

  <div class="section">
    <div class="label">案J — Watermark Initial（巨大透かし文字「r」）</div>
    <div class="frame"><img src="hero-J.svg" alt="案J"></div>
  </div>
</body>
</html>
