<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hero Image 5案 プレビュー</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f0f0f0; font-family: -apple-system, "Noto Sans JP", sans-serif; padding: 40px 20px; }
  .section { margin-bottom: 60px; }
  .label {
    font-family: monospace;
    font-size: 12px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 12px;
    padding-left: 4px;
  }
  .frame {
    width: 100%;
    background: #fff;
    box-shadow: 0 2px 20px rgba(0,0,0,0.1);
    overflow: hidden;
  }
  .frame img {
    width: 100%;
    height: auto;
    display: block;
  }
  h1 {
    font-family: monospace;
    font-size: 13px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: #aaa;
    text-align: center;
    margin-bottom: 50px;
  }
</style>
</head>
<body>
  <h1>ranoBlog — Hero Image 5案</h1>

  <div class="section">
    <div class="label">案A — Terminal / CLI スタイル</div>
    <div class="frame"><img src="hero-A.svg" alt="案A"></div>
  </div>

  <div class="section">
    <div class="label">案B — Manifesto Strip（3列）</div>
    <div class="frame"><img src="hero-B.svg" alt="案B"></div>
  </div>

  <div class="section">
    <div class="label">案C — Number Stack（番号付き雑誌風）</div>
    <div class="frame"><img src="hero-C.svg" alt="案C"></div>
  </div>

  <div class="section">
    <div class="label">案D — Center Minimal（中央・余白重視）</div>
    <div class="frame"><img src="hero-D.svg" alt="案D"></div>
  </div>

  <div class="section">
    <div class="label">案E — Split Left/Right（左黒・右白）</div>
    <div class="frame"><img src="hero-E.svg" alt="案E"></div>
  </div>
</body>
</html>
