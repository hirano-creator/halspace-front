<?xml version="1.0" encoding="UTF-8"?>
<!-- 案O: Center Badge — 角丸の黒バッジ中央配置、周囲は白余白 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&amp;family=JetBrains+Mono:wght@400&amp;display=swap');
    </style>
  </defs>
  <rect width="1200" height="700" fill="#fff"/>

  <!-- 極細外枠 -->
  <rect x="40" y="40" width="1120" height="620" fill="none" stroke="#efefef" stroke-width="1"/>

  <!-- 中央の黒バッジ -->
  <rect x="200" y="130" width="800" height="440" rx="0" fill="#0a0a0a"/>

  <!-- バッジ内テキスト -->
  <text x="600" y="295" font-family="'Space Grotesk',sans-serif" font-size="95" font-weight="700" fill="#fff" text-anchor="middle" letter-spacing="-2">Observe.</text>
  <text x="600" y="385" font-family="'Space Grotesk',sans-serif" font-size="95" font-weight="300" fill="#555" text-anchor="middle" letter-spacing="-2">Build.</text>
  <text x="600" y="475" font-family="'Space Grotesk',sans-serif" font-size="95" font-weight="700" fill="#fff" text-anchor="middle" letter-spacing="-2">Share.</text>

  <!-- バッジ内下部 -->
  <line x1="260" y1="510" x2="940" y2="510" stroke="#222" stroke-width="1"/>
  <text x="600" y="545" font-family="'JetBrains Mono',monospace" font-size="12" fill="#555" text-anchor="middle" letter-spacing="5">ranoBlog  ·  2026</text>

  <!-- 外部カテゴリ（バッジ下） -->
  <text x="600" y="630" font-family="'JetBrains Mono',monospace" font-size="11" fill="#ccc" text-anchor="middle" letter-spacing="5">INVEST · AI · WEB · STEEL · CLAUDE</text>
</svg>
