<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#0a0a0a">
<link rel="manifest" href="../manifest.json">
<link rel="icon" type="image/svg+xml" href="../assets/icon.svg">
<link rel="icon" type="image/png" sizes="192x192" href="../assets/icon-192.png">
<link rel="apple-touch-icon" href="../assets/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>通知 — a.a</title>
<link rel="stylesheet" href="../assets/app.css">
</head>
<body>
  <div class="wrap">
    <header class="appbar">
      <button class="icon-btn" onclick="location.href='./feed.html'" title="ホームへ戻る"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M15 18l-6-6 6-6"/></svg></button>
      <div class="title">通知</div>
      <button class="icon-btn" id="readAll" title="すべて既読"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M20 6L9 17l-5-5"/></svg></button>
    </header>

    <div class="scroll" id="list"><div class="center">読み込み中…</div></div>

    <nav class="tabbar">
      <a class="tab" href="./feed.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>ホーム</a>
      <a class="tab" href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>さがす</a>
      <a class="fab" href="./compose.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1"><path d="M12 5v14M5 12h14"/></svg></a>
      <a class="tab on" href="./notifications.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>通知</a>
      <a class="tab" href="./profile.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>自分</a>
    </nav>
  </div>

  <script src="../assets/aa-api.js"></script>
  <script src="../assets/aa-shell.js"></script>
  <script>
    if (!AA.isAuthed()) location.replace('../index.html');
    const esc = (s)=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
    const ICONS = {
      comment:'<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>',
      reaction:'<path d="M2 11h3.2v10H2zM7 21V11l4.2-8.1a1.7 1.7 0 0 1 3.2 1l-.2 4.2h5a2 2 0 0 1 2 2.4l-1.4 7a2 2 0 0 1-2 1.6H7z"/>',
      follow:'<circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/>',
      mention:'<path d="M4 4h16v12H7l-3 3z"/>',
      news:'<circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 16h.01"/>'
    };
    function row(n){
      const unread = !n.read_at;
      const acc = n.type==='news';
      const label = {comment:'コメント',reaction:'参考になった',follow:'フォロー',mention:'メンション',news:'ニュース'}[n.type]||'';
      const text = n.body ? esc(n.body) : (n.actor_name ? `<b>${esc(n.actor_name)}</b> さんの${label}` : label);
      return `<div style="display:flex;gap:13px;padding:16px 18px;align-items:flex-start;${unread?'background:var(--accent-bg)':''}">
        <div style="width:38px;height:38px;border-radius:50%;flex:0 0 38px;display:flex;align-items:center;justify-content:center;${acc?'background:var(--accent);color:#fff':'background:var(--soft);color:var(--ink)'}">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="${n.type==='reaction'?'currentColor':'none'}" stroke="currentColor" stroke-width="1.7">${ICONS[n.type]||ICONS.comment}</svg>
        </div>
        <div style="flex:1"><div style="font-size:13px;line-height:1.55">${n.type==='news'?`<b>${esc(n.actor_name||'新着')}</b> `:''}${text}</div>
        <div style="font-size:11px;color:var(--mute);margin-top:3px">${label}</div></div>
        ${unread?'<div style="width:8px;height:8px;border-radius:50%;background:var(--accent);margin-top:6px"></div>':''}
      </div>`;
    }
    const renderList = (data) => (data && data.length)
      ? data.map(row).join('')
      : '<div class="center">通知はまだありません</div>';
    async function load(){
      const el = document.getElementById('list');
      // 前回取得分を即描画→裏で最新取得（stale-while-revalidate）
      let cached = null;
      try { cached = localStorage.getItem('aa_notif_cache'); } catch(e){}
      if (cached) { try { el.innerHTML = renderList(JSON.parse(cached)); } catch(e){ cached = null; } }
      try {
        const r = await AA.notifications();
        const fresh = JSON.stringify(r.data || []);
        try { localStorage.setItem('aa_notif_cache', fresh); } catch(e){}
        if (fresh !== cached) el.innerHTML = renderList(r.data || []);
      } catch(e){
        if (!AA.isAuthed()) { location.replace('../index.html'); return; }
        if (!cached) el.innerHTML = `<div class="center">${esc(e.message)}</div>`;
      }
    }
    document.getElementById('readAll').onclick = async () => { try { await AA.readAllNotif(); load(); } catch(e){} };
    load();
  </script>
</body>
</html>
