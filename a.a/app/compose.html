<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#0a0a0a">
<link rel="manifest" href="../manifest.json">
<link rel="icon" type="image/svg+xml" href="../assets/icon.svg">
<link rel="icon" type="image/png" sizes="192x192" href="../assets/icon-192.png">
<link rel="apple-touch-icon" href="../assets/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>新規投稿 — a.a</title>
<link rel="stylesheet" href="../assets/app.css">
</head>
<body>
  <div class="wrap">
    <header class="appbar">
      <button class="icon-btn" onclick="location.href='./feed.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
      <div class="title">新規投稿</div>
      <span style="width:40px"></span>
    </header>

    <div class="scroll" style="padding:8px 18px">
      <button class="news" id="fromWn" style="width:100%;text-align:left;display:flex;align-items:center;gap:12px;margin:6px 0">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1f48ff" stroke-width="1.7"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        <div><b style="color:#1f48ff;font-size:15.5px">What'sNoから選んで公開</b><div style="font-size:13px;color:#6f7cc6">社内の図面・資料をそのまま業界内に共有</div></div>
      </button>

      <div style="font-size:13.5px;color:var(--mute);font-weight:700;margin:14px 2px 6px">カテゴリ</div>
      <div class="filterbar" id="cats" style="padding-left:0;padding-right:0"></div>

      <textarea id="body" placeholder="共有したいこと・気づきを書く…&#10;例) 採択された補助金の申請のコツ"
        style="width:100%;min-height:120px;font-size:18px;line-height:1.7;outline:none;font-family:var(--sans);margin-top:8px;resize:none"></textarea>

      <div id="preview" style="display:flex;gap:8px;flex-wrap:wrap;margin:8px 0"></div>

      <div class="react" style="margin-top:6px;flex-wrap:wrap">
        <label class="chip" style="cursor:pointer">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>写真
          <input type="file" accept="image/*" capture="environment" multiple hidden id="fPhoto">
        </label>
        <label class="chip" style="cursor:pointer">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="4" width="18" height="14" rx="2"/><path d="M10 9l5 3-5 3z" fill="currentColor"/></svg>動画
          <input type="file" accept="video/*" capture="environment" hidden id="fVideo">
        </label>
        <label class="chip" style="cursor:pointer">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>資料
          <input type="file" accept="application/pdf" hidden id="fDoc">
        </label>
        <button class="chip" id="maskBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="4" width="18" height="14" rx="2"/><path d="M3 9h18"/><rect x="7" y="12" width="5" height="3" fill="currentColor"/></svg>マスク
        </button>
        <button class="chip" id="mosaicBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="4" width="18" height="14" rx="2"/><path d="M3 9h18"/><path d="M8 12h3v3H8zM13 12h3v3h-3z" fill="currentColor" stroke="none"/></svg>モザイク
        </button>
      </div>

      <div style="display:flex;align-items:center;gap:8px;color:var(--mute);font-size:14.5px;margin:12px 2px">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/></svg>
        公開範囲：<b style="color:var(--accent)">業界内</b>（招待メンバー）
      </div>

      <button class="btn primary" id="submit" style="margin-top:6px">投稿する</button>
      <button class="btn voice-btn" id="voiceBtn" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 15a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3z"/><path d="M19 11a7 7 0 0 1-14 0"/><path d="M12 18v4"/><path d="M9 22h6"/></svg>
        <span id="voiceBtnLabel">音声で入力</span>
      </button>
      <div class="voice-interim" id="voiceInterim"></div>
      <div id="msg" style="color:#c0392b;font-size:14.5px;text-align:center;min-height:18px;margin-top:8px"></div>
    </div>
  </div>

  <!-- マスク編集モーダル -->
  <div class="overlay" id="maskModal" style="display:none">
    <div class="sheet">
      <header><span id="maskTitle">マスク（黒塗り）</span><button class="x" id="maskClose"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M18 6L6 18M6 6l12 12"/></svg></button></header>
      <div class="maskhint" id="maskHint">隠したい部分を指でなぞって黒塗りします。元画像は端末から出ません。</div>
      <div class="mosaicctrl" id="mosaicCtrl" style="display:none">
        <span>濃さ</span>
        <input type="range" id="mosaicSize" min="4" max="40" step="1" value="16">
        <span class="n" id="mosaicSizeVal">16</span>
      </div>
      <div class="sbody maskwrap"><canvas class="mask" id="maskCanvas"></canvas></div>
      <footer>
        <button class="btn" id="maskUndo">ひとつ戻す</button>
        <button class="btn" id="maskClear">全消し</button>
        <button class="btn primary" id="maskApply">適用</button>
      </footer>
    </div>
  </div>

  <!-- What'sNo選択モーダル -->
  <div class="overlay" id="wnModal" style="display:none">
    <div class="sheet">
      <header><span>What'sNoから選んで公開</span><button class="x" id="wnClose"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M18 6L6 18M6 6l12 12"/></svg></button></header>
      <div class="sbody" id="wnList"><div class="center">読み込み中…</div></div>
    </div>
  </div>

  <script src="../assets/aa-api.js"></script>
  <script src="../assets/aa-video.js"></script>
  <script src="../assets/aa-pdf.js"></script>
  <script src="../assets/aa-voice.js"></script>
  <script>
    if (!AA.isAuthed()) location.replace('../index.html');
    const esc = (s)=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
    const CATS = ['補助金','セミナー','設備紹介','お知らせ','相談'];
    let cat = '設備紹介';
    let isMasked = false;
    let selectedWn = null; // What'sNoから選んだファイル {id, name, mime_type}
    const files = []; // {file, kind}

    function renderCats(){
      const el = document.getElementById('cats');
      el.innerHTML = CATS.map(c => `<button class="fchip${c===cat?' on':''}" data-c="${c}">${c}</button>`).join('');
      el.querySelectorAll('.fchip').forEach(b => b.onclick = () => { cat = b.dataset.c; renderCats(); });
    }
    function renderPreview(){
      const el = document.getElementById('preview');
      let html = files.map((f,i)=>`<span class="chip">${f.masked?'🖤 ':''}${f.kind==='video'?'動画':f.kind==='document'?'資料':'画像'}：${esc(f.file.name.slice(0,16))} <b data-rm="${i}" style="cursor:pointer">×</b></span>`).join('');
      if (selectedWn) html += `<span class="chip" style="background:var(--accent-bg);color:var(--accent)">📄 What'sNo：${esc(selectedWn.name.slice(0,18))} <b data-rmwn="1" style="cursor:pointer">×</b></span>`;
      el.innerHTML = html;
      el.querySelectorAll('[data-rm]').forEach(b=>b.onclick=()=>{ files.splice(+b.dataset.rm,1); renderPreview(); });
      const rw = el.querySelector('[data-rmwn]'); if (rw) rw.onclick = () => { selectedWn = null; renderPreview(); };
    }
    function add(input, kind){
      input.addEventListener('change', () => { [...input.files].forEach(file => files.push({file,kind})); input.value=''; renderPreview(); });
    }
    add(document.getElementById('fPhoto'),'image');
    add(document.getElementById('fVideo'),'video');
    add(document.getElementById('fDoc'),'document');

    /* ───── マスク編集（canvas黒塗り／モザイク） ───── */
    let mImg, mRects = [], mScale = 1, mTargetIdx = -1, mFromWn = false, mFromDoc = false, mDrawing = null, mMode = 'black';
    let mMosaicSize = 16; // モザイクの粗さ(px)。数値が大きいほど粗く＝濃くなる
    const maskModal = document.getElementById('maskModal');
    const maskTitle = document.getElementById('maskTitle');
    const maskHint = document.getElementById('maskHint');
    const mosaicCtrl = document.getElementById('mosaicCtrl');
    const mosaicSizeInput = document.getElementById('mosaicSize');
    const mosaicSizeVal = document.getElementById('mosaicSizeVal');
    const cv = document.getElementById('maskCanvas');
    const ctx = cv.getContext('2d');

    function openMaskEditor(mode, blobUrl){
      mMode = mode;
      const src = mFromDoc ? '資料（1ページ目）' : '画像';
      maskTitle.textContent = (mode === 'mosaic' ? 'モザイク' : 'マスク（黒塗り）') + (mFromDoc ? ' — 資料1ページ目' : '');
      maskHint.textContent = (mode === 'mosaic' ? `隠したい部分を指でなぞってモザイクをかけます。元${src}は端末から出ません。` : `隠したい部分を指でなぞって黒塗りします。元${src}は端末から出ません。`)
        + (mFromDoc ? ' 適用すると資料は1ページ目のみのマスク済み画像として投稿されます。' : '');
      mosaicCtrl.style.display = mode === 'mosaic' ? 'flex' : 'none';
      const img = new Image();
      img.onload = () => {
        mImg = img; mRects = [];
        const maxW = Math.min(window.innerWidth - 28, 560);
        mScale = Math.min(1, maxW / img.naturalWidth);
        cv.width = Math.round(img.naturalWidth * mScale);
        cv.height = Math.round(img.naturalHeight * mScale);
        redraw();
        maskModal.style.display = 'flex';
        URL.revokeObjectURL(blobUrl);
      };
      img.onerror = () => {
        URL.revokeObjectURL(blobUrl);
        document.getElementById('msg').textContent = '画像の読み込みに失敗しました';
      };
      img.src = blobUrl;
    }
    // PDFはpdf.jsで1ページ目をJPEG化してから編集（元Blob URLは使い終わったら即revoke）
    async function pdfFirstPageBlobUrl(fileOrBlob){
      const srcUrl = URL.createObjectURL(fileOrBlob);
      try {
        const blob = await aaPdfThumbBlob(srcUrl, window.innerWidth);
        return URL.createObjectURL(blob);
      } finally {
        URL.revokeObjectURL(srcUrl);
      }
    }
    // ローカル選択の画像・資料(PDF)は即座に、What'sNoから選んだ画像・PDFは実体を取得してから編集モーダルを開く
    async function openMaskModal(mode){
      const msg = document.getElementById('msg'); msg.textContent = '';
      mTargetIdx = files.findIndex(f => f.kind === 'image' || f.kind === 'document');
      if (mTargetIdx >= 0) {
        mFromWn = false;
        const target = files[mTargetIdx];
        mFromDoc = target.kind === 'document';
        if (!mFromDoc) { openMaskEditor(mode, URL.createObjectURL(target.file)); return; }
        msg.textContent = '資料を読み込み中…';
        try {
          const blobUrl = await pdfFirstPageBlobUrl(target.file);
          msg.textContent = '';
          openMaskEditor(mode, blobUrl);
        } catch (e) {
          msg.textContent = '資料の読み込みに失敗しました';
        }
        return;
      }
      if (selectedWn) {
        const isImg = /^image\//.test(selectedWn.mime_type || '');
        const isPdf = selectedWn.mime_type === 'application/pdf';
        if (isImg || isPdf) {
          mFromWn = true;
          mFromDoc = isPdf;
          msg.textContent = (isPdf ? '資料' : '画像') + 'を読み込み中…';
          try {
            const res = await fetch(AA.wnFileRawUrl(selectedWn.id));
            if (!res.ok) throw new Error();
            const rawBlob = await res.blob();
            const blobUrl = isPdf ? await pdfFirstPageBlobUrl(rawBlob) : URL.createObjectURL(rawBlob);
            msg.textContent = '';
            openMaskEditor(mode, blobUrl);
          } catch (e) {
            msg.textContent = (isPdf ? '資料' : '画像') + 'の読み込みに失敗しました';
          }
          return;
        }
      }
      msg.textContent = 'マスクする画像・資料(PDF)を「写真」または「資料」から追加してください';
    }
    document.getElementById('maskBtn').onclick = () => openMaskModal('black');
    document.getElementById('mosaicBtn').onclick = () => openMaskModal('mosaic');
    mosaicSizeInput.oninput = () => { mMosaicSize = +mosaicSizeInput.value; mosaicSizeVal.textContent = mMosaicSize; redraw(); };

    // ブロック状に粗くする＝一度小さく縮小してから最近傍補間で拡大描画
    function pixelate(targetCtx, sourceImg, sx, sy, sw, sh, dx, dy, dw, dh, blockPx){
      const bw = Math.max(1, Math.round(dw / blockPx));
      const bh = Math.max(1, Math.round(dh / blockPx));
      const tmp = document.createElement('canvas');
      tmp.width = bw; tmp.height = bh;
      tmp.getContext('2d').drawImage(sourceImg, sx, sy, sw, sh, 0, 0, bw, bh);
      targetCtx.imageSmoothingEnabled = false;
      targetCtx.drawImage(tmp, 0, 0, bw, bh, dx, dy, dw, dh);
      targetCtx.imageSmoothingEnabled = true;
    }
    // 濃さ(mMosaicSize)は矩形ごとに固定せず常に現在値を参照する。
    // → スライダーを動かすと、位置指定済みのモザイクも含めて全て即座に濃さが変わる。
    // sizeScale: プレビュー(canvas)ではそのままの値、書き出し(原寸)では mScale で割って同じ見た目の粗さに揃える。
    function drawRect(targetCtx, sourceImg, srcScale, r, sizeScale = 1){
      if (r.mode === 'mosaic') {
        const blockPx = Math.max(1, mMosaicSize / sizeScale);
        pixelate(targetCtx, sourceImg, r.x/srcScale, r.y/srcScale, r.w/srcScale, r.h/srcScale, r.x, r.y, r.w, r.h, blockPx);
      } else {
        targetCtx.fillStyle = '#000';
        targetCtx.fillRect(r.x, r.y, r.w, r.h);
      }
    }
    function redraw(){
      ctx.clearRect(0,0,cv.width,cv.height);
      ctx.drawImage(mImg, 0,0, cv.width, cv.height);
      mRects.forEach(r => drawRect(ctx, mImg, mScale, r));
      if (mDrawing) drawRect(ctx, mImg, mScale, { ...mDrawing, mode: mMode });
    }
    function pos(e){
      const rect = cv.getBoundingClientRect();
      const t = e.touches ? e.touches[0] : e;
      return { x: (t.clientX - rect.left) * (cv.width/rect.width), y: (t.clientY - rect.top) * (cv.height/rect.height) };
    }
    function down(e){ e.preventDefault(); const p = pos(e); mDrawing = { x:p.x, y:p.y, w:0, h:0, sx:p.x, sy:p.y }; }
    function move(e){ if(!mDrawing) return; e.preventDefault(); const p = pos(e);
      mDrawing.x = Math.min(p.x, mDrawing.sx); mDrawing.y = Math.min(p.y, mDrawing.sy);
      mDrawing.w = Math.abs(p.x - mDrawing.sx); mDrawing.h = Math.abs(p.y - mDrawing.sy); redraw(); }
    // window.mouseupはドラッグがcanvas外で終わっても拾うためのグローバル監視。
    // マスク編集を一度も開いていない(mImg未設定)状態で他ボタンをクリックしても発火するのでガード必須。
    function up(){ if(!mImg || !mDrawing) return; if(mDrawing.w>4 && mDrawing.h>4) mRects.push({x:mDrawing.x,y:mDrawing.y,w:mDrawing.w,h:mDrawing.h,mode:mMode}); mDrawing=null; redraw(); }
    cv.addEventListener('mousedown',down); cv.addEventListener('mousemove',move); window.addEventListener('mouseup',up);
    cv.addEventListener('touchstart',down,{passive:false}); cv.addEventListener('touchmove',move,{passive:false}); cv.addEventListener('touchend',up);

    document.getElementById('maskUndo').onclick = () => { mRects.pop(); redraw(); };
    document.getElementById('maskClear').onclick = () => { mRects = []; redraw(); };
    document.getElementById('maskClose').onclick = () => { maskModal.style.display='none'; };
    document.getElementById('maskApply').onclick = () => {
      // 元解像度で合成して書き出し（元画像は送らない）
      // 資料(PDF)由来の場合も出力はkind:'image'に統一＝1ページ目のみのマスク済み画像として投稿される
      const out = document.createElement('canvas');
      out.width = mImg.naturalWidth; out.height = mImg.naturalHeight;
      const o = out.getContext('2d');
      o.drawImage(mImg, 0, 0);
      mRects.forEach(r => drawRect(o, mImg, 1, {
        x: r.x/mScale, y: r.y/mScale, w: r.w/mScale, h: r.h/mScale, mode: r.mode
      }, mScale));
      out.toBlob((blob) => {
        const baseName = (mFromWn ? selectedWn.name : files[mTargetIdx].file.name).replace(/\.\w+$/, '');
        const masked = new File([blob], 'masked_' + baseName + '.jpg', { type: 'image/jpeg' });
        if (mFromWn) {
          // マスク済み画像は実体をそのまま送る（元ファイルへの参照は使わない＝マスク前の画像を業界内に晒さない）
          files.push({ file: masked, kind: 'image', masked: true });
          selectedWn = null;
        } else {
          files[mTargetIdx] = { file: masked, kind: 'image', masked: true };
        }
        isMasked = true;
        document.getElementById('maskBtn').classList.add('on');
        document.getElementById('mosaicBtn').classList.add('on');
        maskModal.style.display = 'none';
        renderPreview();
      }, 'image/jpeg', 0.9);
    };

    /* ───── What'sNo取り込み ───── */
    const wnModal = document.getElementById('wnModal');
    document.getElementById('wnClose').onclick = () => { wnModal.style.display='none'; };
    document.getElementById('fromWn').onclick = async () => {
      wnModal.style.display = 'flex';
      const list = document.getElementById('wnList');
      list.innerHTML = '<div class="center">読み込み中…</div>';
      try {
        const r = await AA.wnFiles();
        const items = r.data || r.files || (Array.isArray(r) ? r : []);
        if (!items.length) { list.innerHTML = '<div class="center">What\'sNoに公開できるファイルがありません</div>'; return; }
        list.innerHTML = items.map(f => `
          <button class="wnitem" data-id="${f.id}">
            <div class="dic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg></div>
            <b>${esc(f.file_name || f.name || ('file#'+f.id))}</b>
          </button>`).join('');
        list.querySelectorAll('.wnitem').forEach(b => b.onclick = () => {
          // 選んだら新規投稿ページに戻る。公開は「投稿する」を押したとき。
          const item = items.find(f => String(f.id) === b.dataset.id);
          selectedWn = { id: b.dataset.id, name: b.querySelector('b').textContent, mime_type: item && item.mime_type };
          wnModal.style.display = 'none';
          renderPreview();
        });
      } catch(e){ list.innerHTML = `<div class="center">読み込みに失敗：${esc(e.message)}</div>`; }
    };

    document.getElementById('submit').onclick = async () => {
      const msg = document.getElementById('msg'); msg.textContent='';
      const body = document.getElementById('body').value.trim();
      const btn = document.getElementById('submit');

      // What'sNoから選んだ場合は from-wn で公開
      if (selectedWn) {
        try {
          btn.textContent='公開中…'; btn.disabled=true;
          const r = await AA.publishFromWn(selectedWn.id, { category: cat, body });
          prependToFeedCache(r.data);
          location.href = './feed.html';
        }
        catch(e){ msg.textContent = e.message; btn.textContent='投稿する'; btn.disabled=false; }
        return;
      }

      if (!body && !files.length) { msg.textContent = '本文かメディアを入れてください'; return; }
      const fd = new FormData();
      fd.append('category', cat);
      if (body) fd.append('body', body);
      if (isMasked) fd.append('is_masked', '1');
      files.forEach(f => fd.append('media[]', f.file));
      try {
        btn.textContent='投稿中…'; btn.disabled=true;
        const r = await AA.createPost(fd);
        prependToFeedCache(r.data);
        await warmVideoThumbs(files, r.data && r.data.media);
        location.href = './feed.html';
      }
      catch(e){ msg.textContent = e.message; btn.textContent='投稿する'; btn.disabled=false; }
    };

    // feed.htmlのキャッシュ(stale-while-revalidate)に投稿を先出しし、遷移直後の再取得を待たず即座に見せる
    function prependToFeedCache(post){
      if (!post) return;
      try {
        const key = 'aa_feed_cache:'; // フィードのデフォルト表示(すべて)のキャッシュキー
        const cached = JSON.parse(localStorage.getItem(key) || '[]');
        localStorage.setItem(key, JSON.stringify([post, ...cached]));
      } catch(e){}
    }

    // 動画は投稿者の端末に原本があるうちにサムネ生成→保存しておく（遠隔DL不要で高速・全端末が即恩恵）。
    // files[i] と media[i] は送信時と同じ並び順（バックエンドが sort_order=送信順で保存するため）。
    async function warmVideoThumbs(sentFiles, media) {
      if (!window.AAVideo || !media) return;
      const jobs = [];
      sentFiles.forEach((f, i) => {
        const m = media[i];
        if (f.kind === 'video' && m && m.kind === 'video') {
          jobs.push({ file: f.file, endpoint: AA.apiBase() + '/aa/media/' + m.id + '/thumb?token=' + encodeURIComponent(AA.token()) });
        }
      });
      if (!jobs.length) return;
      // 生成に時間がかかっても投稿完了自体は待たせすぎない（失敗時は閲覧時フォールバックに任せる）
      await Promise.race([AAVideo.warmVideoThumbs(jobs), new Promise(r => setTimeout(r, 8000))]);
    }

    renderCats();

    if (window.AAVoice) {
      AAVoice.attach({
        button: document.getElementById('voiceBtn'),
        target: document.getElementById('body'),
        interimEl: document.getElementById('voiceInterim'),
        onState: (on) => { document.getElementById('voiceBtnLabel').textContent = on ? '認識中… タップで停止' : '音声で入力'; },
      });
    }
  </script>
</body>
</html>
