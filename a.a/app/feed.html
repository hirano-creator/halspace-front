<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#0a0a0a">
<link rel="manifest" href="../manifest.json">
<link rel="icon" type="image/svg+xml" href="../assets/icon.svg">
<link rel="icon" type="image/png" sizes="192x192" href="../assets/icon-192.png">
<link rel="apple-touch-icon" href="../assets/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>a.a</title>
<link rel="stylesheet" href="../assets/app.css">
</head>
<body>
  <div class="wrap">
    <header class="appbar">
      <div class="brand">a<span class="s">.</span>a</div>
      <button class="icon-btn" title="さがす">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
      </button>
    </header>

    <div class="scroll">
      <div class="filterbar" id="filterbar"></div>
      <button id="newBanner" style="display:none;position:sticky;top:0;z-index:5;width:calc(100% - 32px);margin:0 16px 10px;padding:11px 0;border:none;border-radius:999px;background:var(--accent);color:#fff;font-size:13px;font-weight:700;box-shadow:0 10px 22px -10px rgba(31,72,255,.6)"></button>
      <div id="feed"><div class="center">読み込み中…</div></div>
    </div>

    <nav class="tabbar">
      <a class="tab on" href="./feed.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>ホーム</a>
      <a class="tab" href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>さがす</a>
      <a class="fab" href="./compose.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1"><path d="M12 5v14M5 12h14"/></svg></a>
      <a class="tab" href="./notifications.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>通知</a>
      <a class="tab" href="./profile.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>自分</a>
    </nav>
  </div>

  <script src="../assets/aa-api.js"></script>
  <script src="../assets/aa-pdf.js"></script>
  <script src="../assets/aa-video.js"></script>
  <script src="../assets/aa-shell.js"></script>
  <script>
    if (!AA.isAuthed()) location.replace('../index.html');

    const CATS = ['すべて','補助金','セミナー','設備紹介','お知らせ','相談'];
    let activeCat = '';
    let topSeenId = null;   // 新着ポーリングの基準＝現在画面先頭の投稿/ニュースid
    let pendingFresh = null; // 新着バナー用に確保している最新データ（タップで反映）
    const esc = (s) => (s||'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
    const initial = (s) => (s||'?').trim().charAt(0);
    // ニュースの日付（配信元の公開日、無ければ取得日）を「今日/昨日/N日前/M月D日」で表示
    function fmtNewsDate(iso){
      if (!iso) return '';
      const d = new Date(iso);
      if (isNaN(d.getTime())) return '';
      const today = new Date(); today.setHours(0,0,0,0);
      const dd = new Date(d); dd.setHours(0,0,0,0);
      const days = Math.round((today - dd) / 86400000);
      if (days <= 0) return '今日';
      if (days === 1) return '昨日';
      if (days < 7) return days + '日前';
      const m = d.getMonth()+1, day = d.getDate();
      return d.getFullYear() === today.getFullYear() ? `${m}月${day}日` : `${d.getFullYear()}/${m}/${day}`;
    }

    function renderFilter(){
      const bar = document.getElementById('filterbar');
      bar.innerHTML = CATS.map(c => {
        const val = c === 'すべて' ? '' : c;
        const on = val === activeCat ? ' on' : '';
        return `<button class="fchip${on}" data-cat="${esc(val)}">${esc(c)}</button>`;
      }).join('');
      bar.querySelectorAll('.fchip').forEach(b => b.onclick = () => {
        activeCat = b.dataset.cat; renderFilter(); load();
        hideNewBanner(); // カテゴリを切り替えたら別の一覧になるので新着基準もリセット
        topSeenId = null;
      });
    }

    function thumbIcon(kind){
      if (kind==='video') return '<svg viewBox="0 0 24 24" width="46" height="46" fill="none" stroke="#9b9ba3" stroke-width="1.4"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M10 9l5 3-5 3z" fill="#9b9ba3"/></svg>';
      return '<svg viewBox="0 0 24 24" width="46" height="46" fill="none" stroke="#9b9ba3" stroke-width="1.4"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>';
    }

    function postCard(p){
      // ニュース
      if (p.kind === 'news') {
        const ndate = fmtNewsDate(p.news_published_at || p.created_at);
        return `<a class="news" href="${esc(p.news_url)}" target="_blank" rel="noopener">
          <div class="nh"><span class="nbadge">ニュース</span><span class="src">${esc(p.news_source)}</span>${ndate?`<span class="ndate">${esc(ndate)}</span>`:''}<span class="ncat">${esc(p.category)}</span></div>
          <h3>${esc(p.news_title)}</h3>${p.news_summary?`<p>${esc(p.news_summary)}</p>`:''}
        </a>`;
      }
      // メディア表現
      let mediaHtml = '';
      const m = (p.media||[])[0];
      if (m) {
        if (m.kind === 'document') {
          // 資料は非同期サムネイル描画。PPTXはpreview-pdf変換、PDFは直接pdf.js。data-wnidはPPTX変換に使う。
          const wnAttr = p.source_wn_file_id ? ` data-wnid="${p.source_wn_file_id}"` : '';
          mediaHtml = `<div class="media docprev" data-view="${m.view}" data-mime="${esc(m.mime||'')}"${wnAttr} style="min-height:120px;background:var(--soft);cursor:pointer"></div>`;
        } else if (m.kind === 'image' && (m.id || m.url)) {
          // サーバー保存サムネ(小さいJPEG)優先。無ければ原寸URL→それも失敗なら非表示
          const src = m.id ? AA.mediaThumbUrl(m.id) : m.url;
          mediaHtml = `<div class="media" style="aspect-ratio:4/3;overflow:hidden;background:var(--soft)"><img src="${esc(src)}" data-full="${esc(m.url||'')}" style="width:100%;height:100%;object-fit:cover;display:block" loading="lazy" onerror="if(this.dataset.full&&!this.dataset.fb){this.dataset.fb=1;this.src=this.dataset.full}else{this.style.display='none'}"></div>`;
        } else if (m.kind === 'video') {
          const vMime = esc(m.mime || 'video/mp4');
          // m.view から mediaId を取り出す。再生(プロキシraw)とサムネ(thumb)に使う
          const midMatch = (m.view || '').match(/\/media\/(\d+)\/view/);
          if (midMatch || m.url) {
            const tAttr = midMatch
              ? ` data-thumb-url="${esc(AA.apiBase() + '/aa/media/' + midMatch[1] + '/raw?token=' + AA.token())}" data-media-id="${midMatch[1]}"`
              : '';
            mediaHtml = `<div class="media vidcard" data-vid-url="${esc(m.url||'')}" data-vid-mime="${vMime}"${tAttr} style="aspect-ratio:4/3;overflow:hidden;background:#000;position:relative;cursor:pointer"><img class="vidthumb" style="width:100%;height:100%;object-fit:cover;display:block;visibility:hidden" alt=""><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none"><div style="width:60px;height:60px;border-radius:50%;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center"><svg viewBox="0 0 24 24" width="26" height="26" fill="#fff"><path d="M6 4l14 8-14 8V4z"/></svg></div></div></div>`;
          } else {
            mediaHtml = `<div class="media" style="aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;background:var(--soft)">${thumbIcon('video')}</div>`;
          }
        } else {
          mediaHtml = `<div class="media" style="aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;background:var(--soft)">${thumbIcon(m.kind)}</div>`;
        }
      }
      const helpful = (p.reactions && p.reactions.helpful) || 0;
      const mine = (p.my_reactions||[]).indexOf('helpful') >= 0;
      const thumb = mine
        ? '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M2 11h3.2v10H2z"/><path d="M7 21V11l4.2-8.1a1.7 1.7 0 0 1 3.2 1l-.2 4.2h5a2 2 0 0 1 2 2.4l-1.4 7a2 2 0 0 1-2 1.6H7z"/></svg>'
        : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"><path d="M2 11h3.2v10H2z"/><path d="M7 21V11l4.2-8.1a1.7 1.7 0 0 1 3.2 1l-.2 4.2h5a2 2 0 0 1 2 2.4l-1.4 7a2 2 0 0 1-2 1.6H7z"/></svg>';

      // コメントプレビュー：直近3件までを投稿カード直下に表示（Xの返信プレビューのような見た目）
      const rc = p.recent_comments || [];
      const commentsHtml = rc.length ? `<div class="cprev">
          ${rc.map(c => `<a class="cprev-row" href="./post.html?id=${p.id}">
              <div class="ava alt" style="width:26px;height:26px;flex:0 0 26px;font-size:10px">${esc(initial(c.company_name||c.user_name))}</div>
              <div class="cprev-body"><b>${esc(c.company_name||c.user_name||'—')}</b><span>${esc(c.body)}</span></div>
            </a>`).join('')}
          ${(p.comment_count||0) > rc.length ? `<a class="cprev-more" href="./post.html?id=${p.id}">他${(p.comment_count||0) - rc.length}件のコメントを見る</a>` : ''}
        </div>` : '';

      return `<article class="post" data-id="${p.id}">
        <div class="phead">
          <div class="ava">${esc(initial(p.author_name||p.company_name))}</div>
          <div class="who"><b>${esc(p.author_name||'—')}</b><span>${esc(p.company_name||'')}</span></div>
          <div class="rightmeta">${p.source_wn_file_id?'<span class="wnflag">What\'sNo発</span>':''}${p.category?`<span class="cat">${esc(p.category)}</span>`:''}</div>
        </div>
        ${p.body?`<div class="ptext">${esc(p.body)}</div>`:''}
        ${mediaHtml}
        <div class="react">
          <button class="chip${mine?' on':''}" data-react="${p.id}">${thumb}<span class="n">${helpful}</span></button>
          <div class="rtools">
            <a class="t" href="./post.html?id=${p.id}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 11.5a8.4 8.4 0 0 1-11.9 7.6L3 21l1.9-6.1A8.4 8.4 0 1 1 21 11.5z"/></svg>${p.comment_count||0}</a>
            <button class="t" data-share="${p.id}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 12v7a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-7"/><path d="M16 6l-4-4-4 4M12 2v13"/></svg>シェア</button>
          </div>
        </div>
        ${commentsHtml}
      </article>`;
    }

    function renderFeed(data){
      const el = document.getElementById('feed');
      if (!data || !data.length) { el.innerHTML = '<div class="center">まだ投稿がありません。<br>右下の＋から最初の投稿をしてみましょう。</div>'; return; }
      el.innerHTML = data.map(postCard).join('');
      bind();
      renderDocs();
      topSeenId = data[0].id; // 新着ポーリングの基準（画面に今映っている先頭）を追従させる
    }

    // フィードキャッシュ：前回取得分を即描画→裏で最新取得（stale-while-revalidate）
    const feedCacheKey = () => 'aa_feed_cache:' + activeCat;
    let loadSeq = 0; // カテゴリ連打時に古い応答で上書きしない

    async function load(){
      const seq = ++loadSeq;
      const el = document.getElementById('feed');
      // 1) キャッシュがあれば待たずに即描画
      let cached = null;
      try { cached = localStorage.getItem(feedCacheKey()); } catch(e){}
      if (cached) {
        try { renderFeed(JSON.parse(cached)); } catch(e){ cached = null; }
      }
      if (!cached) el.innerHTML = '<div class="center">読み込み中…</div>';
      // 2) 最新を取得して差し替え（内容が同じなら再描画しない）
      try {
        const r = await AA.feed(activeCat);
        if (seq !== loadSeq) return;
        const fresh = JSON.stringify(r.data || []);
        try { localStorage.setItem(feedCacheKey(), fresh); } catch(e){}
        if (fresh !== cached) renderFeed(r.data || []);
      } catch (e) {
        if (seq !== loadSeq) return;
        if (!AA.isAuthed()) { location.replace('../index.html'); return; }
        // キャッシュ表示中なら失敗を上書きしない（オフラインでも前回分が読める）
        if (!cached) el.innerHTML = `<div class="center">読み込みに失敗しました：${esc(e.message)}</div>`;
      }
    }

    // ── 新着ポーリング：誰かが新規投稿したら「新着N件」バナーで知らせる（自動では差し替えない） ──
    // 読んでいる途中でフィードが急に入れ替わると混乱するため、タップした時だけ反映する。
    function hideNewBanner(){
      const b = document.getElementById('newBanner');
      b.style.display = 'none';
      pendingFresh = null;
    }
    function showNewBanner(count, freshData){
      pendingFresh = freshData;
      const b = document.getElementById('newBanner');
      b.textContent = `新着 ${count} 件・タップで表示`;
      b.style.display = 'block';
    }
    document.getElementById('newBanner').onclick = () => {
      if (!pendingFresh) return;
      renderFeed(pendingFresh);
      try { localStorage.setItem(feedCacheKey(), JSON.stringify(pendingFresh)); } catch(e){}
      hideNewBanner();
      document.querySelector('.scroll').scrollTo({ top: 0, behavior: 'smooth' });
    };

    async function pollNewPosts(){
      // タブが裏に回っている間は叩かない（電池・API消費の節約）
      if (document.visibilityState !== 'visible' || topSeenId == null) return;
      try {
        const r = await AA.feed(activeCat);
        const data = r.data || [];
        if (!data.length) return;
        const idx = data.findIndex(p => p.id === topSeenId);
        // idx===0: 変化なし / idx>0: idx件の新着 / idx===-1: 基準が50件より前に流れた(件数不明・とりあえず全部新着扱い)
        const newCount = idx === 0 ? 0 : (idx > 0 ? idx : data.length);
        if (newCount > 0) showNewBanner(newCount, data);
      } catch (e) { /* ポーリング失敗は無視。次回に任せる */ }
    }
    setInterval(pollNewPosts, 25000);
    document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') pollNewPosts(); });

    function docFileCard(mime, url) {
      const LBL = {
        'application/pdf': 'PDF',
        'application/vnd.openxmlformats-officedocument.presentationml.presentation': 'PPTX',
        'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet': 'XLSX',
        'application/vnd.openxmlformats-officedocument.wordprocessingml.document': 'DOCX',
      };
      const label = LBL[mime] || (mime ? mime.split('/').pop().slice(0, 6).toUpperCase() : 'FILE');
      return `<div style="display:flex;align-items:center;gap:14px;padding:18px 16px">
        <div style="width:44px;height:44px;border-radius:12px;background:#fff;display:flex;align-items:center;justify-content:center;flex:0 0 44px">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="var(--accent)" stroke-width="1.7"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
        </div>
        <div>
          <b style="font-size:13px;display:block;margin-bottom:2px">${label}</b>
          <span style="font-size:11px;color:var(--mute)">${url ? 'タップして開く' : ''}</span>
        </div>
      </div>`;
    }

    // 動画カードにタップ再生 + 非同期サムネイル生成を設定する
    function setupVidCard(el) {
      if (el.dataset.vidSetup) return;
      el.dataset.vidSetup = '1';
      const vidUrl = el.dataset.vidUrl;

      // onclick 直代入ではなく addEventListener を使う（iOS で確実に発火させるため）
      function playHandler() {
        el.removeEventListener('click', playHandler);
        el.style.cursor = '';
        const video = document.createElement('video');
        // 再生は Range/Content-Type を確実に返すプロキシ raw を優先。
        // iOS Safari は R2署名URLを再生できないことがある（プロキシは206とMIMEを保証）。
        video.src = el.dataset.thumbUrl || vidUrl;
        video.style.cssText = 'width:100%;height:100%;object-fit:contain';
        video.controls = true;
        video.playsInline = true;
        video.setAttribute('playsinline', '');
        video.preload = 'auto';
        el.innerHTML = '';
        el.appendChild(video);
        // タップ（ユーザージェスチャー）由来のため play() は許可される。失敗時は controls で手動再生可能。
        video.play().catch(() => {});
      }
      el.addEventListener('click', playHandler);

      // サムネ: サーバー保存済みを <img> で即読み込み（高速・動画DL不要）。
      // 404 なら未保存なので、クライアントで1回だけ生成 → 表示 → サーバーへ保存（全端末向け）。
      const img = el.querySelector('.vidthumb');
      const mediaId = el.dataset.mediaId;
      if (!img || !mediaId) return;

      const thumbEndpoint = AA.mediaThumbUrl(mediaId);
      img.onload = () => { img.style.visibility = ''; };
      img.onerror = () => {
        // サーバー未保存(404)。プロキシ raw から生成して保存する。
        img.onerror = null;
        if (!window.AAVideo || !el.dataset.thumbUrl) return;
        AAVideo.generateThumb(el.dataset.thumbUrl).then(blob => {
          if (!blob) return;
          const url = URL.createObjectURL(blob);
          img.onload = () => { img.style.visibility = ''; URL.revokeObjectURL(url); };
          img.src = url;
          AA.storeMediaThumb(mediaId, blob).catch(() => {}); // 全端末向け・fire-and-forget
        }).catch(() => {});
      };
      img.src = thumbEndpoint;
    }

    function probeImg(url){
      return new Promise(res => {
        const i = new Image();
        i.onload = () => res(true);
        i.onerror = () => res(false);
        i.src = url;
        setTimeout(() => res(false), 8000); // サーバー側生成(画像/Office)に時間がかかる場合の保険
      });
    }

    // 資料(PDF/Office)カード：サーバー保存サムネ(小さいJPEG)を優先。
    // 未生成(404)のときだけ初回のみ pdf.js で1ページ目を描画→表示→サーバーへ保存（全端末向け）。
    async function setupDocCard(el){
      const mime = el.dataset.mime || '';
      const viewUrl = el.dataset.view;
      el.removeAttribute('data-view');
      const midMatch = (viewUrl || '').match(/\/media\/(\d+)\/view/);
      const mediaId = midMatch ? midMatch[1] : null;
      // タップで原本を開く。URL解決はタップ時に遅延（同期でwindowを開いてから遷移＝ポップアップブロック回避）
      el.onclick = () => {
        const w = window.open('', '_blank');
        AA.mediaUrl(viewUrl).then(u => { w.location = u; }).catch(() => { try { w.close(); } catch(e){} });
      };
      const showImg = (src) => {
        el.style.minHeight = '';
        el.innerHTML = `<img src="${src}" style="width:100%;display:block" alt="">`;
      };
      if (mediaId) {
        const turl = AA.mediaThumbUrl(mediaId);
        if (await probeImg(turl)) { showImg(turl); return; } // immutableキャッシュ済みなので再読込はヒットする
      }
      try {
        if (!mediaId) throw new Error('not renderable');
        const isPdf = mime === 'application/pdf';
        // PDFはプロキシraw、OfficeはLibreOffice変換PDF（R2キャッシュ済み）をpdf.jsで描画
        const pdfUrl = AA.apiBase() + '/aa/media/' + mediaId + (isPdf ? '/raw' : '/office-pdf') + '?token=' + AA.token();
        const blob = await aaPdfThumbBlob(pdfUrl, el.clientWidth || 480);
        if (!blob) throw new Error('サムネ生成失敗');
        showImg(URL.createObjectURL(blob));
        AA.storeMediaThumb(mediaId, blob).catch(() => {}); // fire-and-forget
      } catch(e) {
        console.warn('doc thumb', mime, e.message);
        el.style.minHeight = '';
        el.innerHTML = docFileCard(mime, viewUrl);
      }
    }

    // ビューポート付近のカードだけメディア処理する（画面外のPDF/動画に触らない＝初期表示速度とiOSメモリ対策）
    const IS_MOBILE = /iP(hone|ad|od)|Android/.test(navigator.userAgent)
      || (/Macintosh/.test(navigator.userAgent) && navigator.maxTouchPoints > 1);
    const DOC_CONC = IS_MOBILE ? 1 : 4; // pdf.js同時レンダリング上限（iOS OOM防止）
    let docActive = 0;
    const docQueue = [];
    function pumpDocs(){
      while (docActive < DOC_CONC && docQueue.length) {
        const job = docQueue.shift();
        docActive++;
        Promise.resolve(job()).catch(() => {}).finally(() => { docActive--; pumpDocs(); });
      }
    }
    let mediaIO = null;
    function renderDocs(){
      if (mediaIO) mediaIO.disconnect();
      docQueue.length = 0;
      const targets = document.querySelectorAll('.docprev[data-view], .vidcard');
      const start = (el) => {
        if (el.classList.contains('docprev')) {
          if (el.dataset.view) { docQueue.push(() => setupDocCard(el)); pumpDocs(); }
        } else {
          setupVidCard(el); // サムネ<img>読込は軽量。生成が要る時だけAAVideo側semaphoreで直列化
        }
      };
      if (!('IntersectionObserver' in window)) { targets.forEach(start); return; }
      mediaIO = new IntersectionObserver((entries, obs) => {
        entries.forEach(en => { if (en.isIntersecting) { obs.unobserve(en.target); start(en.target); } });
      }, { rootMargin: '600px 0px' });
      targets.forEach(el => mediaIO.observe(el));
    }

    function bind(){
      document.querySelectorAll('[data-react]').forEach(b => b.onclick = async () => {
        try {
          const r = await AA.react(b.dataset.react, 'helpful');
          b.classList.toggle('on', r.reacted);
          b.querySelector('.n').textContent = r.count;
        } catch(e){ alert(e.message); }
      });
      document.querySelectorAll('[data-share]').forEach(b => b.onclick = async () => {
        try {
          const r = await AA.shareLink(b.dataset.share);
          if (navigator.share) { navigator.share({ url: r.data.url }); }
          else { window.open(r.data.x_url, '_blank'); }
        } catch(e){ alert(e.message); }
      });
    }

    renderFilter();
    load();
  </script>
</body>
</html>
