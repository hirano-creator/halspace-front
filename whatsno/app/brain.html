<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knowl | What'sNo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Poppins:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/wn-app.css">
</head>
<body>
<div class="app-layout">

  <!-- サイドバー -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <a href="dashboard.html" style="text-decoration:none;display:flex;flex-direction:column;gap:1px;">
        <span class="sidebar-logo-title">What'sNo</span>
        <span class="sidebar-logo-sub">by HaLSpace</span>
      </a>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-nav-label">メニュー</div>
      <a href="dashboard.html"><i class="fa-solid fa-house"></i> ホーム</a>
      <a href="#" class="active"><i class="fa-solid fa-circle-nodes"></i> Knowl</a>
      <div class="sidebar-nav-label" style="margin-top:16px;">管理</div>
      <a href="admin.html" id="adminLink" style="display:none;"><i class="fa-solid fa-gear"></i> 管理者設定</a>
    </nav>
    <div class="sidebar-bottom">
      <div id="sidebarUser"></div>
      <button class="btn-sidebar-logout" onclick="solidLogout()">
        <i class="fa-solid fa-right-from-bracket"></i> アプリ選択に戻る
      </button>
    </div>
  </aside>

  <!-- メインコンテンツ -->
  <div class="main-content">

    <!-- トップバー -->
    <div class="top-bar">
      <div class="top-bar-left">
        <button class="menu-toggle" id="menuToggle"><i class="fa-solid fa-bars"></i></button>
        <span class="top-bar-title">
          <i class="fa-solid fa-circle-nodes" style="color:var(--accent);margin-right:6px;"></i>Knowl
        </span>
      </div>
      <div class="top-bar-right">
        <button class="btn btn-ghost btn-sm" id="historyToggleBtn" title="会話履歴">
          <i class="fa-solid fa-clock-rotate-left"></i>
          <span style="font-size:12px;margin-left:4px;">履歴</span>
        </button>
      </div>
    </div>

    <!-- チャット本体 -->
    <div class="brain-layout">

      <!-- 頭脳メーターカード -->
      <div class="brain-meter-card" id="brainMeterCard">
        <div class="brain-meter-header">
          <span class="brain-meter-icon"><i class="fa-solid fa-circle-nodes"></i></span>
          <span class="brain-meter-title">Knowl</span>
          <span class="brain-meter-rate" id="meterRate">—</span>
        </div>
        <div class="brain-meter-bar-wrap">
          <div class="brain-meter-bar" id="meterBar" style="width:0%"></div>
        </div>
        <div class="brain-meter-meta">
          <span id="meterLabel" style="color:var(--muted);">読み込み中…</span>
          <span id="meterGapAlert" class="brain-gap-alert" style="display:none;">
            <i class="fa-solid fa-triangle-exclamation"></i>
            <span id="meterGapText"></span>の文書が不足しています
          </span>
        </div>
      </div>

      <!-- チャット履歴 -->
      <div class="brain-chat-area" id="chatArea">
        <!-- 空状態 -->
        <div class="brain-empty" id="brainEmpty">
          <div class="brain-empty-icon">🔵</div>
          <div class="brain-empty-title">何でも聞いてください</div>
          <div class="brain-empty-sub">
            社内にアップロードされたファイルをもとにAIが回答します。<br>
            出典ファイルも一緒に表示されます。
          </div>
          <div class="brain-example-list" id="exampleList">
            <button class="brain-example-btn" data-q="SUS304の溶接時の予熱温度は？">SUS304の溶接時の予熱温度は？</button>
            <button class="brain-example-btn" data-q="塗装工程の手順を教えてください">塗装工程の手順を教えてください</button>
            <button class="brain-example-btn" data-q="品質検査の基準を教えてください">品質検査の基準を教えてください</button>
          </div>
        </div>
      </div>

      <!-- 入力エリア -->
      <div class="brain-input-area">
        <div class="brain-input-row">
          <textarea class="brain-textarea" id="brainInput"
            placeholder="社内文書について何でも聞いてください…"
            rows="1"></textarea>
          <button class="brain-voice-btn" id="brainVoiceBtn" title="音声で質問">
            <i class="fa-solid fa-microphone" id="brainVoiceIcon"></i>
          </button>
          <button class="brain-send-btn" id="brainSendBtn" disabled title="送信（Enter）">
            <i class="fa-solid fa-paper-plane"></i>
          </button>
        </div>
        <div class="brain-input-actions">
          <button class="brain-session-btn" id="newSessionBtn">
            <i class="fa-solid fa-plus"></i> 新しい会話
          </button>
          <span style="flex:1;"></span>
          <span class="brain-input-hint" style="font-size:11px;color:var(--muted);">Enter で送信 / Shift+Enter で改行</span>
        </div>
      </div>

    </div><!-- /brain-layout -->
  </div><!-- /main-content -->
</div><!-- /app-layout -->

<!-- 履歴サイドパネル -->
<div class="brain-history-panel" id="historyPanel">
  <div class="brain-history-title">
    <i class="fa-solid fa-clock-rotate-left" style="margin-right:6px;"></i>会話履歴
  </div>
  <div id="historyList">
    <div style="font-size:12px;color:var(--muted);">読み込み中…</div>
  </div>
</div>

<!-- スマホ ボトムナビ -->
<nav class="bottom-nav">
  <div class="bottom-nav-inner">
    <a href="dashboard.html" class="bottom-nav-item">
      <i class="fa-solid fa-house"></i><span>ホーム</span>
    </a>
    <div class="bottom-nav-item" id="bnLiked" onclick="location.href='dashboard.html'">
      <i class="fa-solid fa-heart"></i><span>いいね</span>
    </div>
    <div class="bottom-nav-item" onclick="location.href='dashboard.html'">
      <i class="fa-solid fa-clock-rotate-left"></i><span>最近</span>
    </div>
    <div class="bottom-nav-item active">
      <i class="fa-solid fa-circle-nodes"></i><span>頭脳</span>
    </div>
  </div>
</nav>

<div class="sidebar-overlay" id="sidebarOverlay"></div>
<div class="toast-container" id="toastContainer"></div>

<script src="../../solid/assets/js/auth.js?v=6"></script>
<script src="../assets/js/wn-api.js?v=9"></script>
<script src="../assets/js/pages/wn-brain.js?v=1"></script>

</body>
</html>
