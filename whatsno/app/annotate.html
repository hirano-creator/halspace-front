<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注釈編集 | What'sNo v2</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Noto+Serif+JP:wght@400;700&family=Kosugi+Maru&family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
  <script src="../../solid/assets/js/auth.js?v=6"></script>
  <script src="../assets/js/wn-api.js?v=10"></script>
  <style>
    :root {
      --primary: #1E3A5F;
      --accent:  #2196F3;
      --border:  #D1D9E0;
      --bg:      #F0F4F8;
      --white:   #FFFFFF;
      --text:    #1A1A2E;
      --muted:   #546E7A;
      --red:     #E17055;
      --green:   #00B894;
      --radius:  6px;
      --trans:   0.2s ease;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'Noto Sans JP', sans-serif; font-size: 14px; color: var(--text); background: #2a2a2a; overflow: hidden; }

    /* ── トップバー ── */
    .topbar {
      height: 52px;
      background: var(--primary);
      display: flex; align-items: center;
      padding: 0 12px; gap: 10px;
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    }
    .topbar-title { color: #fff; font-size: 14px; font-weight: 700; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .topbar-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: var(--radius);
      font-size: 13px; font-weight: 700; cursor: pointer; border: none;
      transition: opacity var(--trans);
    }
    .topbar-btn:hover { opacity: .85; }
    .topbar-btn-ghost { background: rgba(255,255,255,.15); color: #fff; }
    .topbar-btn-save  { background: #00B894; color: #fff; }
    .topbar-btn-back  { background: transparent; color: rgba(255,255,255,.7); font-size: 13px; }
    .topbar-btn-back:hover { color: #fff; }

    /* ── 保存スプリットボタン ── */
    .save-split-wrap {
      position: relative;
      display: flex;
      gap: 1px;
    }
    .save-split-main {
      border-radius: 8px 0 0 8px !important;
      flex: 1;
    }
    .save-split-arrow {
      border-radius: 0 8px 8px 0 !important;
      padding: 0 10px !important;
      border-left: 1px solid rgba(255,255,255,.3) !important;
    }
    .save-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      box-shadow: 0 8px 28px rgba(0,0,0,.15);
      z-index: 300;
      min-width: 280px;
      overflow: hidden;
    }
    .save-dropdown.open { display: block; }
    .save-dropdown-item {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 14px 16px;
      border: none;
      background: #fff;
      cursor: pointer;
      text-align: left;
      transition: background .15s;
      font-size: 13px;
      color: #1A1A2E;
    }
    .save-dropdown-item:hover { background: #F0F4F8; }
    .save-dropdown-item + .save-dropdown-item { border-top: 1px solid #F0F4F8; }
    .save-dropdown-item i { font-size: 16px; color: #00B894; flex-shrink: 0; }
    .save-dropdown-title { font-weight: 700; font-size: 13px; margin-bottom: 2px; }
    .save-dropdown-desc  { font-size: 11px; color: #546E7A; }

    /* ── 右サイドパネル ── */
    .toolbar {
      position: fixed;
      top: 52px; right: 0; bottom: 0;
      width: 330px;
      z-index: 99;
      background: var(--white);
      border-left: 1px solid var(--border);
      display: flex; flex-direction: column;
      padding: 14px 16px;
      gap: 4px;
      overflow-y: auto;
    }
    .tool-section-label {
      font-size: 10px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .05em;
      margin: 8px 0 4px; padding: 0 2px;
    }
    .tool-section-label:first-child { margin-top: 0; }
    .tool-sep { height: 1px; background: var(--border); margin: 6px 0; }
    .tool-row { display: flex; flex-wrap: wrap; gap: 4px; }
    .tool-btn {
      width: 36px; height: 36px; border-radius: var(--radius);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; color: var(--muted); border: 1.5px solid transparent;
      cursor: pointer; background: none; transition: all var(--trans);
    }
    .tool-btn:hover  { background: var(--bg); color: var(--text); }
    .tool-btn.active { background: rgba(33,150,243,.1); border-color: var(--accent); color: var(--accent); }
    .tool-color-row { display: flex; flex-wrap: wrap; gap: 6px; padding: 2px 0; }
    .tool-color-btn {
      width: 26px; height: 26px; border-radius: 50%;
      border: 2.5px solid transparent; cursor: pointer;
      transition: border-color var(--trans);
    }
    .tool-color-btn.active { border-color: var(--text) !important; }
    .tool-size-select {
      width: 100%; height: 40px; padding: 0 10px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius); font-size: 14px;
      background: var(--white); cursor: pointer; color: var(--text);
      -webkit-appearance: none; appearance: none;
      min-height: 40px; box-sizing: border-box;
    }
    .tool-size-select:focus { outline: none; border-color: var(--accent); }
    input[type="number"].tool-size-select { cursor: text; }
    /* ── コンパクトな数値フィールド（太さ／文字サイズ／塗りつぶしを2行に集約） ── */
    .tool-compact-row { display: flex; gap: 8px; align-items: flex-end; }
    .tool-compact-row + .tool-compact-row { margin-top: 8px; }
    .tool-field { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px; }
    .tool-field-label {
      font-size: 10px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .04em; padding: 0 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .tool-field .tool-size-select { height: 36px; min-height: 36px; }
    .fill-control { display: flex; align-items: center; gap: 6px; }
    .fill-control .tool-btn { flex-shrink: 0; width: 36px; height: 36px; }
    .fill-control .tool-size-select { flex: 1; min-width: 0; }
    .fill-pct { font-size: 13px; color: var(--muted); font-weight: 700; flex-shrink: 0; }
    /* ズームボタン */
    .zoom-btn {
      width: 100%; height: 34px;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      border-radius: var(--radius); border: 1.5px solid var(--border);
      background: var(--white); color: var(--text);
      font-size: 12px; font-weight: 600; cursor: pointer;
      transition: all var(--trans); margin-bottom: 4px;
    }
    .zoom-btn:hover { background: var(--bg); border-color: var(--accent); color: var(--accent); }
    .zoom-btn.active { background: rgba(33,150,243,.1); border-color: var(--accent); color: var(--accent); }
    /* ── ズームステッパー ── */
    .zoom-stepper {
      display: flex; align-items: center; gap: 4px; margin-top: 2px;
    }
    .zoom-step-btn {
      width: 28px; height: 28px; border-radius: 4px;
      border: 1.5px solid var(--border); background: var(--white);
      font-size: 16px; line-height: 1; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all var(--trans); flex-shrink: 0;
    }
    .zoom-step-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--bg); }
    .zoom-step-btn:disabled { opacity: .4; cursor: default; }
    #zoomLabel { flex: 1; text-align: center; font-size: 12px; font-weight: 700; color: var(--text); }

    /* ページナビ */
    .page-nav {
      display: flex; align-items: center; justify-content: center;
      gap: 6px;
    }
    .page-nav button {
      width: 32px; height: 32px; border-radius: var(--radius);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; cursor: pointer; border: 1.5px solid var(--border);
      background: var(--white); color: var(--text); flex-shrink: 0;
    }
    .page-nav button:hover { background: var(--bg); }
    .page-nav button:disabled { opacity: .4; cursor: default; }
    .page-nav span { font-size: 12px; color: var(--muted); white-space: nowrap; }

    /* ── キャンバスエリア ── */
    .canvas-area {
      position: fixed;
      top: 52px; left: 0; right: 330px; bottom: 0;
      overflow: auto;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
      background: #2a2a2a;
    }
    .canvas-wrap {
      position: relative;
      display: inline-block;
      box-shadow: 0 4px 24px rgba(0,0,0,.4);
      margin: auto;
    }
    #baseCanvas   { display: block; }
    #annotCanvas  { position: absolute; top: 0; left: 0; display: block; }

    /* ── インラインテキスト入力（キャンバス上に重ねる） ── */
    #inlineTextarea {
      position: absolute;
      z-index: 200;
      display: none;
      border: 2px dashed var(--accent);
      border-radius: 2px;
      background: rgba(255,255,255,0.15);
      color: inherit;
      outline: none;
      resize: none;
      overflow: hidden;
      padding: 2px 4px;
      box-sizing: border-box;
      line-height: 1.4;
      font-family: 'Noto Sans JP', sans-serif;
      white-space: pre;          /* 自動折返しせず横に伸ばす（auto-grow） */
      min-width: 24px;
    }

    /* ── テキスト用フローティングツールバー（ilovepdf風） ── */
    #textToolbar {
      position: fixed;
      z-index: 260;
      display: none;
      align-items: center;
      gap: 2px;
      padding: 5px 6px;
      background: #fff;
      border: 1px solid #e3e3e3;
      border-radius: 10px;
      box-shadow: 0 6px 24px rgba(0,0,0,.18);
      font-family: 'Noto Sans JP', sans-serif;
      user-select: none;
      white-space: nowrap;
    }
    #textToolbar.open { display: flex; }
    #textToolbar .tt-sep { width: 1px; height: 22px; background: #e3e3e3; margin: 0 3px; flex-shrink: 0; }
    #textToolbar select.tt-font {
      height: 30px; border: 1px solid #d8d8d8; border-radius: 6px;
      font-size: 13px; padding: 0 6px; background: #fff; cursor: pointer;
      color: #1A1A2E; max-width: 92px;
    }
    #textToolbar .tt-size {
      width: 50px; height: 30px; border: 1px solid #d8d8d8; border-radius: 6px;
      font-size: 13px; text-align: center; color: #1A1A2E; -moz-appearance: textfield;
    }
    #textToolbar .tt-btn {
      width: 30px; height: 30px; border-radius: 6px; border: none; background: none;
      cursor: pointer; color: #444; font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, color .15s;
    }
    #textToolbar .tt-btn:hover { background: #F0F4F8; }
    #textToolbar .tt-btn.active { background: rgba(33,150,243,.12); color: var(--accent); }
    #textToolbar .tt-btn.danger:hover { background: rgba(225,112,85,.12); color: var(--red); }
    #textToolbar .tt-color-wrap { position: relative; width: 30px; height: 30px; }
    #textToolbar .tt-color-btn {
      width: 30px; height: 30px; border-radius: 6px; cursor: pointer;
      border: 1px solid #d8d8d8; display: flex; align-items: flex-end; justify-content: center;
      overflow: hidden; padding-bottom: 3px; font-size: 12px; font-weight: 700; color: #fff;
      text-shadow: 0 0 2px rgba(0,0,0,.5);
    }
    #textToolbar input[type="color"].tt-color-input {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 30px; height: 30px;
    }
    @media (max-width: 767px) {
      #textToolbar { gap: 0; padding: 4px; }
      #textToolbar select.tt-font { max-width: 72px; font-size: 12px; }
      #textToolbar .tt-btn { width: 28px; height: 28px; }
    }

    /* ── ローディング ── */
    #loadingOverlay {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,.6);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; color: #fff;
    }
    #loadingOverlay.hidden { display: none; }
    .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── トースト ── */
    #toastContainer {
      position: fixed; bottom: 20px; right: 20px; z-index: 400;
      display: flex; flex-direction: column; gap: 8px; pointer-events: none;
    }
    .toast {
      padding: 10px 16px; border-radius: 8px;
      background: #333; color: #fff; font-size: 13px;
      box-shadow: 0 4px 16px rgba(0,0,0,.3);
      opacity: 0; transform: translateY(10px);
      transition: all .3s ease;
    }
    .toast.show { opacity: 1; transform: none; }
    .toast-success { background: #00B894; }
    .toast-danger  { background: var(--red); }

    /* ── ゴミ箱ドロップゾーン ── */
    #trashZone {
      position: fixed;
      bottom: -100px; left: 50%; transform: translateX(-50%);
      width: 160px; height: 72px;
      background: rgba(225,112,85,.15);
      border: 2px dashed var(--red);
      border-radius: 12px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 4px;
      color: var(--red); font-size: 12px; font-weight: 700;
      z-index: 500;
      transition: bottom .25s ease, background .2s ease, transform .2s ease;
      pointer-events: none;
    }
    #trashZone.visible {
      bottom: 16px;
    }
    #trashZone.over {
      background: rgba(225,112,85,.35);
      transform: translateX(-50%) scale(1.08);
    }
    #trashZone i { font-size: 22px; }

    /* ── コンテキストメニュー ── */
    #contextMenu {
      display: none; position: fixed; z-index: 600;
      background: #fff; border: 1px solid #e0e0e0;
      border-radius: 8px; box-shadow: 0 8px 28px rgba(0,0,0,.18);
      min-width: 180px; overflow: hidden;
    }
    #contextMenu.open { display: block; }
    .ctx-item {
      display: flex; align-items: center; gap: 10px;
      width: 100%; padding: 10px 14px;
      border: none; background: #fff; cursor: pointer;
      font-size: 13px; color: #1A1A2E; text-align: left;
      transition: background .12s;
    }
    .ctx-item:hover { background: #F0F4F8; }
    .ctx-item + .ctx-item { border-top: 1px solid #F0F4F8; }
    .ctx-item i { font-size: 14px; color: #546E7A; width: 16px; }
    .ctx-item.danger { color: var(--red); }
    .ctx-item.danger i { color: var(--red); }

    /* ── キーボードヒント ── */
    .topbar-btn[disabled] { opacity: .4; cursor: default; pointer-events: none; }

    /* ── 署名セクション ── */
    .signature-block { display: flex; flex-direction: column; gap: 6px; margin-top: 2px; }
    .signature-input {
      width: 100%; padding: 7px 10px;
      border: 1.5px solid var(--border); border-radius: 6px;
      font-size: 12.5px; color: var(--text);
      background: #fff; outline: none;
      font-family: inherit; box-sizing: border-box;
    }
    .signature-input:focus { border-color: var(--accent); }
    .signature-drop-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 10px; border-radius: 8px;
      border: 1.5px dashed var(--border); cursor: grab;
      background: #fafafa; transition: border-color .2s, background .2s, transform .15s;
      user-select: none; margin-top: 2px;
    }
    .signature-drop-item:hover { border-color: var(--accent); background: #f0f4f8; transform: translateX(2px); }
    .signature-drop-item.dragging-active { opacity: .4; }
    .signature-drop-item i { font-size: 18px; color: var(--accent); flex-shrink: 0; }
    .signature-drop-info { flex: 1; min-width: 0; }
    .signature-drop-title { font-size: 12px; font-weight: 700; color: var(--text); }
    .signature-drop-hint  { font-size: 10px; color: var(--muted); margin-top: 2px; }

    /* ── スタンプパレット ── */
    .stamp-palette { display: flex; flex-direction: column; gap: 6px; margin-top: 2px; }
    .stamp-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 10px; border-radius: 8px;
      border: 1.5px solid var(--border); cursor: grab;
      background: #fafafa; transition: border-color .2s, background .2s, transform .15s;
      user-select: none;
    }
    .stamp-item:hover { border-color: #bbb; background: #f0f4f8; transform: translateX(2px); }
    .stamp-item.dragging-active { opacity: .4; }
    .stamp-preview {
      width: 56px; height: 28px; border-radius: 3px;
      border-width: 2px; border-style: solid;
      display: flex; align-items: center; justify-content: center;
      font-size: 6.5px; font-weight: 900; flex-shrink: 0;
      position: relative;
      line-height: 1.2; text-align: center; padding: 0 3px;
    }
    .stamp-item-info { flex: 1; min-width: 0; }
    .stamp-label-edit {
      width: 100%; padding: 4px 7px;
      border: 1.5px solid var(--border); border-radius: 5px;
      font-size: 12px; font-weight: 700; color: var(--text);
      background: #fff; outline: none; cursor: text;
      font-family: inherit;
    }
    .stamp-label-edit:focus { border-color: var(--accent); }
    .stamp-item-hint { font-size: 10px; color: var(--muted); margin-top: 3px; }

    /* ══════════════════════════════════════════
       モバイル対応 (≤767px)
       キャンバス全幅 + ツールバーを下部パネルに移動
    ══════════════════════════════════════════ */
    @media (max-width: 767px) {
      /* ── トップバー: コンパクト化 ── */
      .topbar { padding: 0 8px; gap: 5px; height: 48px; }
      .topbar-title { font-size: 12px; max-width: 70px; }
      .topbar-btn { padding: 5px 8px; font-size: 12px; gap: 3px; }
      #saveBtnLabel { display: none; }         /* 保存ボタンのテキスト非表示 */
      #clearBtn .clear-label { display: none;} /* クリアテキスト非表示 */

      /* ── キャンバスエリア: 全幅 ── */
      .canvas-area {
        top: 48px;
        right: 0;
        bottom: 260px;
        padding: 10px;
      }

      /* ── ツールバー: 下部固定パネル ── */
      .toolbar {
        top: auto;
        left: 0;
        right: 0;
        width: 100%;
        height: 260px;
        border-left: none;
        border-top: 2px solid var(--border);
        padding: 10px 14px 16px;
        overflow-y: auto;
        overflow-x: hidden;
        -webkit-overflow-scrolling: touch;
      }

      /* ── ツール・カラーボタン: コンパクト ── */
      .tool-btn   { width: 34px; height: 34px; font-size: 14px; }
      .tool-row   { gap: 5px; }
      .tool-color-btn { width: 26px; height: 26px; }
      .tool-color-row { gap: 7px; }
      .tool-size-select { height: 44px; min-height: 44px; font-size: 15px; padding: 0 12px; }

      /* ── スタンプアイテム: 縦並びを2列にしてコンパクト ── */
      .stamp-palette { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }

      /* ── ゴミ箱ゾーン: ツールバーの上に表示 ── */
      #trashZone.visible { bottom: 268px; }

      /* ── トースト: ツールバーの上に表示 ── */
      #toastContainer { bottom: 268px; right: 12px; }

      /* ── zoom/pageNavの余白調整 ── */
      .zoom-btn { height: 32px; font-size: 12px; }
      .zoom-step-btn { width: 26px; height: 26px; font-size: 15px; }
      #zoomLabel { font-size: 11px; }
    }
  </style>
</head>
<body>

<!-- ローディング -->
<div id="loadingOverlay">
  <div class="spinner"></div>
  <div id="loadingText">ファイルを読み込み中…</div>
</div>

<!-- トップバー -->
<div class="topbar">
  <button class="topbar-btn topbar-btn-back" id="backBtn">
    <i class="fa-solid fa-chevron-left"></i> 戻る
  </button>
  <div class="topbar-title" id="topTitle">注釈編集</div>
  <div style="display:flex;align-items:center;gap:8px;margin-left:auto;">
    <button class="topbar-btn topbar-btn-ghost" id="undoBtn" title="元に戻す (Ctrl+Z)">
      <i class="fa-solid fa-rotate-left"></i>
    </button>
    <button class="topbar-btn topbar-btn-ghost" id="redoBtn" title="やり直し (Ctrl+Shift+Z)" disabled>
      <i class="fa-solid fa-rotate-right"></i>
    </button>
    <button class="topbar-btn topbar-btn-ghost" id="clearBtn">
      <i class="fa-solid fa-eraser"></i> クリア
    </button>
    <div class="save-split-wrap" id="saveSplitWrap">
      <button class="topbar-btn topbar-btn-save save-split-main" id="saveBtn">
        <i class="fa-solid fa-floppy-disk"></i> <span id="saveBtnLabel">新バージョンとして保存</span>
      </button>
      <button class="topbar-btn topbar-btn-save save-split-arrow" id="saveDropBtn" title="保存方法を選ぶ">
