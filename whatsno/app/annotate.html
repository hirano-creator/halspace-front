/* PDF に注釈を焼き込む
 * ライン/矢印/矩形/楕円 → pdf-lib ベクター描画（鮮明、スケール不問）
 * テキスト/スタンプ     → バウンディングボックスサイズの小キャンバスに描いて PNG 埋め込み
 * 座標変換: pdfjsLib.Util.inverseTransform で canvas座標 → PDF内部座標
 */
async function buildAnnotatedPdf() {
  /* 選択ハンドル・ホバー枠が PDF に焼き込まれないよう状態をクリアして再描画 */
  selectedIdx    = -1;
  hoverIdx       = -1;
  editingTextIdx = -1;
  if (typeof inlineTA !== 'undefined' && inlineTA?.style) inlineTA.style.display = 'none';
  redrawAnnotations();
  await ensureTextFontsLoaded();

  /* 全ページのアノテーションを保存してから処理 */
  savePageAnnotations();

  const srcBytes  = await fetch(wnPublicViewUrl(fileId)).then(r => r.arrayBuffer());
  const pdfLibDoc = await PDFLib.PDFDocument.load(srcBytes);
  const pages     = pdfLibDoc.getPages();

  /* 注釈レイヤーを Canvas に描き、回転考慮して PNG として PDF ページに焼き込む共通ロジック */
  async function bakeOnPage(page, sourceCanvas) {
    const { width: pW, height: pH } = page.getSize();
    const rotAngle = page.getRotation?.()?.angle ?? 0;
    const aw = sourceCanvas.width, ah = sourceCanvas.height;
    let embedCanvas, embedW, embedH;
    if (rotAngle === 90) {
      embedCanvas = document.createElement('canvas');
      embedCanvas.width = ah; embedCanvas.height = aw;
      const ec = embedCanvas.getContext('2d');
      ec.setTransform(0, -1, 1, 0, 0, aw);
      ec.drawImage(sourceCanvas, 0, 0);
      embedW = pW; embedH = pH;
    } else if (rotAngle === 270) {
      embedCanvas = document.createElement('canvas');
      embedCanvas.width = ah; embedCanvas.height = aw;
      const ec = embedCanvas.getContext('2d');
      ec.setTransform(0, 1, -1, 0, ah, 0);
      ec.drawImage(sourceCanvas, 0, 0);
      embedW = pW; embedH = pH;
    } else if (rotAngle === 180) {
      embedCanvas = document.createElement('canvas');
      embedCanvas.width = aw; embedCanvas.height = ah;
      const ec = embedCanvas.getContext('2d');
      ec.setTransform(-1, 0, 0, -1, aw, ah);
      ec.drawImage(sourceCanvas, 0, 0);
      embedW = pW; embedH = pH;
    } else {
      embedCanvas = sourceCanvas;
      embedW = pW; embedH = pH;
    }
    const pngBytes = await new Promise(r => embedCanvas.toBlob(b => b.arrayBuffer().then(r), 'image/png'));
    const pngImg   = await pdfLibDoc.embedPng(pngBytes);
    page.drawImage(pngImg, { x: 0, y: 0, width: embedW, height: embedH });
  }

  /* 任意の注釈配列を一時Canvas (cw×ch) に描いて返す
     scaleFactor で内部解像度を上げて高画質化（モバイルでも一定品質を保証） */
  function drawAnnotationsToCanvas(annots, cw, ch, scaleFactor = 1) {
    const tmp = document.createElement('canvas');
    tmp.width  = Math.max(1, Math.round(cw * scaleFactor));
    tmp.height = Math.max(1, Math.round(ch * scaleFactor));
    const tctx = tmp.getContext('2d');
    /* 描画コマンドは元の座標で書けるよう、最初に scale を適用 */
    if (scaleFactor !== 1) tctx.scale(scaleFactor, scaleFactor);
    annots.forEach(a => {
      tctx.save();
      tctx.strokeStyle = a.color || '#000';
      tctx.fillStyle   = a.color || '#000';
      tctx.lineWidth   = a.size ?? 2;
      tctx.lineCap = tctx.lineJoin = 'round';
      if (a.type === 'pen') {
        tctx.beginPath();
        a.path.forEach((p, i) => i === 0 ? tctx.moveTo(p.x, p.y) : tctx.lineTo(p.x, p.y));
        tctx.stroke();
      } else if (a.type === 'line') {
        tctx.beginPath(); tctx.moveTo(a.x1, a.y1); tctx.lineTo(a.x2, a.y2); tctx.stroke();
      } else if (a.type === 'arrow') {
        drawArrow(tctx, a.x1, a.y1, a.x2, a.y2, a.color, a.size);
      } else if (a.type === 'rect') {
        const fc = fillStyleOf(a);
        if (fc) { tctx.fillStyle = fc; tctx.fillRect(a.x1, a.y1, a.x2 - a.x1, a.y2 - a.y1); }
        tctx.strokeRect(a.x1, a.y1, a.x2 - a.x1, a.y2 - a.y1);
      } else if (a.type === 'ellipse') {
        const cx = (a.x1 + a.x2) / 2, cy = (a.y1 + a.y2) / 2;
        const rx = Math.abs(a.x2 - a.x1) / 2, ry = Math.abs(a.y2 - a.y1) / 2;
        tctx.beginPath(); tctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
        const fc = fillStyleOf(a);
        if (fc) { tctx.fillStyle = fc; tctx.fill(); }
        tctx.stroke();
      } else if (a.type === 'text') {
        drawTextAnnotation(tctx, a);
      } else if (a.type === 'stamp') {
        drawStamp(tctx, a);
      }
      tctx.restore();
    });
    return tmp;
  }

  /* ビューア回転をPDFの各ページに焼き込む（回転のみ保存でも機能する） */
  if (pdfViewRotation !== 0) {
    for (const pg of pages) {
      const cur = pg.getRotation?.()?.angle ?? 0;
      pg.setRotation(PDFLib.degrees((cur + pdfViewRotation) % 360));
    }
  }

  /* 注釈レイヤーの目標解像度: PDF寸法 × TARGET_SCALE（144DPI相当）
     表示時の pdfScale に依存せず、常に高解像度で書き出す。
     幅・高さ両方を MAX_DIM でクランプし、大判図面(A0/A1等)で
     出力 PNG が巨大になって Railway の上限(100MB)を超えるのを防ぐ。 */
  const TARGET_SCALE = 2;
  const MAX_DIM = 4096;

  for (let pageNum = 1; pageNum <= totalPages; pageNum++) {
    const annots = pageAnnotations[pageNum] || [];
    if (!annots.length) continue;

    const page = pages[pageNum - 1];
    const { width: pW, height: pH } = page.getSize();
    const rotAngle = page.getRotation?.()?.angle ?? 0;

    let cw, ch;
    if (pageSizes[pageNum]) {
      cw = pageSizes[pageNum].w;
      ch = pageSizes[pageNum].h;
    } else {
      const pdfPage = await pdfDoc.getPage(pageNum);
      const _defVP  = pdfPage.getViewport({ scale: 1 });
      const _totRot = (_defVP.rotation + pdfViewRotation) % 360;
      const vp = pdfPage.getViewport({ scale: pdfScale, rotation: _totRot });
      cw = vp.width; ch = vp.height;
    }

    /* 表示用canvas (cw×ch) → 出力解像度を視覚的なPDF寸法基準で算出
       回転PDF: 視覚的な幅 = pH（内部高さ）、視覚的な高さ = pW（内部幅）
       幅・高さ両方を MAX_DIM でクランプして出力キャンバスを抑制 */
    const visualW = (rotAngle === 90 || rotAngle === 270) ? pH : pW;
    const visualH = (rotAngle === 90 || rotAngle === 270) ? pW : pH;
    let targetW = Math.min(visualW * TARGET_SCALE, MAX_DIM);
    let targetH = Math.min(visualH * TARGET_SCALE, MAX_DIM);
    /* 縦横比を保ちながらどちらか大きい方を MAX_DIM に収める */
    const scaleByW = targetW / cw;
    const scaleByH = targetH / ch;
    const scaleFactor = Math.max(Math.min(scaleByW, scaleByH), 1);

    /* 全注釈（スタンプ含む）を高解像度Canvasに描画 → bakeOnPage で焼き込む */
    const sourceCanvas = drawAnnotationsToCanvas(annots, cw, ch, scaleFactor);
    await bakeOnPage(page, sourceCanvas);
  }

  const bytes = await pdfLibDoc.save();
  return new Blob([bytes], { type: 'application/pdf' });
}

/* 画像に注釈を焼き込む */
async function buildAnnotatedImage() {
  await ensureTextFontsLoaded();
  const merged = document.createElement('canvas');
  merged.width  = baseCanvas.width;
  merged.height = baseCanvas.height;
  const mCtx = merged.getContext('2d');
  mCtx.drawImage(baseCanvas, 0, 0);
  annotations.forEach(a => {
    mCtx.save();
    mCtx.strokeStyle = a.color;
    mCtx.fillStyle   = a.color;
    mCtx.lineWidth   = a.size ?? 2;
    mCtx.lineCap = mCtx.lineJoin = 'round';
    drawAnnotationToCtx(mCtx, a);
    mCtx.restore();
  });
  return new Promise(r => merged.toBlob(r, 'image/jpeg', 0.92));
}

function drawAnnotationToCtx(ctx, a) {
  if (a.type === 'pen') {
    ctx.beginPath();
    a.path.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
    ctx.stroke();
  } else if (a.type === 'line') {
    ctx.beginPath(); ctx.moveTo(a.x1, a.y1); ctx.lineTo(a.x2, a.y2); ctx.stroke();
  } else if (a.type === 'arrow') {
    drawArrow(ctx, a.x1, a.y1, a.x2, a.y2, a.color, a.size);
  } else if (a.type === 'rect') {
    const fc = fillStyleOf(a);
    if (fc) { ctx.fillStyle = fc; ctx.fillRect(a.x1, a.y1, a.x2 - a.x1, a.y2 - a.y1); }
    ctx.strokeRect(a.x1, a.y1, a.x2 - a.x1, a.y2 - a.y1);
  } else if (a.type === 'ellipse') {
    const cx = (a.x1 + a.x2) / 2, cy = (a.y1 + a.y2) / 2;
    const rx = Math.abs(a.x2 - a.x1) / 2, ry = Math.abs(a.y2 - a.y1) / 2;
    ctx.beginPath(); ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
    const fc = fillStyleOf(a);
    if (fc) { ctx.fillStyle = fc; ctx.fill(); }
    ctx.stroke();
  } else if (a.type === 'text') {
    drawTextAnnotation(ctx, a);
  } else if (a.type === 'stamp') {
    drawStamp(ctx, a);
  }
}

/* ────── ユーティリティ ────── */
function setLoading(on, text = '') {
  const el = document.getElementById('loadingOverlay');
  el.classList.toggle('hidden', !on);
  if (text) document.getElementById('loadingText').textContent = text;
}

function showToast(msg, type = '') {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = `toast${type ? ' toast-' + type : ''}`;
  t.textContent = msg;
  c.appendChild(t);
  requestAnimationFrame(() => t.classList.add('show'));
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 3500);
}

function showToastWithAction(msg, actionLabel, onAction) {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = 'toast toast-success';
  t.style.cssText = 'display:flex;align-items:center;gap:12px;min-width:240px;';
  const span = document.createElement('span');
  span.textContent = msg;
  const btn = document.createElement('button');

  btn.addEventListener('click', () => { t.remove(); onAction(); });

/* ────── 保存後サムネイル先行生成 ──────
   wn-dashboard.js の IndexedDB（wn-thumb-cache）と同じキー形式で書き込む。
   ANNOT_THUMB_VER は wn-dashboard.js の THUMB_VER と必ず一致させること。 */
const ANNOT_THUMB_VER = 'v6';

async function preGenerateThumbnail(newFileId, updatedAt) {
  try {
    if (!baseCanvas || baseCanvas.width === 0) {
      console.warn('[Thumb] baseCanvas not ready');
      return;
    }

    /* baseCanvas(高解像度PDF) と annotCanvas(表示サイズ注釈) を合成 */
    const merged = document.createElement('canvas');
    merged.width  = baseCanvas.width;
    merged.height = baseCanvas.height;
    const mCtx = merged.getContext('2d');
    mCtx.drawImage(baseCanvas, 0, 0);

    /* 注釈がある場合はアップスケールして重ねる */
    if (annotCanvas.width > 0 && annotCanvas.height > 0 &&
        (annotations.length > 0 || Object.values(pageAnnotations).some(p => p && p.length))) {
      const sx = baseCanvas.width  / annotCanvas.width;
      const sy = baseCanvas.height / annotCanvas.height;
      mCtx.save();
      mCtx.scale(sx, sy);
      mCtx.drawImage(annotCanvas, 0, 0);
      mCtx.restore();
    }

    /* wn-dashboard.js と同等のパイプライン */
    const dpr        = Math.min(window.devicePixelRatio || 1, 2);
    const targetLong = Math.round(Math.min(1440, Math.max(720, 720 * dpr)));
    const shrunk  = _thumbShrink(merged, targetLong);
    const trimmed = _thumbTrim(shrunk);
    _thumbEnhance(trimmed);

    const blob = await new Promise(r => trimmed.toBlob(r, 'image/jpeg', 0.88));
    if (!blob) {
      console.warn('[Thumb] blob generation failed');
      return;
    }

    const cacheKey = `thumb_${newFileId}_${updatedAt ?? ''}_${ANNOT_THUMB_VER}`;
    console.log('[Thumb] Writing to IndexedDB:', cacheKey, `(${blob.size} bytes)`);

    /* IndexedDB 書き込み（エラーハンドリング強化） */
    await new Promise((resolve, reject) => {
      const req = indexedDB.open('wn-thumb-cache', 1);

      req.onupgradeneeded = e => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains('thumbs')) {
          db.createObjectStore('thumbs');
        }
      };

      req.onsuccess = e => {
        try {
          const db = e.target.result;
          const tx = db.transaction('thumbs', 'readwrite');
          const store = tx.objectStore('thumbs');

          /* 古いキャッシュを削除 */
          const delReq = store.openCursor();
          delReq.onsuccess = ev => {
            const cursor = ev.target.result;
            if (cursor) {
              if (String(cursor.key).startsWith(`thumb_${newFileId}_`)) {
                cursor.delete();
              }
              cursor.continue();
            }
          };

          /* 新しいキャッシュを保存 */
          const putReq = store.put(blob, cacheKey);

          tx.oncomplete = () => {
            console.log('[Thumb] ✓ Successfully written to IndexedDB');
            /* ダッシュボード側のメモリキャッシュをリセット信号 */
            localStorage.setItem('wn_thumb_bust', newFileId);
            resolve();
          };
          tx.onerror = () => {
            console.warn('[Thumb] Transaction error:', tx.error);
            reject(tx.error);
          };
        } catch (err) {
          console.warn('[Thumb] Database error:', err);
          reject(err);
        }
      };

      req.onerror = () => {
        console.warn('[Thumb] Failed to open IndexedDB:', req.error);
        reject(req.error);
      };
    });
  } catch (err) {
    console.warn('[Thumb] preGenerateThumbnail error:', err);
  }
}

/* 段階縮小（wn-dashboard.js の wnShrinkCanvas と同実装） */
function _thumbShrink(src, targetLong) {
  let cur = src;
  while (Math.max(cur.width, cur.height) > targetLong * 2) {
    const next = document.createElement('canvas');
    next.width  = Math.max(1, Math.round(cur.width  / 2));
    next.height = Math.max(1, Math.round(cur.height / 2));
    const ctx = next.getContext('2d');
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    ctx.drawImage(cur, 0, 0, next.width, next.height);
    cur = next;
  }
  if (Math.max(cur.width, cur.height) > targetLong) {
    const ratio = targetLong / Math.max(cur.width, cur.height);
    const next  = document.createElement('canvas');
    next.width  = Math.max(1, Math.round(cur.width  * ratio));
    next.height = Math.max(1, Math.round(cur.height * ratio));
    next.getContext('2d').drawImage(cur, 0, 0, next.width, next.height);
    cur = next;
  }
  return cur;
}

/* 余白トリミング（wn-dashboard.js の wnTrimMargins と同実装） */
function _thumbTrim(canvas, pad = 0.03) {
  try {
    const w = canvas.width, h = canvas.height;
    const ctx = canvas.getContext('2d');
    const d = ctx.getImageData(0, 0, w, h).data;
    const idx = (x, y) => (y * w + x) * 4;
    let br = 0, bg = 0, bb = 0;
    for (const [x, y] of [[0,0],[w-1,0],[0,h-1],[w-1,h-1]]) {
      const i = idx(x, y); br += d[i]; bg += d[i+1]; bb += d[i+2];
    }
    br /= 4; bg /= 4; bb /= 4;
    const isBg = i => Math.abs(d[i]-br)+Math.abs(d[i+1]-bg)+Math.abs(d[i+2]-bb) < 48;
    const sx = Math.max(1, Math.floor(w / 600));
    const sy = Math.max(1, Math.floor(h / 600));
    let minX = w, minY = h, maxX = -1, maxY = -1;
    for (let y = 0; y < h; y += sy)
      for (let x = 0; x < w; x += sx)
        if (!isBg(idx(x, y))) {
          if (x < minX) minX = x; if (x > maxX) maxX = x;
          if (y < minY) minY = y; if (y > maxY) maxY = y;
        }
    if (maxX < 0) return canvas;
    minX = Math.max(0, minX - Math.round(w * pad));
    maxX = Math.min(w-1, maxX + Math.round(w * pad));
    minY = Math.max(0, minY - Math.round(h * pad));
    maxY = Math.min(h-1, maxY + Math.round(h * pad));
    const cw = maxX - minX + 1, ch = maxY - minY + 1;
    if (cw < w * 0.3 || ch < h * 0.3 || (cw > w * 0.95 && ch > h * 0.95)) return canvas;
    const out = document.createElement('canvas');
    out.width = cw; out.height = ch;
    out.getContext('2d').drawImage(canvas, minX, minY, cw, ch, 0, 0, cw, ch);
    return out;
  } catch { return canvas; }
}

/* 線画強調（wn-dashboard.js の wnEnhanceLineArt と同実装） */
function _thumbEnhance(canvas, amount = 1.1, gamma = 1.45) {
  try {
    const w = canvas.width, h = canvas.height;
    const ctx  = canvas.getContext('2d');
    const blur = document.createElement('canvas');
    blur.width = w; blur.height = h;
    const bctx = blur.getContext('2d');
    bctx.filter = 'blur(1px)';
    bctx.drawImage(canvas, 0, 0);
    const img = ctx.getImageData(0, 0, w, h);
    const bim = bctx.getImageData(0, 0, w, h);
    const s = img.data, b = bim.data;
    const lut = new Uint8ClampedArray(256);
    for (let v = 0; v < 256; v++) lut[v] = Math.round(255 * Math.pow(v / 255, gamma));
    for (let i = 0; i < s.length; i += 4)
      for (let c = 0; c < 3; c++) {
        let v = s[i+c] + amount * (s[i+c] - b[i+c]);
        s[i+c] = lut[Math.max(0, Math.min(255, Math.round(v)))];
      }
    ctx.putImageData(img, 0, 0);
  } catch {}
}
