<script>
'use strict';

pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const params   = new URLSearchParams(location.search);
let   fileId   = params.get('id');
const fromPage = params.get('from') || 'file-detail.html';

let currentUser = null;
let fileData    = null;
let saveMode    = 'newversion'; // 'newversion' | 'overwrite'

/* PDF 用 */
let pdfDoc          = null;
let currentPage     = 1;
let totalPages      = 1;
let pdfScale        = 1.5;
let normalScale     = 1.5;   // A4フィットスケール（通常表示）
let fitScale        = 1.5;   // キャンバスエリア全体フィットスケール（全体表示）
let zoomMode        = 'normal'; // 'normal' | 'fit' | 'free'
let pdfViewRotation = 0;     // ビューア側追加回転: 0 | 90 | 180 | 270

/* アノテーション状態 */
let tool        = 'text';
let strokeColor = '#E53935';
let strokeSize  = 20;
let fontSize    = 50;
let textAlign   = 'left';
const TOOL_DEFAULT_SIZE = { pen: 10, line: 10, arrow: 10, rect: 5, ellipse: 5 };

/* ── 塗りつぶし（四角形・楕円）の既定状態 ── */
let rectFill    = false;  /* 新規四角形・楕円を塗りつぶすか */
let fillOpacity = 30;     /* 塗りつぶしの濃さ(%) 0〜100 */

/* ── テキストのフォント・スタイル（ilovepdf風） ── */
const FONT_FAMILIES = [
  { id: 'sans',  label: 'ゴシック',   css: "'Noto Sans JP', sans-serif" },
  { id: 'serif', label: '明朝',       css: "'Noto Serif JP', serif" },
  { id: 'round', label: '丸ゴシック', css: "'M PLUS Rounded 1c', 'Kosugi Maru', sans-serif" },
];
let textFontFamily = 'sans';   /* 新規テキストのデフォルトフォント */
let textBold       = false;
let textItalic     = false;
let textUnderline  = false;

/* アノテーション a から canvas用フォント文字列を生成 */
function fontCssOf(a) {
  const def = FONT_FAMILIES.find(f => f.id === (a.fontFamily || 'sans')) || FONT_FAMILIES[0];
  const fs  = a.fontSize ?? 50;
  return `${a.italic ? 'italic ' : ''}${a.bold ? '700' : '400'} ${fs}px ${def.css}`;
}
function fontFamilyCss(id) {
  return (FONT_FAMILIES.find(f => f.id === id) || FONT_FAMILIES[0]).css;
}

/* hex色 + 不透明度(0〜1) を rgba文字列に変換 */
function hexToRgba(hex, alpha) {
  let h = String(hex || '').replace('#', '');
  if (h.length === 3) h = h.split('').map(c => c + c).join('');
  if (h.length !== 6) return `rgba(0,0,0,${alpha})`;
  const r = parseInt(h.slice(0, 2), 16);
  const g = parseInt(h.slice(2, 4), 16);
  const b = parseInt(h.slice(4, 6), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}
/* 塗りつぶし注釈の塗り色(rgba)を返す。塗りつぶし無効・濃さ0なら null */
function fillStyleOf(a) {
  if (!a || !a.fill) return null;
  const pct = Math.max(0, Math.min(100, a.fillOpacity ?? 30));
  if (pct <= 0) return null;
  return hexToRgba(a.color || '#000000', pct / 100);
}

/* 焼き込み前に全Webフォントの読み込みを保証（未使用フォントが代替表示されるのを防ぐ） */
async function ensureTextFontsLoaded() {
  if (!document.fonts) return;
  const fams = ["'Noto Sans JP'", "'Noto Serif JP'", "'M PLUS Rounded 1c'", "'Kosugi Maru'"];
  const jobs = [];
  for (const f of fams) for (const w of ['400', '700']) {
    try { jobs.push(document.fonts.load(`${w} 40px ${f}`, '注釈Aa')); } catch (_) {}
  }
  try { await Promise.all(jobs); } catch (_) {}
}

/* テキスト注釈を任意の ctx に描画（画面表示・PDF焼き込み・画像焼き込み 共通） */
function drawTextAnnotation(ctx, a) {
  const fs = a.fontSize ?? 50;
  const al = a.align ?? 'left';
  ctx.font      = fontCssOf(a);
  ctx.fillStyle = a.color;
  ctx.textAlign = al;
  const baseX = al === 'center' ? a.x + (a.w ?? 0) / 2
              : al === 'right'  ? a.x + (a.w ?? 0)
              : a.x;
  const lineH = fs * 1.4;
  const drawn = [];   /* 下線描画用に各行のテキストとy座標を控える */
  let li = 0;
  (a.text || '').split('\n').forEach(paragraph => {
    if (a.w) {
      let line = '';
      for (const ch of paragraph) {
        const test = line + ch;
        if (ctx.measureText(test).width > a.w && line.length > 0) {
          const y = a.y + li * lineH;
          ctx.fillText(line, baseX, y); drawn.push({ line, y });
          line = ch; li++;
        } else { line = test; }
      }
      if (line) { const y = a.y + li * lineH; ctx.fillText(line, baseX, y); drawn.push({ line, y }); li++; }
    } else {
      const y = a.y + li * lineH;
      ctx.fillText(paragraph, baseX, y); drawn.push({ line: paragraph, y }); li++;
    }
  });
  if (a.underline) {
    ctx.strokeStyle = a.color;
    ctx.lineWidth   = Math.max(fs * 0.06, 1);
    ctx.beginPath();
    drawn.forEach(d => {
      const w  = ctx.measureText(d.line).width;
      const lx = al === 'center' ? baseX - w / 2 : al === 'right' ? baseX - w : baseX;
      const ly = d.y + fs * 0.16;
      ctx.moveTo(lx, ly); ctx.lineTo(lx + w, ly);
    });
    ctx.stroke();
  }
  ctx.textAlign = 'left';
}

let annotations = [];
let history     = [];
let penPath     = [];
let selectedIdx = -1;

/* ドラッグ共通状態 */
const HANDLE_R = 9;
let dragging       = false;
let didDrag        = false;
let startX = 0, startY = 0;
let dragOffX = 0, dragOffY = 0;
let resizingHandle = null;

/* テキスト入力 pending */
let editingTextIdx = -1;
let lastCommitTime = 0; /* 確定直後の誤入力防止 */
/* テキスト クリック即入力用 — mousedown位置を記録 */
let pendingTextClick = null; /* { x, y } */
/* Redo スタック */
let redoStack = [];
/* ホバー中のインデックス */
let hoverIdx = -1;

/* ツールと図形タイプの対応 */
const TOOL_TYPES = { rect: 'rect', ellipse: 'ellipse', line: 'line', arrow: 'arrow', text: 'text' };

/* スタンプ定義（3種類） */
const STAMP_DEFS = [
  { id: 'approved', label: '承認済み', customLabel: null, color: '#00B894' },
  { id: 'review',   label: '要確認',   customLabel: null, color: '#F57F17' },
  { id: 'return',   label: '差し戻し', customLabel: null, color: '#E17055' },
];
let dragStampId   = null;
let dragSignature = false;

const baseCanvas  = document.getElementById('baseCanvas');
const annotCanvas = document.getElementById('annotCanvas');
const basCtx      = baseCanvas.getContext('2d');
const annCtx      = annotCanvas.getContext('2d');

/* ────── 初期化 ────── */
document.addEventListener('DOMContentLoaded', async () => {
  currentUser = requireSpaceAuth();
  if (!currentUser || !fileId) { location.href = fromPage + '?id=' + fileId; return; }

  document.getElementById('backBtn').addEventListener('click', () => {
    location.href = fromPage + '?id=' + fileId;
  });

  initTools();
  initTextInput();
  initTextToolbar();
  initTopActions();
  initContextMenu();
  initKeyboard();
  initCustomColor();
  initStampPalette();

  setLoading(true, 'ファイルを読み込み中…');
  fileData = await wnGetFile(fileId);
  if (!fileData) { showToast('ファイルが見つかりません', 'danger'); return; }

  document.getElementById('topTitle').textContent = `注釈編集：${fileData.file_name}`;

  const ext  = fileData.file_name.split('.').pop().toLowerCase();
  const mime = fileData.mime_type ?? '';

  if (ext === 'pdf' || mime === 'application/pdf') {
    await loadPdf();
  } else if (['heic','heif'].includes(ext) || mime === 'image/heic' || mime === 'image/heif') {
    await loadHeic();
  } else if (mime.startsWith('image/') || ['png','jpg','jpeg','gif','webp','svg'].includes(ext)) {
    await loadImage();
  } else {
    setLoading(false);
    showToast('この形式はアノテーション非対応です', 'danger');
    setTimeout(() => location.href = fromPage + '?id=' + fileId, 2000);
    return;
  }

  setLoading(false);
  initCanvas();
  /* 保存後リロード時のトースト */
  if (params.get('saved')) {
    showToast('保存しました（注釈が焼き込まれたPDFを表示中）', 'success');
    window.history.replaceState(null, '', location.pathname + '?id=' + fileId + '&from=' + encodeURIComponent(fromPage));
  }
});

/* ────── PDF 読み込み ────── */
async function loadPdf() {
  const url = wnPublicViewUrl(fileId);
  pdfDoc     = await pdfjsLib.getDocument(url).promise;
  totalPages = pdfDoc.numPages;

  // 1ページ目のサイズからスケールを計算
  const firstPage  = await pdfDoc.getPage(1);
  const _fp0       = firstPage.getViewport({ scale: 1 });
  const _totR0     = (_fp0.rotation + pdfViewRotation) % 360;
  const baseVP     = firstPage.getViewport({ scale: 1, rotation: _totR0 });

  /* canvasArea の実寸を使う（モバイルでは toolbar が下部に来るためレイアウトが異なる） */
  const canvasArea = document.getElementById('canvasArea');
  const padding    = 32;
  const areaW = Math.max(canvasArea.clientWidth  - padding, 100);
  const areaH = Math.max(canvasArea.clientHeight - padding, 100);

  // fitScale: ページ全体がエリアに収まる最大スケール（幅・高さ両方考慮）
  fitScale    = Math.min(areaW / baseVP.width, areaH / baseVP.height);
  // normalScale: 幅フィット（スクロールして読む用）
  normalScale = areaW / baseVP.width;

  pdfScale = fitScale;
  zoomMode = 'fit';

  // ズームボタンを表示
  document.getElementById('zoomArea').style.display = '';
  updateZoomBtns();

  if (totalPages > 1) {
    document.getElementById('pageNav').style.display = '';
    document.getElementById('pageLabel').textContent = `${currentPage} / ${totalPages}`;
    document.getElementById('prevPage').disabled = true;
    document.getElementById('nextPage').disabled = totalPages <= 1;
  }
  await renderPdfPage(currentPage);
}

async function renderPdfPage(num) {
  setLoading(true, `${num}ページ目を読み込み中…`);
  const page = await pdfDoc.getPage(num);

  /* 表示用ビューポート（注釈座標と一致するサイズ） */
  const _defVP    = page.getViewport({ scale: 1 });
  const _totRot   = (_defVP.rotation + pdfViewRotation) % 360;
  const displayVP = page.getViewport({ scale: pdfScale, rotation: _totRot });

  /* レンダリング用スケール：file-detail.html と同等。表示時に小さくならないよう
     最低でも PDF 寸法の 1.5 倍で描画 + DPR 補正。MAX_CANVAS_DIM で上限。 */
  const dpr = Math.max(window.devicePixelRatio || 1, 2);
  const MIN_RENDER_SCALE = 1.5;
  const MAX_CANVAS_DIM   = 4096;
  const baseVP1    = page.getViewport({ scale: 1, rotation: _totRot });
  let renderScale  = Math.max(pdfScale * dpr, MIN_RENDER_SCALE);
  const maxBaseDim = Math.max(baseVP1.width, baseVP1.height);
  if (maxBaseDim * renderScale > MAX_CANVAS_DIM) {
    renderScale = MAX_CANVAS_DIM / maxBaseDim;
  }
  const renderVP = page.getViewport({ scale: renderScale, rotation: _totRot });

  /* annotCanvas は表示サイズに合わせる（注釈座標の互換性維持） */
  annotCanvas.width  = displayVP.width;
  annotCanvas.height = displayVP.height;
  /* baseCanvas は高解像度で内部レンダリング、CSS で表示サイズに縮小 */
  baseCanvas.width  = renderVP.width;
  baseCanvas.height = renderVP.height;
  baseCanvas.style.width  = displayVP.width  + 'px';
  baseCanvas.style.height = displayVP.height + 'px';

  pageSizes[num] = { w: displayVP.width, h: displayVP.height };
  await page.render({ canvasContext: basCtx, viewport: renderVP }).promise;
  redrawAnnotations();
  setLoading(false);
}

function updateZoomBtns() {
  document.getElementById('fitBtn').classList.toggle('active', zoomMode === 'fit');
  document.getElementById('actualBtn').classList.toggle('active', zoomMode === 'normal');
  const pct = Math.round(pdfScale / normalScale * 100);
  document.getElementById('zoomLabel').textContent = pct + '%';
  document.getElementById('zoomOutBtn').disabled = pdfScale <= normalScale * 0.1 + 0.001;
  document.getElementById('zoomInBtn').disabled  = pdfScale >= normalScale * 4   - 0.001;
}

/* 任意スケールに変更する共通処理 */
async function applyZoom(newScale) {
  const clamped = Math.max(normalScale * 0.1, Math.min(normalScale * 4, newScale));
  if (Math.abs(clamped - pdfScale) < 0.001) return;
  const oldScale = pdfScale;
  pdfScale = clamped;
  zoomMode = 'free';
  rescaleAllAnnotations(oldScale, pdfScale);
  await renderPdfPage(currentPage);
  redrawAnnotations();
  updateZoomBtns();
}

document.getElementById('fitBtn').addEventListener('click', async () => {
  if (zoomMode === 'fit') return;
  const oldScale = pdfScale;
  zoomMode = 'fit';
  pdfScale = fitScale;
  updateZoomBtns();
  rescaleAllAnnotations(oldScale, fitScale);
  await renderPdfPage(currentPage);
  redrawAnnotations();
});

document.getElementById('actualBtn').addEventListener('click', async () => {
  if (zoomMode === 'normal') return;
  const oldScale = pdfScale;
  zoomMode = 'normal';
  pdfScale = normalScale;
  updateZoomBtns();
  rescaleAllAnnotations(oldScale, normalScale);
  await renderPdfPage(currentPage);
  redrawAnnotations();
});

document.getElementById('zoomInBtn').addEventListener('click', () => applyZoom(pdfScale * 1.25));
document.getElementById('zoomOutBtn').addEventListener('click', () => applyZoom(pdfScale / 1.25));

document.getElementById('rotateCCWBtn').addEventListener('click', () => applyPdfViewRotation(-90));
document.getElementById('rotateCWBtn').addEventListener('click',  () => applyPdfViewRotation(90));

/* PDF ビューア回転（全ページの注釈をリセットしてから回転） */
async function applyPdfViewRotation(delta) {
  const hasAny = annotations.length > 0 ||
    Object.values(pageAnnotations).some(arr => arr && arr.length > 0);

  if (hasAny) {
    showToast('注釈をリセットしてページを回転しました', 'info');
    annotations = [];
    Object.keys(pageAnnotations).forEach(k => { pageAnnotations[k] = []; });
    Object.keys(pageSizes).forEach(k => { delete pageSizes[k]; });
    redrawAnnotations();
  }

  pdfViewRotation = (pdfViewRotation + delta + 360) % 360;

  /* 回転後の寸法でスケールを再計算 */
  const pg      = await pdfDoc.getPage(currentPage);
  const _defVP  = pg.getViewport({ scale: 1 });
  const _totRot = (_defVP.rotation + pdfViewRotation) % 360;
  const baseVP  = pg.getViewport({ scale: 1, rotation: _totRot });

  const canvasArea = document.getElementById('canvasArea');
  const padding    = 32;
  const areaW      = Math.max(canvasArea.clientWidth  - padding, 100);
  const areaH      = Math.max(canvasArea.clientHeight - padding, 100);

  fitScale    = Math.min(areaW / baseVP.width, areaH / baseVP.height);
  normalScale = areaW / baseVP.width;
  pdfScale    = fitScale;
  zoomMode    = 'fit';

  await renderPdfPage(currentPage);
  updateZoomBtns();

  if (!hasAny) showToast('ページを回転しました', 'success');
}

/* Ctrl+マウスホイールでズーム */
document.getElementById('canvasArea').addEventListener('wheel', e => {
  if (!e.ctrlKey && !e.metaKey) return;
  e.preventDefault();
  applyZoom(pdfScale * (e.deltaY < 0 ? 1.12 : 1 / 1.12));
}, { passive: false });

/* ズーム切替時に全ページのアノテーション座標をスケール比で変換 */
function rescaleAllAnnotations(fromScale, toScale) {
  const ratio = toScale / fromScale;
  if (Math.abs(ratio - 1) < 0.001) return;

  // 現在ページのアノテーションを先保存
  pageAnnotations[currentPage] = [...annotations];

  for (const pg of Object.keys(pageAnnotations)) {
    pageAnnotations[pg] = pageAnnotations[pg].map(a => scaleAnnotation(a, ratio));
    if (pageSizes[pg]) {
      pageSizes[pg] = { w: pageSizes[pg].w * ratio, h: pageSizes[pg].h * ratio };
    }
  }
  // 現在ページのアノテーションを更新
  annotations = [...(pageAnnotations[currentPage] || [])];
}

function scaleAnnotation(a, r) {
  const s = { ...a };
  if ('x'  in s) s.x  = s.x  * r;
  if ('y'  in s) s.y  = s.y  * r;
  if ('x1' in s) s.x1 = s.x1 * r;
  if ('y1' in s) s.y1 = s.y1 * r;
  if ('x2' in s) s.x2 = s.x2 * r;
  if ('y2' in s) s.y2 = s.y2 * r;
  if (s.type === 'pen' && Array.isArray(s.path)) {
    s.path = s.path.map(p => ({ x: p.x * r, y: p.y * r }));
  }
  if (s.type === 'stamp') s.size = (s.size ?? 90) * r;
  return s;
}

async function goToPage(n) {
  if (n < 1 || n > totalPages) return;
  savePageAnnotations();
  currentPage = n;
  dragging = false;
  penPath  = [];
  loadPageAnnotations();
  await renderPdfPage(currentPage);
  document.getElementById('pageLabel').textContent = `${currentPage} / ${totalPages}`;
  document.getElementById('prevPage').disabled = currentPage <= 1;
  document.getElementById('nextPage').disabled = currentPage >= totalPages;
}

document.getElementById('prevPage').addEventListener('click', () => goToPage(currentPage - 1));
document.getElementById('nextPage').addEventListener('click', () => goToPage(currentPage + 1));

/* ページ別アノテーション保管（サイズも同時保存） */
const pageAnnotations = {};
const pageSizes = {};
function savePageAnnotations() {
  pageAnnotations[currentPage] = [...annotations];
  pageSizes[currentPage] = { w: annotCanvas.width, h: annotCanvas.height };
}
function loadPageAnnotations() {
  annotations = [...(pageAnnotations[currentPage] || [])];
}

/* ────── 画像読み込み ────── */
async function loadImage() {
  const url = wnPublicViewUrl(fileId);
  await new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      const maxW = window.innerWidth - 32;
      const maxH = window.innerHeight - 120;
      let w = img.naturalWidth, h = img.naturalHeight;
      const r = Math.min(maxW / w, maxH / h, 1);
      w = Math.round(w * r); h = Math.round(h * r);
      resizeCanvases(w, h);
      basCtx.drawImage(img, 0, 0, w, h);
      resolve();
    };
    img.onerror = reject;
    img.src = url;
  });
}

/* ────── HEIC 読み込み ────── */
async function loadHeic() {
  setLoading(true, 'HEICを変換中…');
  const buffer = await wnFetchFileBuffer(fileId);
  let blob = await heic2any({ blob: new Blob([buffer], { type: 'image/heic' }), toType: 'image/jpeg', quality: 0.9 });
  if (Array.isArray(blob)) blob = blob[0];
  const url = URL.createObjectURL(blob);
  await new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const maxW = window.innerWidth - 32;
      const maxH = window.innerHeight - 120;
      let w = img.naturalWidth, h = img.naturalHeight;
      const r = Math.min(maxW / w, maxH / h, 1);
      w = Math.round(w * r); h = Math.round(h * r);
      resizeCanvases(w, h);
      basCtx.drawImage(img, 0, 0, w, h);
      resolve();
    };
    img.onerror = reject;
    img.src = url;
  });
}

/* ────── キャンバスサイズ ────── */
function resizeCanvases(w, h) {
  baseCanvas.width  = annotCanvas.width  = w;
  baseCanvas.height = annotCanvas.height = h;
  /* PDF レンダリング時に設定された CSS サイズをクリア（画像/HEIC で同サイズで使うため） */
  baseCanvas.style.width  = '';
  baseCanvas.style.height = '';
}

/* ────── ツール初期化 ────── */
function initTools() {
  document.querySelectorAll('[data-tool]').forEach(btn => {
    btn.addEventListener('click', () => {
      tool = btn.dataset.tool;
      document.querySelectorAll('[data-tool]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      annotCanvas.style.cursor = toolCursor(tool);
      if (TOOL_DEFAULT_SIZE[tool] !== undefined) {
        strokeSize = TOOL_DEFAULT_SIZE[tool];
        document.getElementById('strokeSize').value = strokeSize;
      }
    });
  });

  document.querySelectorAll('.tool-color-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (!btn.dataset.color) return;   // customColorBtn は別ハンドラ
      strokeColor = btn.dataset.color;
      document.querySelectorAll('.tool-color-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      applyColorToSelection(strokeColor);
    });
  });

  document.getElementById('strokeSize').addEventListener('input', e => {
    const v = parseInt(e.target.value);
    if (v >= 1 && v <= 100) {
      strokeSize = v;
      /* 選択中の注釈（サイズを持つもの）に即時反映 */
      if (selectedIdx >= 0 && annotations[selectedIdx]) {
        const a = annotations[selectedIdx];
        if (['line','arrow','rect','ellipse','pen'].includes(a.type)) {
          a.size = v;
          redrawAnnotations();
        }
      }
    }
  });

  /* 塗りつぶし ON/OFF トグル */
  document.getElementById('fillToggle').addEventListener('click', () => {
    rectFill = !rectFill;
    document.getElementById('fillToggle').classList.toggle('active', rectFill);
    /* 選択中の四角形・楕円に即時反映 */
    if (selectedIdx >= 0) {
      const a = annotations[selectedIdx];
      if (a && (a.type === 'rect' || a.type === 'ellipse')) {
        pushHistory();
        a.fill = rectFill;
        if (a.fillOpacity == null) a.fillOpacity = fillOpacity;
        redrawAnnotations();
      }
    }
  });

  /* 塗りつぶしの濃さ(%) */
  document.getElementById('fillOpacityInput').addEventListener('input', e => {
    let v = parseInt(e.target.value);
    if (isNaN(v)) return;
    v = Math.max(0, Math.min(100, v));
    fillOpacity = v;
    /* 選択中の四角形・楕円に即時反映 */
    if (selectedIdx >= 0) {
      const a = annotations[selectedIdx];
      if (a && (a.type === 'rect' || a.type === 'ellipse')) {
        a.fillOpacity = v;
        /* 濃さを指定したら塗りつぶしを自動でON */
        if (v > 0 && !a.fill) {
          a.fill = true; rectFill = true;
          document.getElementById('fillToggle').classList.add('active');
        }
        redrawAnnotations();
      }
    }
  });

  document.getElementById('fontSize').addEventListener('input', e => {
    const v = parseInt(e.target.value);
    if (v >= 6 && v <= 200) applyTextStyle({ fontSize: v });
  });

  document.querySelectorAll('[data-align]').forEach(btn => {
    btn.addEventListener('click', () => applyTextStyle({ align: btn.dataset.align }));
  });
}

function initStampPalette() {
  /* 保存済みラベルをlocalStorageから復元 */
  STAMP_DEFS.forEach(def => {
    const saved = localStorage.getItem(`wn_stamp_label_${def.id}`);
    if (saved !== null) def.customLabel = saved || null;
  });

  const palette = document.getElementById('stampPalette');
  STAMP_DEFS.forEach(def => {
    const item = document.createElement('div');
    item.className = 'stamp-item';
    item.draggable = true;
    item.dataset.stampId = def.id;

    const preview = document.createElement('div');
    preview.className = 'stamp-preview';
    preview.style.cssText = `border-color:${def.color};color:${def.color};`;
    preview.textContent = def.customLabel ?? def.label;

    const info = document.createElement('div');
    info.className = 'stamp-item-info';

    const labelInput = document.createElement('input');
    labelInput.type = 'text';
    labelInput.className = 'stamp-label-edit';
    labelInput.value = def.customLabel ?? def.label;
    labelInput.maxLength = 10;
    labelInput.placeholder = def.label;
    labelInput.draggable = false;
    labelInput.addEventListener('mousedown', e => e.stopPropagation());
    labelInput.addEventListener('input', () => {
      def.customLabel = labelInput.value || null;
      localStorage.setItem(`wn_stamp_label_${def.id}`, labelInput.value);
      preview.textContent = def.customLabel ?? def.label;
    });

    const hint = document.createElement('div');
    hint.className = 'stamp-item-hint';
    hint.textContent = 'ドラッグして貼り付け';

    info.appendChild(labelInput);
    info.appendChild(hint);
    item.appendChild(preview);
    item.appendChild(info);

    item.addEventListener('dragstart', e => {
      dragStampId = def.id;
      e.dataTransfer.effectAllowed = 'copy';
      item.classList.add('dragging-active');
    });
    item.addEventListener('dragend', () => {
      item.classList.remove('dragging-active');
      dragStampId = null;
    });
    palette.appendChild(item);
  });

  /* canvas上のスタンプ選択時のラベル編集 */
  document.getElementById('stampLabelInput').addEventListener('input', e => {
    if (selectedIdx >= 0 && annotations[selectedIdx]?.type === 'stamp') {
      annotations[selectedIdx].customLabel = e.target.value;
      redrawAnnotations();
    }
  });

  /* 署名: localStorage から復元 + 入力時に保存 + ドラッグハンドラ */
  const sigDate    = document.getElementById('sigDate');
  const sigCompany = document.getElementById('sigCompany');
  const sigName    = document.getElementById('sigName');
  const sigDrop    = document.getElementById('signatureDragItem');
  if (sigDate && sigCompany && sigName && sigDrop) {
    sigDate.value    = localStorage.getItem('wn_sig_date')    || '';
    sigCompany.value = localStorage.getItem('wn_sig_company') || '';
    sigName.value    = localStorage.getItem('wn_sig_name')    || '';
    /* 年月日の placeholder を今日の日付に */
    sigDate.placeholder = `例: ${new Date().getFullYear()}/${String(new Date().getMonth()+1).padStart(2,'0')}/${String(new Date().getDate()).padStart(2,'0')}`;

    sigDate.addEventListener('input',    () => localStorage.setItem('wn_sig_date',    sigDate.value));
    sigCompany.addEventListener('input', () => localStorage.setItem('wn_sig_company', sigCompany.value));
    sigName.addEventListener('input',    () => localStorage.setItem('wn_sig_name',    sigName.value));
    /* 入力欄でのドラッグ操作はテキスト選択のみ */
    [sigDate, sigCompany, sigName].forEach(el => {
      el.draggable = false;
      el.addEventListener('mousedown', e => e.stopPropagation());
    });

    sigDrop.addEventListener('dragstart', e => {
      dragSignature = true;
      e.dataTransfer.effectAllowed = 'copy';
      sigDrop.classList.add('dragging-active');
    });
    sigDrop.addEventListener('dragend', () => {
      sigDrop.classList.remove('dragging-active');
      dragSignature = false;
    });
  }
}

function toolCursor(t) {
  const map = { select: 'default', pen: 'crosshair', line: 'crosshair',
    arrow: 'crosshair', rect: 'crosshair', ellipse: 'crosshair',
    text: 'text', eraser: 'cell' };
  return map[t] || 'default';
}

/* サイドバーUIを図形の設定に同期 */
function syncSidebarToAnnotation(a) {
  if (a.color) {
    strokeColor = a.color;
    document.querySelectorAll('.tool-color-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.color === strokeColor);
    });
  }
  if (a.size) {
    strokeSize = a.size;
    const ss = document.getElementById('strokeSize');
    if (ss) ss.value = String(strokeSize);
  }
  if (a.fontSize) {
    fontSize = a.fontSize;
    const fs = document.getElementById('fontSize');
    if (fs) fs.value = String(fontSize);
  }
  if (a.align) {
    textAlign = a.align;
    document.querySelectorAll('[data-align]').forEach(b => b.classList.toggle('active', b.dataset.align === textAlign));
  }
  /* テキスト選択時は書式（フォント・B/I/U）も拾って次回入力のデフォルトにする */
  if (a.type === 'text') {
    textFontFamily = a.fontFamily || 'sans';
    textBold       = !!a.bold;
    textItalic     = !!a.italic;
    textUnderline  = !!a.underline;
  }
  /* 四角形・楕円選択時は塗りつぶし状態をUIに同期 */
  if (a.type === 'rect' || a.type === 'ellipse') {
    rectFill = !!a.fill;
    if (a.fillOpacity != null) fillOpacity = a.fillOpacity;
    const ft = document.getElementById('fillToggle');
    if (ft) ft.classList.toggle('active', rectFill);
    const opEl = document.getElementById('fillOpacityInput');
    if (opEl && document.activeElement !== opEl) opEl.value = String(fillOpacity);
  }
  updateStampEditArea();
}

/* ────── キャンバスイベント ────── */
function initCanvas() {
  annotCanvas.style.cursor = toolCursor(tool);
  annotCanvas.addEventListener('mousedown', onDown);
  document.addEventListener('mousemove', onMoveDoc);
  document.addEventListener('mouseup',   onUpDoc);
  annotCanvas.addEventListener('dblclick', onDblClick);
  annotCanvas.addEventListener('contextmenu', onContextMenu);
  /* ホバーカーソル */
  annotCanvas.addEventListener('mousemove', onHover);
  annotCanvas.addEventListener('touchstart', e => { e.preventDefault(); onDown(touchToMouse(e)); }, { passive: false });
  annotCanvas.addEventListener('touchmove',  e => { e.preventDefault(); onMoveDoc(touchToMouse(e)); }, { passive: false });
  annotCanvas.addEventListener('touchend',   e => { e.preventDefault(); onUpDoc(touchToMouse(e)); }, { passive: false });

  /* スタンプ・署名のドラッグ&ドロップ（canvasArea と annotCanvas 両方で受け付ける） */
  function onItemDrop(e) {
    if (dragStampId) {
      e.preventDefault();
      const { x, y } = canvasXY(e);
      const def = STAMP_DEFS.find(d => d.id === dragStampId);
      pushHistory();
      annotations.push({ type: 'stamp', stampId: dragStampId, x, y, size: 90, customLabel: def?.customLabel || null });
      dragStampId = null;
      redrawAnnotations();
      showToast('スタンプを貼り付けました', 'success');
      return;
    }
    if (dragSignature) {
      e.preventDefault();
      const { x, y } = canvasXY(e);
      const date    = document.getElementById('sigDate').value.trim();
      const company = document.getElementById('sigCompany').value.trim();
      const name    = document.getElementById('sigName').value.trim();
      const lines   = [date, company, name].filter(s => s.length > 0);
      if (!lines.length) {
        dragSignature = false;
        showToast('署名の項目を入力してください', 'danger');
        return;
      }
      pushHistory();
      annotations.push({
        type: 'text',
        x, y,
        text: lines.join('\n'),
        fontSize: fontSize,
        color: strokeColor,
        align: 'left',
      });
      dragSignature = false;
      redrawAnnotations();
      showToast('署名を貼り付けました', 'success');
    }
  }
  function onItemDragOver(e) {
    if (!dragStampId && !dragSignature) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = 'copy';
  }
  annotCanvas.addEventListener('dragover', onItemDragOver);
  annotCanvas.addEventListener('drop',     onItemDrop);
  document.getElementById('canvasArea').addEventListener('dragover', onItemDragOver);
  document.getElementById('canvasArea').addEventListener('drop',     onItemDrop);
}

function touchToMouse(e) {
  const t = e.touches[0] || e.changedTouches[0];
  return { clientX: t.clientX, clientY: t.clientY };
}

function canvasXY(e) {
  const r = annotCanvas.getBoundingClientRect();
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}

function onHover(e) {
  if (dragging) return;
  const { x, y } = canvasXY(e);
  if (tool === 'eraser') {
    if (hoverIdx !== -1) { hoverIdx = -1; redrawAnnotations(); }
    return;
  }
  /* ペン: 既存注釈の上ではホバーハイライトと移動カーソルを表示 */
  if (tool === 'pen') {
    const idx = hitTest(x, y);
    if (idx !== hoverIdx) { hoverIdx = idx; redrawAnnotations(); }
    annotCanvas.style.cursor = idx >= 0 ? 'move' : 'crosshair';
    return;
  }
  /* select / text ツール: ハンドルチェック優先 */
  if ((tool === 'select' || tool === 'text') && selectedIdx >= 0) {
    const hk = hitTestHandle(x, y, annotations[selectedIdx]);
    if (hk) { annotCanvas.style.cursor = handleCursor(hk); return; }
  }
  const idx = hitTest(x, y);
  if (idx !== hoverIdx) { hoverIdx = idx; redrawAnnotations(); }
  if (idx < 0) {
    /* テキストツールかつ何もない場所 → 十字 */
    annotCanvas.style.cursor = toolCursor(tool);
    return;
  }
  const hitType = annotations[idx]?.type;
  if (tool === 'select' || tool === 'text') {
    /* 既存注釈の上 → 移動カーソル（テキストはポインター） */
    annotCanvas.style.cursor = hitType === 'text' ? 'pointer' : 'move';
  } else {
    annotCanvas.style.cursor = hitType === TOOL_TYPES[tool] ? 'move' : 'crosshair';
  }
}

function onDown(e) {
  /* テキスト編集中に別の場所をクリック → 先に確定（クリック箇所の処理は次クリックへ） */
  if (inlineTA.style.display === 'block') { commitInlineText(); return; }
  /* 確定直後400ms以内はmousedownを無視（確定クリックの二度押し防止） */
  if (Date.now() - lastCommitTime < 400) { return; }

  const { x, y } = canvasXY(e);
  dragging = true; didDrag = false;
  resizingHandle = null;
  startX = x; startY = y;

  if (tool === 'eraser') { selectedIdx = -1; eraseAt(x, y); return; }

  /* ペン: 既存注釈の上ならテキストツールと同じUXで選択・移動、空白なら描画 */
  if (tool === 'pen') {
    const hit = hitTest(x, y);
    if (hit >= 0) {
      selectedIdx = hit;
      const a = annotations[selectedIdx];
      dragOffX = x - (a.x ?? a.x1 ?? 0);
      dragOffY = y - (a.y ?? a.y1 ?? 0);
      syncSidebarToAnnotation(a);
      redrawAnnotations();
      return;
    }
    selectedIdx = -1;
    penPath = [{ x, y }];
    return;
  }

  /* 描画ツール使用時は選択を解除（onUpDocで移動終了ブロックに入らないようにする） */
  if (!['select', 'text'].includes(tool)) selectedIdx = -1;

  /* ① ハンドルチェック（select / text ツール＋選択中）— 最優先 */
  if ((tool === 'select' || tool === 'text') && selectedIdx >= 0 && selectedIdx < annotations.length) {
    const hk = hitTestHandle(x, y, annotations[selectedIdx]);
    if (hk) {
      resizingHandle = hk;
      pushHistory();
      /* ペン: リサイズ用に元パスとBBを保存 */
      const ta = annotations[selectedIdx];
      if (ta.type === 'pen') {
        const tbb = getBoundingBox(ta);
        ta._resizeBB   = { ...tbb };
        ta._resizeBase = ta.path.map(p => ({...p}));
      }
      e.stopPropagation();
      return;
    }
  }

  /* ② 図形ヒットテスト */
  const hit = hitTest(x, y);

  /* ③ テキストツールで既存注釈をクリック → ツール切替なしで選択・移動 */
  if (tool === 'text' && hit >= 0) {
    selectedIdx = hit;
    const a = annotations[selectedIdx];
    dragOffX = x - (a.x ?? a.x1 ?? 0);
    dragOffY = y - (a.y ?? a.y1 ?? 0);
    syncSidebarToAnnotation(a);
    redrawAnnotations();
    return;
  }

  /* ④ textツール＋空白: クリック位置を記録（mouseupで即入力開始） */
  if (tool === 'text') {
    selectedIdx = -1;
    pendingTextClick = { x, y };
    redrawAnnotations();
    return;
  }

  const hitOk = hit >= 0 && (tool === 'select' || annotations[hit].type === TOOL_TYPES[tool] || annotations[hit].type === 'stamp');

  if (hitOk) {
    /* 他ツールで図形クリック → selectに自動切替 */
    tool = 'select';
    document.querySelectorAll('[data-tool]').forEach(b => b.classList.toggle('active', b.dataset.tool === 'select'));
    annotCanvas.style.cursor = 'move';

    selectedIdx = hit;
    const a = annotations[selectedIdx];
    dragOffX = x - (a.x ?? a.x1 ?? 0);
    dragOffY = y - (a.y ?? a.y1 ?? 0);
    syncSidebarToAnnotation(a);
    redrawAnnotations();
    return;
  }

  /* ⑤ 空白クリック */
  if (tool === 'select') { selectedIdx = -1; redrawAnnotations(); return; }
}

const trashZone = document.getElementById('trashZone');
const TRASH_THRESHOLD = 100;

function isOverTrash(clientY) { return clientY > window.innerHeight - TRASH_THRESHOLD; }

function onMoveDoc(e) {
  if (!dragging) return;
  const { x, y } = canvasXY(e);
  const clientY = e.clientY ?? e.changedTouches?.[0]?.clientY ?? 0;

  /* ── リサイズモード ── */
  if (resizingHandle !== null) {
    /* selectedIdxが有効であることを確認 */
    if (selectedIdx < 0 || selectedIdx >= annotations.length) { resizingHandle = null; return; }
    applyResize(annotations[selectedIdx], resizingHandle, x, y);
    redrawAnnotations();
    return;
  }

  /* ── 移動モード ── */
  if (selectedIdx >= 0) {
    if (!didDrag && (Math.abs(x - startX) > 3 || Math.abs(y - startY) > 3)) {
      didDrag = true;
      pushHistory();
    }
    if (didDrag) {
      const a = annotations[selectedIdx];
      if (a.type === 'pen') {
        /* ペン: startX/Y からの累積デルタでパス全点を移動 */
        if (!a._dragBase) a._dragBase = a.path.map(p => ({...p}));
        const tdx = x - startX, tdy = y - startY;
        a.path = a._dragBase.map(p => ({ x: p.x + tdx, y: p.y + tdy }));
      } else {
        const dx = x - dragOffX, dy = y - dragOffY;
        if ('x' in a) { a.x = dx; a.y = dy; }
        else { const w = a.x2 - a.x1, h = a.y2 - a.y1; a.x1 = dx; a.y1 = dy; a.x2 = dx + w; a.y2 = dy + h; }
      }
      redrawAnnotations();
      trashZone.classList.add('visible');
      trashZone.classList.toggle('over', isOverTrash(clientY));
    }
    return;
  }

  trashZone.classList.remove('visible', 'over');
  if (tool === 'pen') { penPath.push({ x, y }); drawPreview(x, y); return; }
  if (tool === 'eraser') { eraseAt(x, y); return; }
  if (tool === 'text') return;   /* クリック即入力: 移動プレビューなし */
  if (tool === 'select') return;
  drawPreview(x, y);
}

function onUpDoc(e) {
  if (!dragging) return;
  dragging = false;
  const { x, y } = canvasXY(e);
  const clientY = e.clientY ?? e.changedTouches?.[0]?.clientY ?? 0;
  trashZone.classList.remove('visible', 'over');

  /* ── リサイズ終了（選択維持） ── */
  if (resizingHandle !== null) {
    resizingHandle = null;
    if (selectedIdx >= 0 && annotations[selectedIdx]?.type === 'pen') {
      delete annotations[selectedIdx]._resizeBase;
      delete annotations[selectedIdx]._resizeBB;
    }
    redrawAnnotations();
    return;
  }

  /* ── 移動終了 ── */
  if (selectedIdx >= 0) {
    if (annotations[selectedIdx]?.type === 'pen') delete annotations[selectedIdx]._dragBase;
    if (didDrag && isOverTrash(clientY)) {
      pushHistory();
      annotations.splice(selectedIdx, 1);
      selectedIdx = -1;
      redrawAnnotations();
      showToast('削除しました', 'success');
      return;
    }
    /* シングルクリック: 選択維持（テキスト編集はダブルクリック） */
    redrawAnnotations();
    return;
  }

  if (tool === 'select') { selectedIdx = -1; redrawAnnotations(); return; }
  if (tool === 'eraser') return;
  /* textツール: クリック位置に即入力カーソル（ilovepdf流・自動幅） */
  if (tool === 'text' && pendingTextClick) {
    const p = pendingTextClick;
    pendingTextClick = null;
    if (Date.now() - lastCommitTime < 400) { redrawAnnotations(); return; }
    /* w を渡さない（0）= 内容に合わせて自動拡張 */
    showInlineTextarea(p.x, p.y, 0, fontSize * 1.6);
    return;
  }

  pushHistory();
  if (tool === 'pen') {
    if (penPath.length > 1) annotations.push({ type: 'pen', path: [...penPath], color: strokeColor, size: strokeSize });
    penPath = [];
  } else if (tool === 'line' && (Math.abs(x-startX)>2||Math.abs(y-startY)>2)) {
    annotations.push({ type: 'line', x1: startX, y1: startY, x2: x, y2: y, color: strokeColor, size: strokeSize });
  } else if (tool === 'arrow' && (Math.abs(x-startX)>2||Math.abs(y-startY)>2)) {
    annotations.push({ type: 'arrow', x1: startX, y1: startY, x2: x, y2: y, color: strokeColor, size: strokeSize });
  } else if (tool === 'rect' && (Math.abs(x-startX)>2||Math.abs(y-startY)>2)) {
    annotations.push({ type: 'rect', x1: Math.min(startX,x), y1: Math.min(startY,y), x2: Math.max(startX,x), y2: Math.max(startY,y), color: strokeColor, size: strokeSize, fill: rectFill, fillOpacity });
  } else if (tool === 'ellipse' && (Math.abs(x-startX)>2||Math.abs(y-startY)>2)) {
    annotations.push({ type: 'ellipse', x1: Math.min(startX,x), y1: Math.min(startY,y), x2: Math.max(startX,x), y2: Math.max(startY,y), color: strokeColor, size: strokeSize, fill: rectFill, fillOpacity });
  }
  redrawAnnotations();
}

/* ────── 描画 ────── */
function drawPreview(curX, curY) {
  redrawAnnotations();
  annCtx.save();
  annCtx.strokeStyle = strokeColor;
  annCtx.lineWidth   = strokeSize;
  annCtx.lineCap = annCtx.lineJoin = 'round';

  if (tool === 'pen') {
    annCtx.beginPath();
    penPath.forEach((p, i) => i === 0 ? annCtx.moveTo(p.x, p.y) : annCtx.lineTo(p.x, p.y));
    annCtx.stroke();
  } else if (tool === 'line') {
    annCtx.beginPath(); annCtx.moveTo(startX, startY); annCtx.lineTo(curX, curY); annCtx.stroke();
  } else if (tool === 'arrow') {
    drawArrow(annCtx, startX, startY, curX, curY, strokeColor, strokeSize);
  } else if (tool === 'rect') {
    if (rectFill && fillOpacity > 0) {
      annCtx.fillStyle = hexToRgba(strokeColor, fillOpacity / 100);
      annCtx.fillRect(startX, startY, curX - startX, curY - startY);
    }
    annCtx.strokeRect(startX, startY, curX - startX, curY - startY);
  } else if (tool === 'ellipse') {
    const cx = (startX + curX) / 2, cy = (startY + curY) / 2;
    const rx = Math.abs(curX - startX) / 2, ry = Math.abs(curY - startY) / 2;
    annCtx.beginPath(); annCtx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
    if (rectFill && fillOpacity > 0) {
      annCtx.fillStyle = hexToRgba(strokeColor, fillOpacity / 100);
      annCtx.fill();
    }
    annCtx.stroke();
  }
  annCtx.restore();
}

function updateStampEditArea() {
  const area  = document.getElementById('stampEditArea');
  const input = document.getElementById('stampLabelInput');
  if (!area || !input) return;
  const a = selectedIdx >= 0 ? annotations[selectedIdx] : null;
  if (a?.type === 'stamp') {
    const def = STAMP_DEFS.find(d => d.id === a.stampId);
    /* フォーカス中は上書きしない（入力中に値がリセットされるのを防ぐ） */
    if (document.activeElement !== input) {
      input.value = a.customLabel != null ? a.customLabel : (def?.label ?? '');
    }
    area.style.display = '';
  } else {
    area.style.display = 'none';
  }
}

function redrawAnnotations() {
  annCtx.clearRect(0, 0, annotCanvas.width, annotCanvas.height);
  updateStampEditArea();
  annotations.forEach((a, i) => {
    /* 編集中の注釈はtextareaで表示中なのでキャンバスには描かない */
    if (i === editingTextIdx && inlineTA.style.display === 'block') return;
    annCtx.save();
    annCtx.strokeStyle = a.color;
    annCtx.fillStyle   = a.color;
    annCtx.lineWidth   = a.size ?? 2;
    annCtx.lineCap = annCtx.lineJoin = 'round';

    if (a.type === 'pen') {
      annCtx.beginPath();
      a.path.forEach((p, j) => j === 0 ? annCtx.moveTo(p.x, p.y) : annCtx.lineTo(p.x, p.y));
      annCtx.stroke();
    } else if (a.type === 'line') {
      annCtx.beginPath(); annCtx.moveTo(a.x1, a.y1); annCtx.lineTo(a.x2, a.y2); annCtx.stroke();
    } else if (a.type === 'arrow') {
      drawArrow(annCtx, a.x1, a.y1, a.x2, a.y2, a.color, a.size);
    } else if (a.type === 'rect') {
      const fc = fillStyleOf(a);
      if (fc) { annCtx.fillStyle = fc; annCtx.fillRect(a.x1, a.y1, a.x2 - a.x1, a.y2 - a.y1); }
      annCtx.strokeRect(a.x1, a.y1, a.x2 - a.x1, a.y2 - a.y1);
    } else if (a.type === 'ellipse') {
      const cx = (a.x1 + a.x2) / 2, cy = (a.y1 + a.y2) / 2;
      const rx = Math.abs(a.x2 - a.x1) / 2, ry = Math.abs(a.y2 - a.y1) / 2;
      annCtx.beginPath(); annCtx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
      const fc = fillStyleOf(a);
      if (fc) { annCtx.fillStyle = fc; annCtx.fill(); }
      annCtx.stroke();
    } else if (a.type === 'text') {
      drawTextAnnotation(annCtx, a);
    } else if (a.type === 'stamp') {
      drawStamp(annCtx, a);
    }

    /* ホバーハイライト（選択中でないもの） */
    if (i === hoverIdx && i !== selectedIdx) {
      const bb = getBoundingBox(a);
      annCtx.strokeStyle = 'rgba(33,150,243,0.45)'; annCtx.lineWidth = 1.5;
      annCtx.setLineDash([3, 3]);
      annCtx.strokeRect(bb.x - 3, bb.y - 3, bb.w + 6, bb.h + 6);
      annCtx.setLineDash([]);
    }

    /* 選択中ハイライト + リサイズハンドル */
    if (i === selectedIdx) {
      const bb = getBoundingBox(a);
      annCtx.strokeStyle = '#2196F3'; annCtx.lineWidth = 1.5;
      annCtx.setLineDash([4, 3]);
      annCtx.strokeRect(bb.x - 4, bb.y - 4, bb.w + 8, bb.h + 8);
      annCtx.setLineDash([]);
      /* ハンドル描画 */
      const handles = getHandles(a);
      for (const pt of Object.values(handles)) {
        annCtx.beginPath();
        annCtx.arc(pt.x, pt.y, HANDLE_R, 0, Math.PI * 2);
        annCtx.fillStyle = '#fff';
        annCtx.fill();
        annCtx.strokeStyle = '#2196F3';
        annCtx.lineWidth = 2;
        annCtx.stroke();
      }
    }
    annCtx.restore();
  });
  refreshTextToolbar();
}

function drawArrow(ctx, x1, y1, x2, y2, color, size) {
  const angle = Math.atan2(y2 - y1, x2 - x1);
  const len   = Math.sqrt((x2-x1)**2 + (y2-y1)**2);
  const head  = Math.min(Math.max(size * 4, 12), len);   /* 矢じりの長さ（線より長くしない） */
  const spread = Math.PI / 7;                             /* 矢じりの開き角 */
  /* 軸線は矢じりの根元（左右の角を結ぶ線の中点）で止める。
     角は先端から head·cos(spread) の距離にあるので、ここに合わせると交差部が綺麗に繋がる */
  const backDist = head * Math.cos(spread);
  const baseX = x2 - backDist * Math.cos(angle);
  const baseY = y2 - backDist * Math.sin(angle);
  ctx.save();
  ctx.strokeStyle = color; ctx.fillStyle = color; ctx.lineWidth = size;
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(baseX, baseY); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - head * Math.cos(angle - spread), y2 - head * Math.sin(angle - spread));
  ctx.lineTo(x2 - head * Math.cos(angle + spread), y2 - head * Math.sin(angle + spread));
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

/* 角丸矩形パスヘルパー */
function roundRectPath(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y,     x + w, y + r,     r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x,     y + h, x,     y + h - r, r);
  ctx.lineTo(x,     y + r);
  ctx.arcTo(x,     y,     x + r, y,         r);
  ctx.closePath();
}

function drawStamp(ctx, a) {
  const def = STAMP_DEFS.find(d => d.id === a.stampId);
  if (!def) return;
  const label = a.customLabel != null && a.customLabel !== '' ? a.customLabel : def.label;
  const w  = (a.size ?? 90);
  const h  = Math.round(w * 0.52);
  const lw = Math.max(w * 0.05, 2);
  ctx.save();
  ctx.strokeStyle = def.color;
  ctx.fillStyle   = def.color;
  ctx.lineWidth   = lw;
  /* 角丸ボーダー（不透明） */
  roundRectPath(ctx, a.x - w/2, a.y - h/2, w, h, 4);
  ctx.stroke();
  /* テキスト（テキスト注釈と同じパターンで描画） */
  const fs = Math.max(h * 0.46, 8);
  ctx.font = `bold ${fs}px 'Noto Sans JP', sans-serif`;
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(label, a.x, a.y);
  ctx.restore();
}

function getBoundingBox(a) {
  if (a.type === 'stamp') {
    const w = (a.size ?? 90);
    const h = Math.round(w * 0.52);
    return { x: a.x - w / 2, y: a.y - h / 2, w, h };
  }
  if (a.type === 'text') {
    const fs = a.fontSize ?? 50;
    const lines = a.text ? a.text.split('\n') : [''];
    let w;
    if (a.w) {
      w = a.w;   /* リサイズ済みの固定幅を優先 */
    } else {
      /* 実フォントで計測して正確な幅を得る */
      annCtx.save();
      annCtx.font = fontCssOf(a);
      w = Math.max(...lines.map(l => annCtx.measureText(l).width), fs, 40);
      annCtx.restore();
    }
    const h = a.h ?? (fs * 1.4 * lines.length);   /* リサイズ済みの枠高さを優先 */
    return { x: a.x, y: a.y - fs, w, h };
  }
  if (a.type === 'pen') {
    const xs = a.path.map(p => p.x), ys = a.path.map(p => p.y);
    const x = Math.min(...xs), y = Math.min(...ys);
    return { x, y, w: Math.max(...xs) - x, h: Math.max(...ys) - y };
  }
  const x = Math.min(a.x1 ?? a.x, a.x2 ?? a.x);
  const y = Math.min(a.y1 ?? a.y, a.y2 ?? a.y);
  const w = Math.abs((a.x2 ?? a.x) - (a.x1 ?? a.x));
  const h = Math.abs((a.y2 ?? a.y) - (a.y1 ?? a.y));
  return { x, y, w: Math.max(w, 1), h: Math.max(h, 1) };
}

/* 選択中アノテーションのリサイズハンドル座標を返す */
function getHandles(a) {
  if (!a) return {};
  if (a.type === 'stamp') {
    const bb = getBoundingBox(a);
    const mx = a.x, my = a.y;
    return {
      nw: {x: bb.x,        y: bb.y       }, n: {x: mx, y: bb.y       }, ne: {x: bb.x+bb.w, y: bb.y       },
      w:  {x: bb.x,        y: my         },                              e:  {x: bb.x+bb.w, y: my         },
      sw: {x: bb.x,        y: bb.y+bb.h  }, s: {x: mx, y: bb.y+bb.h  }, se: {x: bb.x+bb.w, y: bb.y+bb.h },
    };
  }
  if (a.type === 'line' || a.type === 'arrow') {
    return { p1: { x: a.x1, y: a.y1 }, p2: { x: a.x2, y: a.y2 } };
  }
  if (a.type === 'rect' || a.type === 'ellipse' || a.type === 'pen') {
    const bb = getBoundingBox(a);
    const x1 = bb.x, y1 = bb.y, x2 = bb.x + bb.w, y2 = bb.y + bb.h;
    if (a.type !== 'pen') {
      /* rect/ellipse は元座標から算出 */
      const rx1 = Math.min(a.x1, a.x2), ry1 = Math.min(a.y1, a.y2);
      const rx2 = Math.max(a.x1, a.x2), ry2 = Math.max(a.y1, a.y2);
      const mx = (rx1 + rx2) / 2, my = (ry1 + ry2) / 2;
      return {
        nw: {x:rx1,y:ry1}, n: {x:mx,y:ry1}, ne: {x:rx2,y:ry1},
        w:  {x:rx1,y:my},                    e:  {x:rx2,y:my},
        sw: {x:rx1,y:ry2}, s: {x:mx,y:ry2}, se: {x:rx2,y:ry2}
      };
    }
    const mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
    return {
      nw: {x:x1,y:y1}, n: {x:mx,y:y1}, ne: {x:x2,y:y1},
      w:  {x:x1,y:my},                  e:  {x:x2,y:my},
      sw: {x:x1,y:y2}, s: {x:mx,y:y2}, se: {x:x2,y:y2}
    };
  }
  /* text: 枠を縦横自由にリサイズする8方向ハンドル（フォントサイズは変えない） */
  const bb = getBoundingBox(a);
  const x1 = bb.x, y1 = bb.y, x2 = bb.x + bb.w, y2 = bb.y + bb.h;
  const mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
  return {
    nw: { x: x1, y: y1 }, n: { x: mx, y: y1 }, ne: { x: x2, y: y1 },
    w:  { x: x1, y: my },                       e:  { x: x2, y: my },
    sw: { x: x1, y: y2 }, s: { x: mx, y: y2 }, se: { x: x2, y: y2 },
  };
}

/* マウス位置がハンドルに当たっているか返す */
function hitTestHandle(x, y, a) {
  if (!a) return null;
  const handles = getHandles(a);
  for (const [key, pt] of Object.entries(handles)) {
    if (Math.hypot(x - pt.x, y - pt.y) <= HANDLE_R + 10) return key;
  }
  return null;
}

/* ハンドルカーソル */
function handleCursor(key) {
  const map = {
    nw: 'nw-resize', n: 'n-resize',  ne: 'ne-resize',
    w:  'w-resize',                   e:  'e-resize',
    sw: 'sw-resize', s: 's-resize',  se: 'se-resize',
    br: 'se-resize', p1: 'crosshair', p2: 'crosshair'
  };
  return map[key] || 'default';
}

function hitTest(x, y) {
  for (let i = annotations.length - 1; i >= 0; i--) {
    const bb = getBoundingBox(annotations[i]);
    if (x >= bb.x - 6 && x <= bb.x + bb.w + 6 && y >= bb.y - 6 && y <= bb.y + bb.h + 6) return i;
  }
  return -1;
}

/* ハンドルドラッグによるリサイズ適用 */
function applyResize(a, handle, mx, my) {
  if (a.type === 'stamp') {
    /* どのハンドルでも中心からの距離でサイズ均一変更 */
    a.size = Math.max(Math.hypot(mx - a.x, my - a.y) * 2, 40);
    return;
  }
  if (a.type === 'line' || a.type === 'arrow') {
    if (handle === 'p1') { a.x1 = mx; a.y1 = my; }
    if (handle === 'p2') { a.x2 = mx; a.y2 = my; }
    return;
  }
  if (a.type === 'pen') {
    if (!a._resizeBase || !a._resizeBB) return;
    const ob = a._resizeBB;
    let nx1 = ob.x, ny1 = ob.y, nx2 = ob.x + ob.w, ny2 = ob.y + ob.h;
    if      (handle === 'nw') { nx1 = mx; ny1 = my; }
    else if (handle === 'n')  { ny1 = my; }
    else if (handle === 'ne') { nx2 = mx; ny1 = my; }
    else if (handle === 'w')  { nx1 = mx; }
    else if (handle === 'e')  { nx2 = mx; }
    else if (handle === 'sw') { nx1 = mx; ny2 = my; }
    else if (handle === 's')  { ny2 = my; }
    else if (handle === 'se') { nx2 = mx; ny2 = my; }
    const nox = Math.min(nx1, nx2), noy = Math.min(ny1, ny2);
    const nw  = Math.max(Math.abs(nx2 - nx1), 1);
    const nh  = Math.max(Math.abs(ny2 - ny1), 1);
    if (ob.w < 1 || ob.h < 1) return;
    a.path = a._resizeBase.map(p => ({
      x: nox + (p.x - ob.x) / ob.w * nw,
      y: noy + (p.y - ob.y) / ob.h * nh,
    }));
    return;
  }
  if (a.type === 'text') {
    /* 枠を縦横自由にリサイズ（rect同様）。フォントサイズは固定、テキストは枠内に上揃え折返し */
    const fs = a.fontSize ?? 50;
    const bb = getBoundingBox(a);
    let left = a.x, top = a.y - fs, right = a.x + bb.w, bottom = (a.y - fs) + bb.h;
    if (handle.includes('w')) left   = mx;
    if (handle.includes('e')) right  = mx;
    if (handle.includes('n')) top    = my;
    if (handle.includes('s')) bottom = my;
    const minW = fs, minH = fs * 0.8;
    if (right - left < minW) { if (handle.includes('w')) left = right - minW; else right = left + minW; }
    if (bottom - top < minH) { if (handle.includes('n')) top = bottom - minH; else bottom = top + minH; }
    a.x = left;
    a.w = right - left;
    a.h = bottom - top;
    a.y = top + fs;
    return;
  }
  /* rect / ellipse: 8方向ハンドル — x1>x2/y1>y2 になっても min/max で描画するので問題なし */
  if      (handle === 'nw') { a.x1 = mx; a.y1 = my; }
  else if (handle === 'n')  { a.y1 = my; }
  else if (handle === 'ne') { a.x2 = mx; a.y1 = my; }
  else if (handle === 'w')  { a.x1 = mx; }
  else if (handle === 'e')  { a.x2 = mx; }
  else if (handle === 'sw') { a.x1 = mx; a.y2 = my; }
  else if (handle === 's')  { a.y2 = my; }
  else if (handle === 'se') { a.x2 = mx; a.y2 = my; }
}

function eraseAt(x, y) {
  const before = annotations.length;
  annotations = annotations.filter(a => {
    const bb = getBoundingBox(a);
    return !(x >= bb.x - 10 && x <= bb.x + bb.w + 10 && y >= bb.y - 10 && y <= bb.y + bb.h + 10);
  });
  if (annotations.length !== before) { pushHistory(); redrawAnnotations(); }
}

/* ────── インラインテキスト入力 ────── */
const inlineTA = document.getElementById('inlineTextarea');

/* {x,y,w,h} にインラインtextareaを表示。rw<=0 なら内容に合わせて自動拡張 */
function showInlineTextarea(rx, ry, rw, rh, existingIdx = -1) {
  editingTextIdx = existingIdx;
  const a = existingIdx >= 0 ? annotations[existingIdx] : null;
  /* 編集対象のスタイルを現在の編集状態に同期（新規はグローバルデフォルト） */
  fontSize       = a ? (a.fontSize ?? fontSize)    : fontSize;
  strokeColor    = a ? (a.color ?? strokeColor)    : strokeColor;
  textAlign      = a ? (a.align ?? textAlign)      : textAlign;
  textFontFamily = a ? (a.fontFamily ?? textFontFamily) : textFontFamily;
  textBold       = a ? !!a.bold      : textBold;
  textItalic     = a ? !!a.italic    : textItalic;
  textUnderline  = a ? !!a.underline : textUnderline;

  const autoWidth = !rw || rw <= 0;
  inlineTA.style.left            = rx + 'px';
  inlineTA.style.top             = ry + 'px';
  inlineTA.style.width           = autoWidth ? (fontSize + 'px') : (Math.max(rw, 60) + 'px');
  inlineTA.style.height          = Math.max(rh, fontSize * 1.6) + 'px';
  inlineTA.style.fontSize        = fontSize + 'px';
  inlineTA.style.fontFamily      = fontFamilyCss(textFontFamily);
  inlineTA.style.fontWeight      = textBold ? '700' : '400';
  inlineTA.style.fontStyle       = textItalic ? 'italic' : 'normal';
  inlineTA.style.textDecoration  = textUnderline ? 'underline' : 'none';
  inlineTA.style.color           = strokeColor;
  inlineTA.style.textAlign       = textAlign;
  inlineTA.style.whiteSpace      = autoWidth ? 'pre' : 'pre-wrap';
  inlineTA.style.display         = 'block';
  inlineTA.dataset.autoWidth     = autoWidth ? '1' : '';
  inlineTA.value = a ? (a.text ?? '') : '';

  /* サイドバーも同期 */
  syncSidebarToAnnotation({ color: strokeColor, fontSize, align: textAlign });
  redrawAnnotations(); /* 編集中の注釈をキャンバスから消す */
  autoGrowTextarea();
  refreshTextToolbar();
  inlineTA.select();
  inlineTA.focus();
}

/* 内容に合わせて textarea の幅・高さを調整（実フォントで計測） */
function autoGrowTextarea() {
  if (inlineTA.style.display === 'none') return;
  const lines = (inlineTA.value || '').split('\n');
  annCtx.save();
  annCtx.font = `${textItalic ? 'italic ' : ''}${textBold ? '700' : '400'} ${fontSize}px ${fontFamilyCss(textFontFamily)}`;
  let maxW = 0;
  for (const l of lines) maxW = Math.max(maxW, annCtx.measureText(l || ' ').width);
  annCtx.restore();
  const lineH = fontSize * 1.4;
  if (inlineTA.dataset.autoWidth) {
    const left = parseFloat(inlineTA.style.left) || 0;
    const w = Math.min(maxW + fontSize * 0.6 + 10, annotCanvas.width - left);
    inlineTA.style.width = Math.max(w, fontSize) + 'px';
  }
  inlineTA.style.height = (lines.length * lineH + 8) + 'px';
  updateTextToolbarPosition();
}

function commitInlineText() {
  if (inlineTA.style.display === 'none') return;   /* 二重確定防止 */
  const txt = inlineTA.value;
  inlineTA.style.display = 'none';
  lastCommitTime = Date.now();
  if (!txt.trim()) { editingTextIdx = -1; refreshTextToolbar(); return; }

  const tx = parseFloat(inlineTA.style.left);
  const ty = parseFloat(inlineTA.style.top);
  const fs = parseInt(inlineTA.style.fontSize);
  const autoWidth = !!inlineTA.dataset.autoWidth;
  const tw = autoWidth ? undefined : parseFloat(inlineTA.style.width);

  const style = {
    color: strokeColor, fontSize: fs, align: textAlign,
    fontFamily: textFontFamily, bold: textBold, italic: textItalic, underline: textUnderline,
  };

  pushHistory();
  if (editingTextIdx >= 0) {
    const next = { ...annotations[editingTextIdx], text: txt, x: tx, y: ty + fs, ...style };
    if (tw !== undefined) next.w = tw; else delete next.w;
    annotations[editingTextIdx] = next;
  } else {
    const obj = { type: 'text', text: txt, x: tx, y: ty + fs, ...style };
    if (tw !== undefined) obj.w = tw;
    annotations.push(obj);
  }
  editingTextIdx = -1;
  redrawAnnotations();
}

function cancelInlineText() {
  inlineTA.style.display = 'none';
  lastCommitTime = Date.now();
  editingTextIdx = -1;
  refreshTextToolbar();
}

/* 既存テキストをダブルクリックで再編集 */
function openTextEdit(idx) {
  const bb = getBoundingBox(annotations[idx]);
  /* 既存幅を維持して編集（w が無い＝自動幅のテキストは自動幅のまま） */
  const keepW = annotations[idx].w ? bb.w : 0;
  showInlineTextarea(bb.x, bb.y, keepW, bb.h, idx);
}

function initTextInput() {
  inlineTA.addEventListener('keydown', e => {
    /* Enter は改行（ilovepdf流）。Esc または Ctrl/Cmd+Enter で確定 */
    if (e.key === 'Escape') { e.preventDefault(); commitInlineText(); }
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); commitInlineText(); }
  });
  inlineTA.addEventListener('input', autoGrowTextarea);
  inlineTA.addEventListener('blur', e => {
    /* フォーカスがツールバーに移った場合は確定しない（書式変更を継続） */
    const rt = e.relatedTarget;
    if (rt && document.getElementById('textToolbar').contains(rt)) return;
    if (inlineTA.style.display !== 'none') commitInlineText();
  });
}

/* ────── テキスト用フローティングツールバー ────── */
function toHexColor(c) {
  if (!c) return '#000000';
  if (c[0] === '#') return c.length === 4 ? '#' + [...c.slice(1)].map(x => x + x).join('') : c.slice(0, 7);
  return '#000000';
}

/* サイドバーの色ボタンを現在色に同期 */
function syncColorButtons(col) {
  let matched = false;
  document.querySelectorAll('.tool-color-btn[data-color]').forEach(b => {
    const on = (b.dataset.color || '').toLowerCase() === col.toLowerCase();
    b.classList.toggle('active', on);
    if (on) matched = true;
  });
  const cb = document.getElementById('customColorBtn');
  if (cb && !matched) {
    cb.style.background = col; cb.style.color = '#fff'; cb.textContent = '';
    cb.style.border = '2.5px solid #1A1A2E';
  }
}

function initTextToolbar() {
  const sel = document.getElementById('ttFont');
  FONT_FAMILIES.forEach(f => {
    const o = document.createElement('option');
    o.value = f.id; o.textContent = f.label; o.style.fontFamily = f.css;
    sel.appendChild(o);
  });
  sel.addEventListener('change', () => applyTextStyle({ fontFamily: sel.value }));

  const size = document.getElementById('ttSize');
  size.addEventListener('input', () => {
    const v = parseInt(size.value);
    if (v >= 6 && v <= 200) applyTextStyle({ fontSize: v });
  });

  const colorInput = document.getElementById('ttColorInput');
  colorInput.addEventListener('input', () => applyTextStyle({ color: colorInput.value }));

  document.getElementById('ttBold').addEventListener('click', () =>
    applyTextStyle({ bold: !document.getElementById('ttBold').classList.contains('active') }));
  document.getElementById('ttItalic').addEventListener('click', () =>
    applyTextStyle({ italic: !document.getElementById('ttItalic').classList.contains('active') }));
  document.getElementById('ttUnderline').addEventListener('click', () =>
    applyTextStyle({ underline: !document.getElementById('ttUnderline').classList.contains('active') }));
  document.getElementById('ttAlignLeft').addEventListener('click',   () => applyTextStyle({ align: 'left' }));
  document.getElementById('ttAlignCenter').addEventListener('click', () => applyTextStyle({ align: 'center' }));
  document.getElementById('ttAlignRight').addEventListener('click',  () => applyTextStyle({ align: 'right' }));

  document.getElementById('ttDelete').addEventListener('click', () => {
    if (inlineTA.style.display === 'block') { cancelInlineText(); return; }
    if (selectedIdx >= 0) deleteSelected();
    hideTextToolbar();
  });

  /* ツールバー上で押下しても編集中テキストの選択（フォーカス）が消えないように */
  document.getElementById('textToolbar').addEventListener('mousedown', e => {
    const t = e.target;
    if (t.tagName !== 'INPUT' && t.tagName !== 'SELECT' && t.tagName !== 'OPTION') e.preventDefault();
  });

  document.getElementById('canvasArea').addEventListener('scroll', updateTextToolbarPosition);
  window.addEventListener('resize', updateTextToolbarPosition);
}

/* スタイル変更を「グローバルデフォルト・編集中textarea・選択中注釈・サイドバー」へ一括反映 */
function applyTextStyle(patch) {
  if ('fontFamily' in patch) textFontFamily = patch.fontFamily;
  if ('bold' in patch)       textBold      = patch.bold;
  if ('italic' in patch)     textItalic    = patch.italic;
  if ('underline' in patch)  textUnderline = patch.underline;
  if ('fontSize' in patch) {
    fontSize = patch.fontSize;
    const fsEl = document.getElementById('fontSize'); if (fsEl) fsEl.value = String(fontSize);
  }
  if ('color' in patch) { strokeColor = patch.color; syncColorButtons(strokeColor); }
  if ('align' in patch) {
    textAlign = patch.align;
    document.querySelectorAll('[data-align]').forEach(b => b.classList.toggle('active', b.dataset.align === textAlign));
  }

  /* 編集中の textarea に即時反映 */
  if (inlineTA.style.display === 'block') {
    if ('fontFamily' in patch) inlineTA.style.fontFamily     = fontFamilyCss(textFontFamily);
    if ('bold' in patch)       inlineTA.style.fontWeight     = textBold ? '700' : '400';
    if ('italic' in patch)     inlineTA.style.fontStyle      = textItalic ? 'italic' : 'normal';
    if ('underline' in patch)  inlineTA.style.textDecoration = textUnderline ? 'underline' : 'none';
    if ('fontSize' in patch)   inlineTA.style.fontSize       = fontSize + 'px';
    if ('color' in patch)      inlineTA.style.color          = strokeColor;
    if ('align' in patch)      inlineTA.style.textAlign      = textAlign;
    autoGrowTextarea();
  }

  /* 選択中のテキスト注釈に反映 */
  if (selectedIdx >= 0 && annotations[selectedIdx]?.type === 'text') {
    pushHistory();
    const a = annotations[selectedIdx];
    if ('fontFamily' in patch) a.fontFamily = textFontFamily;
    if ('bold' in patch)       a.bold       = textBold;
    if ('italic' in patch)     a.italic     = textItalic;
    if ('underline' in patch)  a.underline  = textUnderline;
    if ('fontSize' in patch)   a.fontSize   = fontSize;
    if ('color' in patch)      a.color      = strokeColor;
    if ('align' in patch)      a.align      = textAlign;
    redrawAnnotations();
  }
  syncTextToolbarState();
  updateTextToolbarPosition();
}

/* ツールバーのUIを現在の編集対象に同期 */
function syncTextToolbarState() {
  const a = (selectedIdx >= 0 && annotations[selectedIdx]?.type === 'text') ? annotations[selectedIdx] : null;
  const fam  = a ? (a.fontFamily || 'sans') : textFontFamily;
  const fs   = a ? (a.fontSize ?? fontSize) : fontSize;
  const col  = a ? (a.color ?? strokeColor) : strokeColor;
  const al   = a ? (a.align ?? 'left')      : textAlign;
  const bold = a ? !!a.bold      : textBold;
  const ital = a ? !!a.italic    : textItalic;
  const undl = a ? !!a.underline : textUnderline;
  document.getElementById('ttFont').value = fam;
  const sizeEl = document.getElementById('ttSize');
  if (document.activeElement !== sizeEl) sizeEl.value = fs;
  document.getElementById('ttColorBtn').style.background = col;
  document.getElementById('ttColorInput').value = toHexColor(col);
  document.getElementById('ttBold').classList.toggle('active', bold);
  document.getElementById('ttItalic').classList.toggle('active', ital);
  document.getElementById('ttUnderline').classList.toggle('active', undl);
  document.getElementById('ttAlignLeft').classList.toggle('active',   al === 'left');
  document.getElementById('ttAlignCenter').classList.toggle('active', al === 'center');
  document.getElementById('ttAlignRight').classList.toggle('active',  al === 'right');
}

/* ツールバーの配置基準矩形（スクリーン座標）を返す */
function getTextToolbarAnchor() {
  if (inlineTA.style.display === 'block') {
    const r = inlineTA.getBoundingClientRect();
    return { left: r.left, top: r.top, right: r.right, bottom: r.bottom };
  }
  if (selectedIdx >= 0 && annotations[selectedIdx]?.type === 'text') {
    const bb = getBoundingBox(annotations[selectedIdx]);
    const r  = annotCanvas.getBoundingClientRect();
    const sx = r.width / annotCanvas.width, sy = r.height / annotCanvas.height;
    return {
      left:   r.left + bb.x * sx,
      top:    r.top  + bb.y * sy,
      right:  r.left + (bb.x + bb.w) * sx,
      bottom: r.top  + (bb.y + bb.h) * sy,
    };
  }
  return null;
}

function updateTextToolbarPosition() {
  const tb = document.getElementById('textToolbar');
  if (!tb.classList.contains('open')) return;
  const a = getTextToolbarAnchor();
  if (!a) return;
  const tbw = tb.offsetWidth  || 380;
  const tbh = tb.offsetHeight || 42;
  let left = Math.max(8, Math.min(a.left, window.innerWidth - tbw - 8));
  let top  = a.top - tbh - 8;
  if (top < 8) top = a.bottom + 8;                 /* 上に入らなければ下に出す */
  top = Math.min(top, window.innerHeight - tbh - 8);
  tb.style.left = left + 'px';
  tb.style.top  = top + 'px';
}

function showTextToolbar() {
  const tb = document.getElementById('textToolbar');
  syncTextToolbarState();
  tb.classList.add('open');
  updateTextToolbarPosition();
}
function hideTextToolbar() {
  document.getElementById('textToolbar').classList.remove('open');
}

/* 編集中 or テキスト選択中ならツールバーを表示・更新、そうでなければ隠す */
function refreshTextToolbar() {
  const editing = inlineTA.style.display === 'block';
  const selText = selectedIdx >= 0 && annotations[selectedIdx]?.type === 'text';
  if (editing || selText) showTextToolbar();
  else hideTextToolbar();
}

/* ────── ヘルパー: history 管理 ────── */
function pushHistory() {
  history.push(annotations.map(a => JSON.parse(JSON.stringify(a))));
  redoStack = [];
  updateUndoRedoBtns();
}

function doUndo() {
  if (!history.length) return;
  redoStack.push(annotations.map(a => JSON.parse(JSON.stringify(a))));
  annotations = history.pop();
  selectedIdx = -1;
  updateUndoRedoBtns();
  redrawAnnotations();
}

function doRedo() {
  if (!redoStack.length) return;
  history.push(annotations.map(a => JSON.parse(JSON.stringify(a))));
  annotations = redoStack.pop();
  selectedIdx = -1;
  updateUndoRedoBtns();
  redrawAnnotations();
}

function updateUndoRedoBtns() {
  const u = document.getElementById('undoBtn');
  const r = document.getElementById('redoBtn');
  if (u) u.disabled = history.length === 0;
  if (r) r.disabled = redoStack.length === 0;
}

function deleteSelected() {
  if (selectedIdx < 0 || selectedIdx >= annotations.length) return;
  pushHistory();
  annotations.splice(selectedIdx, 1);
  selectedIdx = -1;
  redrawAnnotations();
  showToast('削除しました', 'success');
}

function duplicateSelected() {
  if (selectedIdx < 0 || selectedIdx >= annotations.length) return;
  pushHistory();
  const copy = JSON.parse(JSON.stringify(annotations[selectedIdx]));
  const off = 20;
  if ('x' in copy) { copy.x += off; copy.y += off; }
  else { copy.x1 += off; copy.y1 += off; copy.x2 += off; copy.y2 += off; }
  if (copy.type === 'pen') copy.path = copy.path.map(p => ({ x: p.x + off, y: p.y + off }));
  annotations.push(copy);
  selectedIdx = annotations.length - 1;
  redrawAnnotations();
}

function onDblClick(e) {
  if (Date.now() - lastCommitTime < 400) return;
  const { x, y } = canvasXY(e);
  const idx = hitTest(x, y);
  if (idx >= 0 && annotations[idx].type === 'text') {
    selectedIdx = -1;
    openTextEdit(idx);
  }
}

function onContextMenu(e) {
  e.preventDefault();
  const { x, y } = canvasXY(e);
  const idx = hitTest(x, y);
  const menu = document.getElementById('contextMenu');
  if (idx < 0) { menu.classList.remove('open'); return; }
  selectedIdx = idx;
  syncSidebarToAnnotation(annotations[idx]);
  redrawAnnotations();
  menu.style.left = Math.min(e.clientX, window.innerWidth - 200) + 'px';
  menu.style.top  = Math.min(e.clientY, window.innerHeight - 180) + 'px';
  menu.classList.add('open');
}

function initContextMenu() {
  const menu = document.getElementById('contextMenu');
  document.addEventListener('click', () => menu.classList.remove('open'));
  document.getElementById('ctxDuplicate').addEventListener('click', () => {
    duplicateSelected(); menu.classList.remove('open');
  });
  document.getElementById('ctxFront').addEventListener('click', () => {
    if (selectedIdx < 0) return;
    pushHistory();
    const a = annotations.splice(selectedIdx, 1)[0];
    annotations.push(a);
    selectedIdx = annotations.length - 1;
    redrawAnnotations();
    menu.classList.remove('open');
  });
  document.getElementById('ctxBack').addEventListener('click', () => {
    if (selectedIdx < 0) return;
    pushHistory();
    const a = annotations.splice(selectedIdx, 1)[0];
    annotations.unshift(a);
    selectedIdx = 0;
    redrawAnnotations();
    menu.classList.remove('open');
  });
  document.getElementById('ctxDelete').addEventListener('click', () => {
    deleteSelected(); menu.classList.remove('open');
  });
}

function initKeyboard() {
  document.addEventListener('keydown', e => {
    const tag = document.activeElement?.tagName;
    if (tag === 'TEXTAREA' || tag === 'INPUT') return;
    if (inlineTA.style.display !== 'none') return;
    const ctrl = e.ctrlKey || e.metaKey;

    /* ツール切替 (V P L A R O T E) */
    if (!ctrl && !e.altKey) {
      const tmap = { v:'select', p:'pen', l:'line', a:'arrow', r:'rect', o:'ellipse', t:'text', e:'eraser' };
      const t = tmap[e.key.toLowerCase()];
      if (t) {
        tool = t;
        document.querySelectorAll('[data-tool]').forEach(b => b.classList.toggle('active', b.dataset.tool === tool));
        annotCanvas.style.cursor = toolCursor(tool);
        const ds = TOOL_DEFAULT_SIZE[tool];
        if (ds !== undefined) { strokeSize = ds; document.getElementById('strokeSize').value = ds; }
        return;
      }
    }

    if (ctrl && !e.shiftKey && e.key.toLowerCase() === 'z') { e.preventDefault(); doUndo(); return; }
    if ((ctrl && e.shiftKey && e.key.toLowerCase() === 'z') || (ctrl && e.key.toLowerCase() === 'y')) {
      e.preventDefault(); doRedo(); return;
    }
    if (ctrl && e.key.toLowerCase() === 'd') { e.preventDefault(); duplicateSelected(); return; }
    if (ctrl && e.key.toLowerCase() === 'a') {
      e.preventDefault();
      if (annotations.length) {
        selectedIdx = annotations.length - 1;
        syncSidebarToAnnotation(annotations[selectedIdx]);
        redrawAnnotations();
      }
      return;
    }
    if ((e.key === 'Delete' || e.key === 'Backspace') && selectedIdx >= 0) {
      e.preventDefault(); deleteSelected(); return;
    }
    if (e.key === 'Escape') {
      selectedIdx = -1; redrawAnnotations(); return;
    }
    if (selectedIdx >= 0 && ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
      e.preventDefault();
      const d = e.shiftKey ? 10 : 1;
      const dx = e.key === 'ArrowLeft' ? -d : e.key === 'ArrowRight' ? d : 0;
      const dy = e.key === 'ArrowUp'   ? -d : e.key === 'ArrowDown'  ? d : 0;
      pushHistory();
      const a = annotations[selectedIdx];
      if ('x' in a) { a.x += dx; a.y += dy; }
      else { a.x1 += dx; a.y1 += dy; a.x2 += dx; a.y2 += dy; }
      if (a.type === 'pen') a.path = a.path.map(p => ({ x: p.x + dx, y: p.y + dy }));
      redrawAnnotations();
    }
  });
}

function initCustomColor() {
  const btn   = document.getElementById('customColorBtn');
  const input = document.getElementById('customColorInput');
  btn.addEventListener('click', () => { input.value = strokeColor; input.click(); });
  input.addEventListener('input', e => {
    const col = e.target.value;
    strokeColor = col;
    btn.style.background = col;
    btn.style.color = '#fff';
    btn.textContent = '';
    document.querySelectorAll('.tool-color-btn[data-color]').forEach(b => b.classList.remove('active'));
    btn.style.border = '2.5px solid #1A1A2E';
    applyColorToSelection(col);
  });
}

/* 選択中の注釈の色を即時更新（テキスト・線・矢印・矩形・楕円・ペン） */
function applyColorToSelection(col) {
  /* 編集中テキストにも即時反映 */
  if (inlineTA.style.display === 'block') {
    strokeColor = col;
    inlineTA.style.color = col;
    syncTextToolbarState();
  }
  if (selectedIdx < 0) return;
  const a = annotations[selectedIdx];
  if (!a) return;
  if (!['text','line','arrow','rect','ellipse','pen'].includes(a.type)) return;
  if (a.color === col) return;
  pushHistory();
  a.color = col;
  redrawAnnotations();
  if (a.type === 'text') syncTextToolbarState();
}

/* ────── undo / clear ────── */
function initTopActions() {
  document.getElementById('undoBtn').addEventListener('click', doUndo);
  document.getElementById('redoBtn').addEventListener('click', doRedo);
  updateUndoRedoBtns();
  document.getElementById('clearBtn').addEventListener('click', () => {
    if (!annotations.length) return;
    if (!confirm('すべての注釈を削除しますか？')) return;
    pushHistory();
    annotations = [];
    redrawAnnotations();
  });
  // メインボタン：現在の選択モードで保存
  document.getElementById('saveBtn').addEventListener('click', () => {
    if (saveMode === 'overwrite') saveOverwrite();
    else saveAsNewVersion();
  });

  // ▼ボタン：ドロップダウン開閉
  const saveDropBtn = document.getElementById('saveDropBtn');
  const saveDropdown = document.getElementById('saveDropdown');
  saveDropBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    saveDropdown.classList.toggle('open');
  });
  document.addEventListener('click', () => saveDropdown.classList.remove('open'));

  // ドロップダウン項目
  document.getElementById('saveNewVerBtn').addEventListener('click', () => {
    saveMode = 'newversion';
    document.getElementById('saveBtnLabel').textContent = '新バージョンとして保存';
    saveDropdown.classList.remove('open');
    saveAsNewVersion();
  });
  document.getElementById('saveOverwriteBtn').addEventListener('click', () => {
    saveMode = 'overwrite';
    document.getElementById('saveBtnLabel').textContent = 'そのまま保存（上書き）';
    saveDropdown.classList.remove('open');
    saveOverwrite();
  });
}

/* ────── 保存（新バージョン） ────── */
async function saveAsNewVersion() {
  /* テキスト入力中なら先に確定（blur発火タイミングの差異を吸収） */
  if (inlineTA.style.display !== 'none') commitInlineText();

  const hasAnnotations = annotations.length > 0 || Object.values(pageAnnotations).some(p => p.length);
  if (!hasAnnotations && pdfViewRotation === 0) {
    showToast('注釈も回転もありません', 'danger'); return;
  }

  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 保存中…';
  setLoading(true, '保存中…');

  try {
    const ext  = fileData.file_name.split('.').pop().toLowerCase();
    const mime = fileData.mime_type ?? '';
    let blob;

    if (ext === 'pdf' || mime === 'application/pdf') {
      blob = await buildAnnotatedPdf();
    } else {
      blob = await buildAnnotatedImage();
    }

    const saveName = fileData.file_name.replace(/(\.[^.]+)$/, '_annotated$1');
    const file = new File([blob], saveName, { type: blob.type });
    const res  = await wnUploadFile(file);

    if (res?.data) {
      /* 保存後サムネイルを先行生成（ダッシュボードで即時表示） */
      await preGenerateThumbnail(String(res.data.id), res.data.updated_at).catch(() => {});
      /* 保存後は新ファイルのIDに更新してページ遷移せず継続編集可能にする */
      fileId   = String(res.data.id);
      fileData = res.data;
      window.history.replaceState(null, '', `?id=${fileId}&from=${encodeURIComponent(fromPage)}`);
      document.getElementById('topTitle').textContent = `注釈編集：${fileData.file_name}`;
      /* 保存済みファイル（注釈焼き込み済み）で同ページを再ロード */
      location.replace(location.pathname + '?id=' + fileId + '&from=' + encodeURIComponent(fromPage) + '&saved=1');
    } else {
      showToast('保存に失敗しました', 'danger');
    }
  } catch(e) {
    console.error(e);
    showToast('保存エラー: ' + e.message, 'danger');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> 新バージョンとして保存';
    setLoading(false);
  }
}
