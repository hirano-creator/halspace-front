            if (line) { tctx.fillText(line, baseX, a.y + li * lineH); li++; }
          } else {
            tctx.fillText(paragraph, baseX, a.y + li * lineH); li++;
          }
        });
      } else if (a.type === 'stamp') {
        drawStamp(tctx, a);
      }
      tctx.restore();
    });
    return tmp;
  }

  /* 注釈レイヤーの目標解像度: PDF寸法 × TARGET_SCALE（144DPI相当）
     表示時の pdfScale に依存せず、常に高解像度で書き出す */
  const TARGET_SCALE = 2;
  const MAX_DIM = 4096;  /* モバイルメモリ対策の上限 */

  for (let pageNum = 1; pageNum <= totalPages; pageNum++) {
    const annots = pageAnnotations[pageNum] || [];
    if (!annots.length) continue;

    const page = pages[pageNum - 1];
    const { width: pW, height: pH } = page.getSize();
    const rotAngle = page.getRotation?.()?.angle ?? 0;

    let cw, ch;
    if (pageSizes[pageNum]) {
      cw = pageSizes[pageNum].w;
      ch = pageSizes[pageNum].h;
    } else {
      const pdfPage = await pdfDoc.getPage(pageNum);
      const vp = pdfPage.getViewport({ scale: pdfScale });
      cw = vp.width; ch = vp.height;
    }

    /* 表示用canvas (cw×ch) → 出力解像度を視覚的なPDF寸法基準で算出
       回転PDF: 視覚的な幅 = pH（内部高さ）、視覚的な高さ = pW（内部幅） */
    const visualW = (rotAngle === 90 || rotAngle === 270) ? pH : pW;
    let targetW = visualW * TARGET_SCALE;
    if (targetW > MAX_DIM) targetW = MAX_DIM;
    const scaleFactor = Math.max(targetW / cw, 1);  /* 1未満にはしない（縮小しない） */

    /* 全注釈（スタンプ含む）を高解像度Canvasに描画 → bakeOnPage で焼き込む */
    const sourceCanvas = drawAnnotationsToCanvas(annots, cw, ch, scaleFactor);
    await bakeOnPage(page, sourceCanvas);
  }

  const bytes = await pdfLibDoc.save();
  return new Blob([bytes], { type: 'application/pdf' });
}

/* 画像に注釈を焼き込む */
async function buildAnnotatedImage() {
  const merged = document.createElement('canvas');
  merged.width  = baseCanvas.width;
  merged.height = baseCanvas.height;
  const mCtx = merged.getContext('2d');
  mCtx.drawImage(baseCanvas, 0, 0);
  annotations.forEach(a => {
    mCtx.save();
    mCtx.strokeStyle = a.color;
    mCtx.fillStyle   = a.color;
    mCtx.lineWidth   = a.size ?? 2;
    mCtx.lineCap = mCtx.lineJoin = 'round';
    drawAnnotationToCtx(mCtx, a);
    mCtx.restore();
  });
  return new Promise(r => merged.toBlob(r, 'image/jpeg', 0.92));
}

function drawAnnotationToCtx(ctx, a) {
  if (a.type === 'pen') {
    ctx.beginPath();
    a.path.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
    ctx.stroke();
  } else if (a.type === 'line') {
    ctx.beginPath(); ctx.moveTo(a.x1, a.y1); ctx.lineTo(a.x2, a.y2); ctx.stroke();
  } else if (a.type === 'arrow') {
    drawArrow(ctx, a.x1, a.y1, a.x2, a.y2, a.color, a.size);
  } else if (a.type === 'rect') {
    ctx.strokeRect(a.x1, a.y1, a.x2 - a.x1, a.y2 - a.y1);
  } else if (a.type === 'ellipse') {
    const cx = (a.x1 + a.x2) / 2, cy = (a.y1 + a.y2) / 2;
    const rx = Math.abs(a.x2 - a.x1) / 2, ry = Math.abs(a.y2 - a.y1) / 2;
    ctx.beginPath(); ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2); ctx.stroke();
  } else if (a.type === 'text') {
    const fs = a.fontSize ?? 50;
    const al = a.align ?? 'left';
    ctx.font = `${fs}px 'Noto Sans JP', sans-serif`;
    ctx.fillStyle = a.color;
    ctx.textAlign = al;
    const baseX = al === 'center' ? a.x + (a.w ?? 0) / 2
                : al === 'right'  ? a.x + (a.w ?? 0)
                : a.x;
    const lineH = fs * 1.4;
    let li = 0;
    a.text.split('\n').forEach(paragraph => {
      if (a.w) {
        const words = paragraph.split('');
        let line = '';
        for (const ch of words) {
          const test = line + ch;
          if (ctx.measureText(test).width > a.w && line.length > 0) {
            ctx.fillText(line, baseX, a.y + li * lineH);
            line = ch; li++;
          } else { line = test; }
        }
        if (line) { ctx.fillText(line, baseX, a.y + li * lineH); li++; }
      } else {
        ctx.fillText(paragraph, baseX, a.y + li * lineH); li++;
      }
    });
    ctx.textAlign = 'left';
  } else if (a.type === 'stamp') {
    drawStamp(ctx, a);
  }
}

/* ────── ユーティリティ ────── */
function setLoading(on, text = '') {
  const el = document.getElementById('loadingOverlay');
  el.classList.toggle('hidden', !on);
  if (text) document.getElementById('loadingText').textContent = text;
}

function showToast(msg, type = '') {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = `toast${type ? ' toast-' + type : ''}`;
  t.textContent = msg;
  c.appendChild(t);
  requestAnimationFrame(() => t.classList.add('show'));
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 3500);
}

function showToastWithAction(msg, actionLabel, onAction) {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = 'toast toast-success';
  t.style.cssText = 'display:flex;align-items:center;gap:12px;min-width:240px;';
  const span = document.createElement('span');
  span.textContent = msg;
  const btn = document.createElement('button');
  btn.textContent = actionLabel;
  btn.style.cssText = 'background:rgba(255,255,255,.25);border:none;color:#fff;padding:3px 10px;border-radius:4px;font-size:12px;cursor:pointer;white-space:nowrap;flex-shrink:0;';
  btn.addEventListener('click', () => { t.remove(); onAction(); });
  t.appendChild(span);
  t.appendChild(btn);
  c.appendChild(t);
  requestAnimationFrame(() => t.classList.add('show'));
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 6000);
}
</script>
