<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1E3A5F">
  <title>差分比較 | What'sNo</title>
  <link rel="manifest" href="../manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Poppins:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/wn-app.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { background: var(--bg); }

    .diff-wrap { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    /* トップバー */
    .diff-topbar {
      height: 52px; background: var(--white); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 16px; gap: 12px; flex-shrink: 0; z-index: 10;
    }
    .diff-topbar-back {
      color: var(--muted); font-size: 13px; display: flex; align-items: center; gap: 6px;
      text-decoration: none; white-space: nowrap;
    }
    .diff-topbar-back:hover { color: var(--primary); }
    .diff-topbar-title { font-size: 14px; font-weight: 700; color: var(--primary); flex: 1; }

    /* コントロールバー */
    .diff-controls {
      background: var(--white); border-bottom: 1px solid var(--border);
      padding: 10px 16px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      flex-shrink: 0;
    }
    .diff-ver-badge {
      padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700;
      max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .diff-ver-a { background: #FFEBEE; color: #C62828; }
    .diff-ver-b { background: #E8F5E9; color: #2E7D32; }
    /* 任意2ファイル比較モード: A=青系 / B=オレンジ系（差分色の赤/緑と紛れないように） */
    .diff-ver-fa { background: #E3F2FD; color: #1565C0; }
    /* Blue 800(#1565C0)と同じ濃さ階層のDeep Orange 800を使う。
       900(#E65100)は彩度が高く、同じfont-weightでも青より太く/濃く見えてしまう */
    .diff-ver-fb { background: #FFF3E0; color: #D84315; }
    .diff-mode-btn {
      padding: 5px 12px; border: 1.5px solid var(--border); border-radius: 6px;
      background: var(--white); font-size: 12px; cursor: pointer; transition: all .15s;
    }
    .diff-mode-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .diff-sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }
    .diff-legend {
      display: flex; align-items: center; gap: 10px; font-size: 11px; color: var(--muted); margin-left: auto;
    }
    .diff-legend-dot {
      width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0;
    }

    /* メインエリア */
    .diff-body { flex: 1; overflow: hidden; position: relative; }

    /* 並列モード */
    .diff-side-by-side {
      display: grid; grid-template-columns: 1fr 1fr; height: 100%;
    }
    .diff-panel {
      overflow: auto; border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      /* グリッド子のmin-size:autoを解除。無いと大きなcanvasの固有幅で
         列が1fr(半分)を超えて膨張し、max-width:100%が効かなくなる */
      min-width: 0; min-height: 0;
    }
    .diff-panel:last-child { border-right: none; }
    .diff-panel-label {
      position: sticky; top: 0; z-index: 5;
      padding: 20px 14px; font-size: 11px; font-weight: 700;
      display: flex; align-items: center; gap: 6px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .diff-panel-label.old { background: rgba(198,40,40,.08); color: #C62828; }
    .diff-panel-label.new { background: rgba(46,125,50,.08); color: #2E7D32; }
    .diff-panel-label.fa  { background: rgba(21,101,192,.08); color: #1565C0; }
    .diff-panel-label.fb  { background: rgba(216,67,21,.08); color: #D84315; }
    .diff-canvas-wrap {
      display: flex; flex-direction: column; align-items: center;
      gap: 10px; padding: 10px;
    }
    /* ズーム中は左上起点にしてスクロールで全域に届くようにする */
    .diff-canvas-wrap.zoomed, .diff-overlay-wrap.zoomed { align-items: flex-start; }

    /* オーバーレイ/スワイプ/差分モードの共通ラッパー */
    .diff-overlay-wrap {
      height: 100%; overflow: auto;
      display: flex; flex-direction: column; align-items: center;
      padding: 10px; gap: 10px;
    }
    .diff-page-label {
      font-size: 11px; color: var(--muted); align-self: flex-start; padding: 0 6px;
    }

    /* パン対象（1本指ドラッグ・ピンチをJSで扱うのでブラウザ標準タッチ操作は無効化） */
    .cmp-pannable { touch-action: none; overscroll-behavior: contain; }

    /* スワイプ比較 */
    .swipe-container { position: relative; display: inline-block; }
    .swipe-top { position: absolute; inset: 0; overflow: hidden; }
    .swipe-divider {
      position: absolute; top: 0; bottom: 0; left: 50%; width: 18px; margin-left: -9px;
      cursor: ew-resize; touch-action: none; z-index: 6;
    }
    .swipe-divider::before {
      content: ''; position: absolute; top: 0; bottom: 0; left: 50%; margin-left: -1.5px;
      width: 3px; background: var(--accent); box-shadow: 0 0 4px rgba(0,0,0,.35);
    }
    .swipe-grip {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      width: 34px; height: 34px; border-radius: 50%; background: var(--accent);
      color: #fff; display: flex; align-items: center; justify-content: center;
      font-size: 13px; box-shadow: 0 2px 8px rgba(0,0,0,.3);
    }
    .swipe-tag {
      position: absolute; top: 8px; padding: 2px 8px; border-radius: 10px;
      font-size: 11px; font-weight: 700; z-index: 5; pointer-events: none;
    }
    .swipe-tag.a { left: 8px;  background: rgba(21,101,192,.85); color: #fff; }
    .swipe-tag.b { right: 8px; background: rgba(216,67,21,.85); color: #fff; }

    /* ズーム率トースト */
    #cmpZoomLabel {
      position: fixed; left: 50%; bottom: 80px; transform: translateX(-50%);
      background: rgba(0,0,0,.7); color: #fff; padding: 6px 14px; border-radius: 16px;
      font-size: 13px; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity .2s;
    }
    #cmpZoomLabel.show { opacity: 1; }

    /* ローディング */
    .diff-loading {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px;
      background: var(--bg); z-index: 20;
    }
    .diff-spinner {
      width: 40px; height: 40px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* DXF差分テーブル */
    .diff-dxf-wrap {
      height: 100%; display: flex; flex-direction: column; overflow: hidden;
    }
    .diff-dxf-canvas-wrap {
      flex: 1; overflow: auto; background: #1A1A2E; position: relative;
    }
    .diff-dxf-canvas-wrap canvas {
      display: block;
    }
    .diff-dxf-stats {
      background: var(--white); border-top: 1px solid var(--border);
      padding: 8px 16px; display: flex; gap: 16px; font-size: 12px; flex-shrink: 0;
    }
    .diff-stat-add { color: #2E7D32; font-weight: 700; }
    .diff-stat-del { color: #C62828; font-weight: 700; }
    .diff-stat-same { color: var(--muted); }

    /* エラー */
    .diff-error {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 10px; color: var(--muted);
      background: var(--bg);
    }
    .diff-error i { font-size: 48px; opacity: .4; }

    /* スライダー（オーバーレイ用） */
    .diff-opacity-wrap { display: flex; align-items: center; gap: 8px; font-size: 12px; }
    .diff-opacity-wrap input[type=range] { width: 100px; accent-color: var(--accent); }

    @media (max-width: 640px) {
      .diff-side-by-side { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
      .diff-ver-badge { max-width: 140px; }
    }
  </style>
</head>
<body>
<div class="diff-wrap">

  <!-- トップバー -->
  <div class="diff-topbar">
    <a href="#" class="diff-topbar-back" id="backBtn">
      <i class="fa-solid fa-chevron-left"></i> <span id="backLabel">詳細に戻る</span>
    </a>
    <div class="diff-topbar-title" id="diffTitle">差分比較</div>
  </div>

  <!-- コントロールバー -->
  <div class="diff-controls">
    <span class="diff-ver-badge diff-ver-a" id="badgeA">vOLD</span>
    <i class="fa-solid fa-arrow-right" style="font-size:11px;color:var(--muted);"></i>
    <span class="diff-ver-badge diff-ver-b" id="badgeB">vNEW</span>

    <div class="diff-sep" id="modeSep"></div>
    <div id="modeButtons">
      <button class="diff-mode-btn active" data-mode="side">並列表示</button>
      <button class="diff-mode-btn" data-mode="overlay">オーバーレイ</button>
      <button class="diff-mode-btn" data-mode="swipe">スワイプ</button>
      <button class="diff-mode-btn" data-mode="diff">差分のみ</button>
    </div>

    <div class="diff-opacity-wrap" id="opacityWrap" style="display:none;">
      <span id="opacityLabel">旧版の透明度:</span>
      <input type="range" id="opacitySlider" min="0" max="100" value="40">
      <span id="opacityVal">40%</span>
    </div>

    <div class="diff-legend" id="diffLegend" style="display:none;">
      <div class="diff-legend-dot" style="background:rgba(198,40,40,.5);"></div><span id="legendDel">削除</span>
      <div class="diff-legend-dot" style="background:rgba(46,125,50,.5);"></div><span id="legendAdd">追加</span>
    </div>
  </div>

  <!-- メインエリア -->
  <div class="diff-body" id="diffBody"></div>

  <!-- ローディング（diffBody の外に配置） -->
  <div class="diff-loading" id="diffLoading">
    <div class="diff-spinner"></div>
    <span style="font-size:13px;color:var(--muted);" id="loadingMsg">ファイルを読み込んでいます…</span>
  </div>

</div>

<!-- toast -->
<div id="toastContainer" style="position:fixed;bottom:24px;right:24px;z-index:99999;display:flex;flex-direction:column;gap:8px;"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dxf-parser@1.1.2/dist/dxf-parser.js"></script>
<script src="../../solid/assets/js/auth.js"></script>
<script src="../assets/js/wn-api.js"></script>
<script src="../assets/js/wn-dxf-viewer.js"></script>
<script>
'use strict';

const params = new URLSearchParams(location.search);
const idA = params.get('a');  /* バージョン比較: 旧版 / ファイル比較: 選択1番目 */
const idB = params.get('b');  /* バージョン比較: 新版 / ファイル比較: 選択2番目 */
/* type=files なら「任意の2ファイル比較」。無指定は従来通り同一ファイルのバージョン比較 */
const isFilesMode = params.get('type') === 'files';

let fileA = null, fileB = null;
let urlA  = null, urlB  = null;
let currentMode = 'side';
let pagesA = [], pagesB = [];   /* raster(PDF/画像)をページごとの canvas に落としたもの */
let kindA = null, kindB = null; /* 'raster' | 'dxf' | null */

const IMG_EXTS = ['png', 'jpg', 'jpeg', 'gif', 'webp'];
const extOf  = f => (f?.file_name ?? '').split('.').pop().toLowerCase();
const kindOf = f => {
  const e = extOf(f);
  if (e === 'pdf' || IMG_EXTS.includes(e)) return 'raster';
  if (e === 'dxf') return 'dxf';
  return null;
};

function sideName(side) {
  if (side === 'a') return isFilesMode ? 'A' : '旧版';
  return isFilesMode ? 'B' : '新版';
}
function sideLabel(side) {
  if (side === 'a') return isFilesMode ? `A: ${fileA.file_name}` : `v${fileA.version}（旧版）`;
  return isFilesMode ? `B: ${fileB.file_name}` : `v${fileB.version}（新版）`;
}
/* 差分の呼び方: バージョン比較=削除/追加、ファイル比較=Aのみ/Bのみ */
const wordDel = () => isFilesMode ? 'Aのみ' : '削除';
const wordAdd = () => isFilesMode ? 'Bのみ' : '追加';

/* CDN障害等でpdf.jsが読めなくても後続コードは動かす（PDF比較時に明示エラーを出す） */
if (typeof pdfjsLib !== 'undefined') {
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
}

/* 安全網: 予期しない例外で「スピナーが回り続けるだけ」の沈黙状態にしない */
window.addEventListener('error', e => {
  if (isLoadingVisible()) showError('エラーが発生しました: ' + (e.message || '不明なエラー'));
});
window.addEventListener('unhandledrejection', e => {
  if (isLoadingVisible()) showError('エラーが発生しました: ' + (e.reason?.message || e.reason || '不明なエラー'));
});
function isLoadingVisible() {
  const el = document.getElementById('diffLoading');
  return !!el && el.style.display !== 'none';
}

document.addEventListener('DOMContentLoaded', async () => {
  if (!idA || !idB) { showError('比較するファイルが指定されていません'); return; }
  requireSpaceAuth();

  document.getElementById('backBtn').href = isFilesMode ? 'dashboard.html' : `file-detail.html?id=${idB}`;
  if (isFilesMode) document.getElementById('backLabel').textContent = '一覧に戻る';

  /* ファイル情報取得 */
  setLoadingMsg('ファイル情報を取得中…');
  const fetchFile = async (id) => {
    const res = await wnFetch(`/wn/files/${id}`);
    if (!res || !res.ok) return null;
    return (await res.json()).data ?? null;
  };
  [fileA, fileB] = await Promise.all([fetchFile(idA), fetchFile(idB)]);
  if (!fileA || !fileB) { showError('ファイルが見つかりません'); return; }

  kindA = kindOf(fileA);
  kindB = kindOf(fileB);

  /* タイトル・バッジ */
  const badgeA = document.getElementById('badgeA');
  const badgeB = document.getElementById('badgeB');
  if (isFilesMode) {
    document.getElementById('diffTitle').textContent = 'ファイル比較';
    badgeA.classList.replace('diff-ver-a', 'diff-ver-fa');
    badgeB.classList.replace('diff-ver-b', 'diff-ver-fb');
    badgeA.textContent = `A: ${fileA.file_name}`;
    badgeB.textContent = `B: ${fileB.file_name}`;
    badgeA.title = fileA.file_name;
    badgeB.title = fileB.file_name;
    document.getElementById('opacityLabel').textContent = 'Aの透明度:';
    document.getElementById('legendDel').textContent = 'Aのみ';
    document.getElementById('legendAdd').textContent = 'Bのみ';
  } else {
    document.getElementById('diffTitle').textContent = `差分比較: ${fileB.file_name}`;
    badgeA.textContent = `v${fileA.version} (旧)`;
    badgeB.textContent = `v${fileB.version} (新)`;
  }

  if (!kindA || !kindB || kindA !== kindB) {
    showError('この組み合わせは比較できません（PDF・画像は相互に比較可、DXFはDXF同士のみ）');
    return;
  }

  /* 必要ライブラリの読み込み確認（CDN障害時に原因を明示する） */
  if (kindA === 'raster' && (extOf(fileA) === 'pdf' || extOf(fileB) === 'pdf') && typeof pdfjsLib === 'undefined') {
    showError('PDF表示ライブラリの読み込みに失敗しました。ネットワークを確認してページを再読み込みしてください');
    return;
  }
  if (kindA === 'dxf' && typeof DxfParser === 'undefined') {
    showError('DXF解析ライブラリの読み込みに失敗しました。ネットワークを確認してページを再読み込みしてください');
    return;
  }

  /* PDFのみ署名URLが必要（画像は wnFetchFileBuffer、DXFはテキスト取得） */
  const needsUrlA = extOf(fileA) === 'pdf';
  const needsUrlB = extOf(fileB) === 'pdf';
  if (needsUrlA || needsUrlB) {
    setLoadingMsg('ファイルを読み込み中…');
    [urlA, urlB] = await Promise.all([
      needsUrlA ? wnGetViewUrl(idA) : Promise.resolve(null),
      needsUrlB ? wnGetViewUrl(idB) : Promise.resolve(null),
    ]);
    if ((needsUrlA && !urlA) || (needsUrlB && !urlB)) { showError('ファイルのURLを取得できませんでした'); return; }
  }

  /* モードボタン（DXFは並列/差分ハイライトのみ） */
  if (kindA === 'dxf') {
    document.getElementById('modeButtons').innerHTML =
      '<button class="diff-mode-btn active" data-mode="side">並列表示</button>' +
      '<button class="diff-mode-btn" data-mode="diff">差分ハイライト</button>';
    currentMode = 'side';
  }

  document.querySelectorAll('.diff-mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.diff-mode-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentMode = btn.dataset.mode;
      renderMode();
    });
  });

  document.getElementById('opacitySlider').addEventListener('input', e => {
    document.getElementById('opacityVal').textContent = e.target.value + '%';
    updateOverlayOpacity(parseInt(e.target.value));
  });

  initCmpWheelZoom();
  await renderMode();
});

/* ────────────────── モード描画 ────────────────── */
async function renderMode() {
  document.getElementById('opacityWrap').style.display =
    (kindA === 'raster' && currentMode === 'overlay') ? '' : 'none';
  document.getElementById('diffLegend').style.display =
    currentMode === 'diff' ? '' : 'none';

  if (kindA === 'raster') await renderRasterDiff();
  else await renderDxfDiff();
}

/* ────────────────── raster(PDF/画像) 比較 ────────────────── */
async function loadRasterPages() {
  if (pagesA.length || pagesB.length) return;
  const load = async (id, url, file, side) => {
    try {
      if (extOf(file) === 'pdf') {
        const doc = await pdfjsLib.getDocument(url).promise;
        return await renderPdfToImages(doc, side);
      }
      return [await renderImageToCanvas(id, side)];
    } catch (err) {
      /* どちらのファイルで失敗したか分かるようにする */
      throw new Error(`「${file.file_name}」: ${err.message}`);
    }
  };
  [pagesA, pagesB] = await Promise.all([
    load(idA, urlA, fileA, 'a'),
    load(idB, urlB, fileB, 'b'),
  ]);
}

async function renderRasterDiff() {
  const body = document.getElementById('diffBody');
  setLoadingMsg('ファイルを読み込み中…');

  try {
    await loadRasterPages();
    const pageCount = Math.max(pagesA.length, pagesB.length);
    hideLoading();

    if (currentMode === 'side') {
      const clsA = isFilesMode ? 'fa' : 'old';
      const clsB = isFilesMode ? 'fb' : 'new';
      body.innerHTML = `
        <div class="diff-side-by-side">
          <div class="diff-panel" id="panelA">
            <div class="diff-panel-label ${clsA}"><i class="fa-solid fa-circle" style="font-size:8px;"></i> ${h(sideLabel('a'))}</div>
            <div class="diff-canvas-wrap" id="canvasWrapA"></div>
          </div>
          <div class="diff-panel" id="panelB">
            <div class="diff-panel-label ${clsB}"><i class="fa-solid fa-circle" style="font-size:8px;"></i> ${h(sideLabel('b'))}</div>
            <div class="diff-canvas-wrap" id="canvasWrapB"></div>
          </div>
        </div>`;

      /* 注意: canvas.cloneNode() は描画内容をコピーしないため原本をそのまま配置する */
      for (let i = 0; i < pageCount; i++) {
        if (pagesA[i]) { setPageStyle(pagesA[i]); document.getElementById('canvasWrapA').appendChild(pagesA[i]); }
        if (pagesB[i]) { setPageStyle(pagesB[i]); document.getElementById('canvasWrapB').appendChild(pagesB[i]); }
      }
      syncScroll('panelA', 'panelB');
      setupCmpView([document.getElementById('panelA'), document.getElementById('panelB')]);

    } else if (currentMode === 'overlay') {
      body.innerHTML = `<div class="diff-overlay-wrap" id="overlayWrap"></div>`;
      const wrap = document.getElementById('overlayWrap');
      const opacity = parseInt(document.getElementById('opacitySlider').value) / 100;

      for (let i = 0; i < pageCount; i++) {
        if (pageCount > 1) wrap.appendChild(pageLabel(i));

        const container = document.createElement('div');
        container.style.cssText = 'position:relative;display:inline-block;';
        if (pagesB[i]) {
          setPageStyle(pagesB[i]);
          pagesB[i].style.display = 'block';
          container.appendChild(pagesB[i]);
        }
        if (pagesA[i]) {
          const imgA = pagesA[i];
          imgA.classList.remove('cmp-zoom');
          imgA.style.cssText = `position:absolute;inset:0;width:100%;height:100%;opacity:${opacity};mix-blend-mode:multiply;border-radius:6px;`;
          imgA.dataset.overlay = 'true';
          container.appendChild(imgA);
        }
        wrap.appendChild(container);
      }
      setupCmpView([wrap]);

    } else if (currentMode === 'swipe') {
      body.innerHTML = `<div class="diff-overlay-wrap" id="swipeWrap"></div>`;
      const wrap = document.getElementById('swipeWrap');
      for (let i = 0; i < pageCount; i++) {
        if (pageCount > 1) wrap.appendChild(pageLabel(i));
        wrap.appendChild(buildSwipePage(pagesB[i], pagesA[i]));
      }
      setupCmpView([wrap]);

    } else if (currentMode === 'diff') {
      body.innerHTML = `<div class="diff-overlay-wrap" id="diffWrap"></div>`;
      const wrap = document.getElementById('diffWrap');
      setLoadingMsg('差分を計算中…');
      document.getElementById('diffLoading').style.display = '';

      for (let i = 0; i < pageCount; i++) {
        if (pageCount > 1) wrap.appendChild(pageLabel(i));
        const diffCanvas = computePixelDiff(pagesA[i], pagesB[i]);
        diffCanvas.style.cssText = 'border-radius:6px;max-width:100%;';
        diffCanvas.classList.add('cmp-zoom');
        wrap.appendChild(diffCanvas);
      }
      hideLoading();
      setupCmpView([wrap]);
    }

  } catch (err) {
    console.error(err);
    showError('ファイルの読み込みに失敗しました: ' + err.message);
  }
}

function pageLabel(i) {
  const label = document.createElement('div');
  label.className = 'diff-page-label';
  label.textContent = `ページ ${i + 1}`;
  return label;
}

function setPageStyle(canvas) {
  canvas.style.cssText = 'max-width:100%;border-radius:6px;background:#fff;';
  canvas.classList.add('cmp-zoom');
  delete canvas.dataset.overlay;
}

async function renderPdfToImages(doc, side) {
  const pages = [];
  const scale = 1.5;
  for (let i = 1; i <= doc.numPages; i++) {
    setLoadingMsg(`PDFをレンダリング中… (${sideName(side)} p.${i}/${doc.numPages})`);
    const page = await doc.getPage(i);
    const vp   = page.getViewport({ scale });
    const canvas = document.createElement('canvas');
    canvas.width  = vp.width;
    canvas.height = vp.height;
    await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
    pages.push(canvas);
  }
  return pages;
}

/* 画像を canvas に落とす。
   必ずAPI経由の blob 取得にする（R2署名URLを <img src> で直接読むと canvas が
   汚染されてピクセル差分の getImageData が失敗するため）。 */
async function renderImageToCanvas(fileId, side) {
  setLoadingMsg(`画像を読み込み中… (${sideName(side)})`);
  const buf = await wnFetchFileBuffer(fileId);
  if (!buf) throw new Error('画像の取得に失敗しました');
  const blob = new Blob([buf]);

  let bmp = null;
  try { bmp = await createImageBitmap(blob); } catch (_) { /* 旧Safari等はImageでフォールバック */ }
  if (!bmp) {
    bmp = await new Promise((resolve, reject) => {
      const img = new Image();
      const u = URL.createObjectURL(blob);
      img.onload  = () => { URL.revokeObjectURL(u); resolve(img); };
      img.onerror = () => { URL.revokeObjectURL(u); reject(new Error('画像のデコードに失敗しました')); };
      img.src = u;
    });
  }

  const w = bmp.width  ?? bmp.naturalWidth;
  const ht = bmp.height ?? bmp.naturalHeight;
  const scale = Math.min(1, 2400 / Math.max(w, ht));   /* iOSのメモリ保護のため長辺2400pxまで */
  const canvas = document.createElement('canvas');
  canvas.width  = Math.max(1, Math.round(w * scale));
  canvas.height = Math.max(1, Math.round(ht * scale));
  canvas.getContext('2d').drawImage(bmp, 0, 0, canvas.width, canvas.height);
  if (bmp.close) bmp.close();
  return canvas;
}

/* ── スワイプ比較（カーテン式）: 下=B、上=A を clip-path で左右に割る ── */
function buildSwipePage(canvasB, canvasA) {
  const container = document.createElement('div');
  container.className = 'swipe-container';

  if (canvasB) {
    setPageStyle(canvasB);
    canvasB.style.display = 'block';
    container.appendChild(canvasB);
  }

  const top = document.createElement('div');
  top.className = 'swipe-top';
  if (canvasA) {
    canvasA.classList.remove('cmp-zoom');
    canvasA.style.cssText = 'display:block;width:100%;height:100%;border-radius:6px;background:#fff;';
    top.appendChild(canvasA);
  }
  container.appendChild(top);

  const tagA = document.createElement('span');
  tagA.className = 'swipe-tag a';
  tagA.textContent = isFilesMode ? 'A' : '旧';
  const tagB = document.createElement('span');
  tagB.className = 'swipe-tag b';
  tagB.textContent = isFilesMode ? 'B' : '新';
  container.appendChild(tagA);
  container.appendChild(tagB);

  const divider = document.createElement('div');
  divider.className = 'swipe-divider';
  divider.innerHTML = '<div class="swipe-grip"><i class="fa-solid fa-arrows-left-right"></i></div>';
  container.appendChild(divider);

  const setPos = pct => {
    pct = Math.max(0, Math.min(100, pct));
    top.style.clipPath = `inset(0 ${100 - pct}% 0 0)`;
    divider.style.left = pct + '%';
  };
  setPos(50);

  divider.addEventListener('pointerdown', e => {
    e.preventDefault();
    e.stopPropagation();   /* パン開始より優先 */
    divider.setPointerCapture(e.pointerId);
    const move = ev => {
      const r = container.getBoundingClientRect();
      if (r.width) setPos((ev.clientX - r.left) / r.width * 100);
    };
    const up = () => {
      divider.removeEventListener('pointermove', move);
      divider.removeEventListener('pointerup', up);
      divider.removeEventListener('pointercancel', up);
    };
    divider.addEventListener('pointermove', move);
    divider.addEventListener('pointerup', up);
    divider.addEventListener('pointercancel', up);
  });

  return container;
}

/* ── 同期ズーム・パン ──
   ズームは各ページ要素(.cmp-zoom)のCSS幅を基準幅×倍率にする方式。
   パンはネイティブスクロール値の操作なので、並列モードは既存の syncScroll が
   そのまま左右同期になる。 */
let cmpZoom = 1;
let cmpContainers = [];
const CMP_ZOOM_MIN = 1, CMP_ZOOM_MAX = 5;

function setupCmpView(containers) {
  cmpContainers = containers.filter(Boolean);
  cmpContainers.forEach(initCmpPan);
  document.querySelectorAll('.cmp-zoom').forEach(el => {
    /* 基準幅=フィット表示時の幅（max-width:100%でパネルに収まった状態で測る） */
    el.style.width = '';
    el.style.maxWidth = '100%';
    el.dataset.baseW = el.getBoundingClientRect().width || el.width || 0;
  });
  applyCmpZoom();
}

function setCmpZoom(z) {
  const nz = Math.max(CMP_ZOOM_MIN, Math.min(CMP_ZOOM_MAX, z));
  if (Math.abs(nz - cmpZoom) < 0.005) return;
  cmpZoom = nz;
  applyCmpZoom();
  showCmpZoomLabel(Math.round(cmpZoom * 100) + '%');
}

function applyCmpZoom() {
  /* ズーム前後で画面中心が保たれるようスクロール位置を補正 */
  const saved = cmpContainers.map(c => ({
    c,
    x: (c.scrollLeft + c.clientWidth  / 2) / Math.max(1, c.scrollWidth),
    y: (c.scrollTop  + c.clientHeight / 2) / Math.max(1, c.scrollHeight),
  }));

  document.querySelectorAll('.cmp-zoom').forEach(el => {
    const base = parseFloat(el.dataset.baseW || '0');
    if (!base) return;
    /* 等倍時はフィット表示（max-width:100%を維持したまま）に戻す */
    if (cmpZoom === 1) { el.style.width = ''; el.style.maxWidth = '100%'; }
    else { el.style.width = Math.round(base * cmpZoom) + 'px'; el.style.maxWidth = 'none'; }
  });
  document.querySelectorAll('.diff-canvas-wrap, .diff-overlay-wrap')
    .forEach(w => w.classList.toggle('zoomed', cmpZoom > 1));

  saved.forEach(({ c, x, y }) => {
    c.scrollLeft = x * c.scrollWidth  - c.clientWidth  / 2;
    c.scrollTop  = y * c.scrollHeight - c.clientHeight / 2;
  });
}

function initCmpWheelZoom() {
  window.addEventListener('wheel', e => {
    if (!e.ctrlKey && !e.metaKey) return;
    if (kindA !== 'raster') return;
    if (!e.target.closest || !e.target.closest('#diffBody')) return;
    e.preventDefault();
    setCmpZoom(cmpZoom * (e.deltaY < 0 ? 1.1 : 1 / 1.1));
  }, { passive: false });
}

/* 1本指ドラッグでパン（スクロール操作）、2本指ピンチでズーム */
function initCmpPan(container) {
  if (container._cmpPan) return;
  container._cmpPan = true;
  container.classList.add('cmp-pannable');

  const ptrs = new Map();              /* pointerId → {x, y} */
  let panning = false, panPtrId = null;
  let startX = 0, startY = 0, startL = 0, startT = 0;
  let pinching = false, pinchStartDist = 0, pinchStartZoom = 1;

  container.addEventListener('pointerdown', e => {
    ptrs.set(e.pointerId, { x: e.clientX, y: e.clientY });

    if (ptrs.size >= 2) {
      /* 2本目が触れたらパン中止してピンチ開始 */
      if (panning) {
        panning = false;
        try { container.releasePointerCapture(panPtrId); } catch (_) {}
        panPtrId = null;
        container.style.cursor = '';
      }
      if (ptrs.size === 2) {
        pinching = true;
        const [a, b] = [...ptrs.values()];
        pinchStartDist = Math.hypot(a.x - b.x, a.y - b.y);
        pinchStartZoom = cmpZoom;
      }
      return;
    }

    if (e.button !== 0) return;
    const pannable = container.scrollWidth  > container.clientWidth ||
                     container.scrollHeight > container.clientHeight;
    if (!pannable) return;
    e.preventDefault();
    panning  = true;
    panPtrId = e.pointerId;
    startX = e.clientX; startY = e.clientY;
    startL = container.scrollLeft; startT = container.scrollTop;
    container.setPointerCapture(e.pointerId);
    container.style.cursor = 'grabbing';
  });

  container.addEventListener('pointermove', e => {
    if (!ptrs.has(e.pointerId)) return;
    ptrs.set(e.pointerId, { x: e.clientX, y: e.clientY });

    if (pinching && ptrs.size === 2) {
      const [a, b] = [...ptrs.values()];
      const dist = Math.hypot(a.x - b.x, a.y - b.y);
      if (pinchStartDist > 0) setCmpZoom(pinchStartZoom * (dist / pinchStartDist));
      return;
    }

    if (!panning) return;
    container.scrollLeft = startL - (e.clientX - startX);
    container.scrollTop  = startT - (e.clientY - startY);
  });

  const endPan = e => {
    ptrs.delete(e.pointerId);
    if (ptrs.size < 2) pinching = false;
    if (!panning || e.pointerId !== panPtrId) return;
    panning  = false;
    panPtrId = null;
    try { container.releasePointerCapture(e.pointerId); } catch (_) {}
    container.style.cursor = '';
  };
  container.addEventListener('pointerup', endPan);
  container.addEventListener('pointercancel', endPan);
}

let cmpZoomLabelTimer = null;
function showCmpZoomLabel(text) {
  let el = document.getElementById('cmpZoomLabel');
  if (!el) {
    el = document.createElement('div');
    el.id = 'cmpZoomLabel';
    document.body.appendChild(el);
  }
  el.textContent = text;
  el.classList.add('show');
  clearTimeout(cmpZoomLabelTimer);
  cmpZoomLabelTimer = setTimeout(() => el.classList.remove('show'), 900);
}

/* ピクセル差分 Canvas 生成 */
function computePixelDiff(canvasA, canvasB) {
  const w = Math.max(canvasA?.width  ?? 0, canvasB?.width  ?? 0) || 800;
  const h = Math.max(canvasA?.height ?? 0, canvasB?.height ?? 0) || 1000;

  const out    = document.createElement('canvas');
  out.width    = w;
  out.height   = h;
  const ctx    = out.getContext('2d');

  /* 背景を白 */
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, w, h);

  /* A を灰色でベース描画 */
  if (canvasA) {
    ctx.globalAlpha = 0.15;
    ctx.drawImage(canvasA, 0, 0, w, h);
  }
  /* B を通常描画 */
  if (canvasB) {
    ctx.globalAlpha = 1;
    ctx.drawImage(canvasB, 0, 0, w, h);
  }

  /* ピクセル差分計算 */
  const ctxA   = canvasA ? (() => { const c = document.createElement('canvas'); c.width = w; c.height = h; c.getContext('2d').drawImage(canvasA, 0, 0, w, h); return c.getContext('2d'); })() : null;
  const ctxB   = canvasB ? (() => { const c = document.createElement('canvas'); c.width = w; c.height = h; c.getContext('2d').drawImage(canvasB, 0, 0, w, h); return c.getContext('2d'); })() : null;
  if (!ctxA || !ctxB) return out;

  const dA     = ctxA.getImageData(0, 0, w, h).data;
  const dB     = ctxB.getImageData(0, 0, w, h).data;
  const result = ctx.getImageData(0, 0, w, h);
  const rD     = result.data;

  for (let i = 0; i < dA.length; i += 4) {
    const dr = Math.abs(dA[i]   - dB[i]);
    const dg = Math.abs(dA[i+1] - dB[i+1]);
    const db = Math.abs(dA[i+2] - dB[i+2]);
    const diff = (dr + dg + db) / 3;

    if (diff > 15) {
      const aIsDark = (dA[i] + dA[i+1] + dA[i+2]) < 600;
      const bIsDark = (dB[i] + dB[i+1] + dB[i+2]) < 600;

      if (aIsDark && !bIsDark) {
        /* Aにだけある暗い部分（削除）→ 赤 */
        rD[i]   = 220; rD[i+1] = 50;  rD[i+2] = 50;  rD[i+3] = 200;
      } else if (!aIsDark && bIsDark) {
        /* Bにだけある暗い部分（追加）→ 緑 */
        rD[i]   = 50;  rD[i+1] = 180; rD[i+2] = 80;  rD[i+3] = 200;
      }
    }
  }
  ctx.putImageData(result, 0, 0);
  return out;
}

function updateOverlayOpacity(pct) {
  document.querySelectorAll('[data-overlay="true"]').forEach(el => {
    el.style.opacity = pct / 100;
  });
}

function syncScroll(idA, idB) {
  const a = document.getElementById(idA);
  const b = document.getElementById(idB);
  if (!a || !b) return;
  let locked = false;
  const sync = (from, to) => () => {
    if (locked) return;
    locked = true;
    to.scrollTop  = from.scrollTop;
    to.scrollLeft = from.scrollLeft;
    locked = false;
  };
  a.addEventListener('scroll', sync(a, b));
  b.addEventListener('scroll', sync(b, a));
}

/* ────────────────── DXF 差分 ────────────────── */
async function renderDxfDiff() {
  setLoadingMsg('DXFを読み込み中…');
  try {
    const [textA, textB] = await Promise.all([
      fetchDxfText(idA),
      fetchDxfText(idB),
    ]);
    if (!textA || !textB) throw new Error('DXFテキストの取得失敗');

    const parser = new DxfParser();
    const dxfA   = parser.parseSync(textA);
    const dxfB   = parser.parseSync(textB);

    const entA = flatEntities(dxfA);
    const entB = flatEntities(dxfB);

    hideLoading();

    if (currentMode === 'side') {
      renderDxfSideBySide(textA, textB, entA, entB);
    } else {
      renderDxfHighlight(entA, entB);
    }
  } catch (err) {
    console.error(err);
    showError('DXFの解析に失敗しました: ' + err.message);
  }
}

function flatEntities(dxf) {
  const ents = [];
  if (dxf?.entities) ents.push(...dxf.entities);
  if (dxf?.blocks) {
    Object.values(dxf.blocks).forEach(b => {
      if (b.entities) ents.push(...b.entities);
    });
  }
  return ents;
}

function entityKey(e) {
  const pts = (e.vertices ?? []).map(v => `${v.x?.toFixed(2)},${v.y?.toFixed(2)}`).join('|');
  return `${e.type}|${e.startPoint?.x?.toFixed(2)},${e.startPoint?.y?.toFixed(2)}|${e.endPoint?.x?.toFixed(2)},${e.endPoint?.y?.toFixed(2)}|${e.center?.x?.toFixed(2)},${e.center?.y?.toFixed(2)}|${e.radius?.toFixed(2)}|${pts}`;
}

function renderDxfSideBySide(textA, textB, entA, entB) {
  const body = document.getElementById('diffBody');
  const keysA = new Set(entA.map(entityKey));
  const keysB = new Set(entB.map(entityKey));
  const added   = entB.filter(e => !keysA.has(entityKey(e)));
  const removed = entA.filter(e => !keysB.has(entityKey(e)));
  const clsA = isFilesMode ? 'fa' : 'old';
  const clsB = isFilesMode ? 'fb' : 'new';

  body.innerHTML = `
    <div class="diff-side-by-side">
      <div class="diff-panel" id="panelA">
        <div class="diff-panel-label ${clsA}"><i class="fa-solid fa-circle" style="font-size:8px;"></i> ${h(sideLabel('a'))} · ${wordDel()}エンティティ: ${removed.length}</div>
        <div id="dxfCanvasA" style="flex:1;"></div>
      </div>
      <div class="diff-panel" id="panelB">
        <div class="diff-panel-label ${clsB}"><i class="fa-solid fa-circle" style="font-size:8px;"></i> ${h(sideLabel('b'))} · ${wordAdd()}エンティティ: ${added.length}</div>
        <div id="dxfCanvasB" style="flex:1;"></div>
      </div>
    </div>`;

  if (typeof wnRenderDxf === 'function') {
    wnRenderDxf(document.getElementById('dxfCanvasA'), textA);
    wnRenderDxf(document.getElementById('dxfCanvasB'), textB);
  }
  syncScroll('panelA', 'panelB');
}

function renderDxfHighlight(entA, entB) {
  const body = document.getElementById('diffBody');
  const keysA = new Set(entA.map(entityKey));
  const keysB = new Set(entB.map(entityKey));
  const added   = entB.filter(e => !keysA.has(entityKey(e)));
  const removed = entA.filter(e => !keysB.has(entityKey(e)));
  const same    = entB.filter(e => keysA.has(entityKey(e)));

  body.innerHTML = `
    <div class="diff-dxf-wrap">
      <div class="diff-dxf-canvas-wrap" id="dxfDiffCanvas"></div>
      <div class="diff-dxf-stats">
        <span class="diff-stat-add"><i class="fa-solid fa-plus"></i> ${wordAdd()}: ${added.length}</span>
        <span class="diff-stat-del"><i class="fa-solid fa-minus"></i> ${wordDel()}: ${removed.length}</span>
        <span class="diff-stat-same">共通: ${same.length}</span>
        <span style="color:var(--muted);margin-left:auto;font-size:11px;">
          <i class="fa-solid fa-circle" style="color:#DC3545;"></i> ${wordDel()} &nbsp;
          <i class="fa-solid fa-circle" style="color:#28A745;"></i> ${wordAdd()} &nbsp;
          <i class="fa-solid fa-circle" style="color:#546E7A;opacity:.4;"></i> 共通
        </span>
      </div>
    </div>`;

  drawDxfDiffCanvas(document.getElementById('dxfDiffCanvas'), added, removed, same);
}

function drawDxfDiffCanvas(container, added, removed, same) {
  const allEnts = [...same, ...added, ...removed];
  if (!allEnts.length) {
    container.innerHTML = '<p style="color:rgba(255,255,255,.5);text-align:center;padding:40px;">差分がありません</p>';
    return;
  }

  /* バウンディングボックス計算 */
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  allEnts.forEach(e => {
    const pts = getEntityPoints(e);
    pts.forEach(([x, y]) => {
      if (x < minX) minX = x; if (x > maxX) maxX = x;
      if (y < minY) minY = y; if (y > maxY) maxY = y;
    });
  });

  const margin = 20;
  const W = container.clientWidth  || 800;
  const H = container.clientHeight || 600;
  const scaleX = (W - margin * 2) / (maxX - minX || 1);
  const scaleY = (H - margin * 2) / (maxY - minY || 1);
  const scale  = Math.min(scaleX, scaleY);
  const offX   = margin - minX * scale + ((W - margin * 2) - (maxX - minX) * scale) / 2;
  const offY   = margin - minY * scale + ((H - margin * 2) - (maxY - minY) * scale) / 2;

  const canvas  = document.createElement('canvas');
  canvas.width  = W;
  canvas.height = H;
  container.appendChild(canvas);
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#1A1A2E';
  ctx.fillRect(0, 0, W, H);

  const toScreen = (x, y) => [x * scale + offX, H - (y * scale + offY)];

  function drawEnts(ents, color, alpha) {
    ctx.strokeStyle = color;
    ctx.fillStyle   = color;
    ctx.globalAlpha = alpha;
    ctx.lineWidth   = alpha < 1 ? 0.5 : 1.5;
    ents.forEach(e => drawEntity(ctx, e, toScreen));
  }

  drawEnts(same,    '#8AAFC8', 0.25);
  drawEnts(removed, '#DC3545', 1);
  drawEnts(added,   '#28A745', 1);
  ctx.globalAlpha = 1;
}

function getEntityPoints(e) {
  const pts = [];
  if (e.startPoint) pts.push([e.startPoint.x, e.startPoint.y]);
  if (e.endPoint)   pts.push([e.endPoint.x, e.endPoint.y]);
  if (e.center)     pts.push([e.center.x, e.center.y]);
  if (e.vertices)   e.vertices.forEach(v => pts.push([v.x ?? 0, v.y ?? 0]));
  if (e.position)   pts.push([e.position.x, e.position.y]);
  return pts;
}

function drawEntity(ctx, e, toScreen) {
  if (e.type === 'LINE') {
    const [x1, y1] = toScreen(e.startPoint?.x ?? 0, e.startPoint?.y ?? 0);
    const [x2, y2] = toScreen(e.endPoint?.x   ?? 0, e.endPoint?.y   ?? 0);
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();

  } else if (e.type === 'CIRCLE') {
    const [cx, cy] = toScreen(e.center?.x ?? 0, e.center?.y ?? 0);
    const r = (e.radius ?? 0) * Math.min(1, 1);
    ctx.beginPath(); ctx.arc(cx, cy, Math.abs(r), 0, Math.PI * 2); ctx.stroke();

  } else if (e.type === 'ARC') {
    const [cx, cy] = toScreen(e.center?.x ?? 0, e.center?.y ?? 0);
    const r   = (e.radius ?? 0);
    const sa  = (e.startAngle ?? 0) * Math.PI / 180;
    const ea  = (e.endAngle   ?? 0) * Math.PI / 180;
    ctx.beginPath(); ctx.arc(cx, cy, Math.abs(r), -ea, -sa); ctx.stroke();

  } else if (['LWPOLYLINE', 'POLYLINE'].includes(e.type)) {
    const verts = e.vertices ?? [];
    if (!verts.length) return;
    ctx.beginPath();
    const [sx, sy] = toScreen(verts[0].x ?? 0, verts[0].y ?? 0);
    ctx.moveTo(sx, sy);
    verts.slice(1).forEach(v => { const [x, y] = toScreen(v.x ?? 0, v.y ?? 0); ctx.lineTo(x, y); });
    if (e.shape) ctx.closePath();
    ctx.stroke();

  } else if (e.type === 'TEXT' || e.type === 'MTEXT') {
    const [tx, ty] = toScreen(e.startPoint?.x ?? e.position?.x ?? 0, e.startPoint?.y ?? e.position?.y ?? 0);
    ctx.font = `${Math.max(8, (e.textHeight ?? 3) * 4)}px sans-serif`;
    ctx.fillText(String(e.text ?? e.string ?? '').substring(0, 30), tx, ty);
  }
}

async function fetchDxfText(fileId) {
  const token = sessionStorage.getItem('space_token');
  const url = WN_API_BASE + `/wn/files/${fileId}/public-view` + (token ? `?token=${encodeURIComponent(token)}` : '');
  try {
    const res = await fetch(url);
    if (!res.ok) return null;
    return await res.text();
  } catch { return null; }
}

/* ────────────────── ユーティリティ ────────────────── */
/* 読み込み監視: 90秒進捗がなければタイムアウト表示（進捗のたびにリセットされる） */
let loadingWatchdog = null;

function setLoadingMsg(msg) {
  const el = document.getElementById('loadingMsg');
  if (el) el.textContent = msg;
  const loading = document.getElementById('diffLoading');
  if (loading) loading.style.display = '';
  clearTimeout(loadingWatchdog);
  loadingWatchdog = setTimeout(() => {
    if (isLoadingVisible()) showError('読み込みに時間がかかりすぎています。通信状況を確認して再読み込みしてください');
  }, 90000);
}

function hideLoading() {
  clearTimeout(loadingWatchdog);
  const loading = document.getElementById('diffLoading');
  if (loading) loading.style.display = 'none';
}

function showError(msg) {
  clearTimeout(loadingWatchdog);
  const loading = document.getElementById('diffLoading');
  if (loading) loading.style.display = 'none';
  const body = document.getElementById('diffBody');
  if (!body) return;
  body.innerHTML = `
    <div class="diff-error">
      <i class="fa-solid fa-triangle-exclamation"></i>
      <p style="font-size:14px;max-width:80%;text-align:center;">${msg}</p>
      <div style="display:flex;gap:10px;">
        <a href="javascript:location.reload()" class="btn btn-accent btn-sm">再読み込み</a>
        <a href="javascript:history.back()" class="btn btn-outline btn-sm">戻る</a>
      </div>
    </div>`;
}

function h(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
